asyncapi: 3.0.0

info:
  title: ACT Connect カーテン制御 IoT API
  version: 1.0.0
  description: |
    ACT Connect のカーテン開閉デバイス（X320）と
    クラウド / Greengrass アプリケーション間の MQTT メッセージ仕様。

    ## デバイス構成
    - `x320-curtain-01` : カーテン開閉デバイス（温度・湿度センサー内蔵、モーター M1/M2）
    - `x320-co2-01`     : CO2センサーデバイス

    ## 通信仕様
    - プロトコル: MQTT v3.1.1 over TLS
    - ポート: 8883
    - ブローカー: AWS IoT Core

    ## QoS ポリシー
    | QoS | 対象トピック            | 理由                     |
    |-----|----------------------|--------------------------|
    | 1   | command / response / event | 取りこぼすと制御不整合   |
    | 0   | telemetry / health   | 次回データで補完可能     |

  contact:
    name: ACT Node Inc.
    url: https://act-node.co.jp
  license:
    name: Proprietary

defaultContentType: application/json

servers:
  production:
    host: xxxxxxxxxxxx.iot.ap-northeast-1.amazonaws.com
    protocol: mqtts
    description: AWS IoT Core（東京リージョン）
    security:
      - $ref: "#/components/securitySchemes/x509"
  greengrass:
    host: localhost:8883
    protocol: mqtt
    description: Greengrass IPC Pub/Sub ブローカー（エッジローカル）

channels:

  curtainCommand:
    address: "{device_id}/curtain/command"
    description: |
      クラウド / Event Router から Control Logic へのモーター制御指示。
      全コマンドに `command_id` を含め、Control Logic は必ず `response` トピックで結果を返す。
    parameters:
      device_id:
        $ref: "#/components/parameters/device_id"
    messages:
      CurtainCommand:
        $ref: "#/components/messages/CurtainCommand"

  curtainResponse:
    address: "{device_id}/curtain/response"
    description: |
      Control Logic から Event Router へのコマンド実行結果。
      `command_id` で要求と応答を照合する。
    parameters:
      device_id:
        $ref: "#/components/parameters/device_id"
    messages:
      CurtainResponse:
        $ref: "#/components/messages/CurtainResponse"

  curtainEvent:
    address: "{device_id}/curtain/event"
    description: |
      Control Logic から Event Router への状態変化即時通知。
      リミッター到達・緊急停止・モーター状態変化・モード変更時に発行される。
    parameters:
      device_id:
        $ref: "#/components/parameters/device_id"
    messages:
      LimiterEvent:
        $ref: "#/components/messages/LimiterEvent"
      EmergencyStopEvent:
        $ref: "#/components/messages/EmergencyStopEvent"
      MotorStateEvent:
        $ref: "#/components/messages/MotorStateEvent"
      ModeChangeEvent:
        $ref: "#/components/messages/ModeChangeEvent"

  sensorTelemetry:
    address: "{device_id}/sensor/telemetry"
    description: |
      Control Logic から Sensor Aggregator への定期センサーデータ。
      30秒間隔で送信。QoS 0 のため欠損の可能性がある。
    parameters:
      device_id:
        $ref: "#/components/parameters/device_id"
    messages:
      SensorTelemetry:
        $ref: "#/components/messages/SensorTelemetry"

  curtainHealth:
    address: "{device_id}/curtain/health"
    description: |
      Control Logic から Health Reporter へのデバイス死活情報。
      300秒間隔で送信。QoS 0 のため欠損の可能性がある。
    parameters:
      device_id:
        $ref: "#/components/parameters/device_id"
    messages:
      CurtainHealth:
        $ref: "#/components/messages/CurtainHealth"

operations:

  sendCommand:
    action: send
    channel:
      $ref: "#/channels/curtainCommand"
    summary: モーター制御コマンドを送信する
    bindings:
      mqtt:
        qos: 1
        retain: false

  publishResponse:
    action: send
    channel:
      $ref: "#/channels/curtainResponse"
    summary: コマンド実行結果を送信する
    bindings:
      mqtt:
        qos: 1
        retain: false

  publishEvent:
    action: send
    channel:
      $ref: "#/channels/curtainEvent"
    summary: 状態変化イベントを送信する
    bindings:
      mqtt:
        qos: 1
        retain: false

  publishTelemetry:
    action: send
    channel:
      $ref: "#/channels/sensorTelemetry"
    summary: 定期センサーデータを送信する
    bindings:
      mqtt:
        qos: 0
        retain: false

  publishHealth:
    action: send
    channel:
      $ref: "#/channels/curtainHealth"
    summary: ヘルスチェック情報を送信する
    bindings:
      mqtt:
        qos: 0
        retain: false

  receiveCommand:
    action: receive
    channel:
      $ref: "#/channels/curtainCommand"
    summary: モーター制御コマンドを受信する
    bindings:
      mqtt:
        qos: 1

  receiveResponse:
    action: receive
    channel:
      $ref: "#/channels/curtainResponse"
    summary: コマンド実行結果を受信する
    bindings:
      mqtt:
        qos: 1

  receiveEvent:
    action: receive
    channel:
      $ref: "#/channels/curtainEvent"
    summary: 状態変化イベントを受信する
    bindings:
      mqtt:
        qos: 1

  receiveTelemetry:
    action: receive
    channel:
      $ref: "#/channels/sensorTelemetry"
    summary: 定期センサーデータを受信する
    bindings:
      mqtt:
        qos: 0

  receiveHealth:
    action: receive
    channel:
      $ref: "#/channels/curtainHealth"
    summary: ヘルスチェック情報を受信する
    bindings:
      mqtt:
        qos: 0

components:

  parameters:
    device_id:
      description: "デバイスの一意識別子（例: x320-curtain-01）"

  securitySchemes:
    x509:
      type: X509
      description: AWS IoT Core X.509 クライアント証明書認証

  messages:

    CurtainCommand:
      name: CurtainCommand
      title: カーテン制御コマンド
      summary: Event Router から Control Logic へのモーター制御指示
      contentType: application/json
      payload:
        $ref: "./schemas/command.json"
      examples:
        - name: 自動閾値越えによる開コマンド
          payload:
            command_id: "cmd-abc123"
            issued_at: "2025-03-20T09:15:00Z"
            source: "event:motor_state"
            zone_id: "daytime_auto"
            motors:
              M1:
                command: "forward"
                target_direction: "forward"
              M2:
                command: "forward"
                target_direction: "forward"
            options:
              stop_before_reverse_ms: 500
              cooldown_sec: 30
            trigger:
              event_type: "motor_state"
              temperature_c: 30.6
        - name: ゾーン切替による強制クローズ
          payload:
            command_id: "cmd-def456"
            issued_at: "2025-03-20T18:00:01Z"
            source: "zone_transition"
            zone_id: "evening_close"
            motors:
              M1:
                command: "reverse"
                target_direction: "reverse"
              M2:
                command: "reverse"
                target_direction: "reverse"
            options:
              stop_before_reverse_ms: 500
              cooldown_sec: 30

    CurtainResponse:
      name: CurtainResponse
      title: コマンド実行結果
      summary: Control Logic から Event Router へのコマンド応答
      contentType: application/json
      payload:
        $ref: "./schemas/response.json"
      examples:
        - name: 成功応答
          payload:
            command_id: "cmd-abc123"
            responded_at: "2025-03-20T09:15:08Z"
            motors:
              M1:
                result: "success"
                direction: "forward"
                cooldown_active: true
                cooldown_until: 1710300038
              M2:
                result: "success"
                direction: "forward"
                cooldown_active: true
                cooldown_until: 1710300043
        - name: 緊急停止中の拒否
          payload:
            command_id: "cmd-ghi789"
            responded_at: "2025-03-20T09:22:05Z"
            motors:
              M1:
                result: "error"
                reason: "emergency_stop_active"
              M2:
                result: "error"
                reason: "emergency_stop_active"
        - name: クールダウン中の保留
          payload:
            command_id: "cmd-jkl012"
            responded_at: "2025-03-20T09:20:01Z"
            motors:
              M1:
                result: "pending"
                reason: "cooldown"
                retry_after_sec: 18
                pending_command: "reverse"
              M2:
                result: "success"
                direction: "reverse"
                cooldown_active: true
                cooldown_until: 1710300061

    LimiterEvent:
      name: LimiterEvent
      title: リミッター状態変化イベント
      contentType: application/json
      payload:
        $ref: "./schemas/event_limiter.json"
      examples:
        - name: 上限リミッター到達
          payload:
            device_id: "x320-curtain-01"
            event_type: "limiter"
            motor_id: "M1"
            limiter: "upper"
            state: "active"
            previous_state: "inactive"
            timestamp: 1710300060.0

    EmergencyStopEvent:
      name: EmergencyStopEvent
      title: 緊急停止イベント
      contentType: application/json
      payload:
        $ref: "./schemas/event_emergency_stop.json"
      examples:
        - name: 緊急停止ボタン押下
          payload:
            device_id: "x320-curtain-01"
            event_type: "emergency_stop"
            state: "active"
            timestamp: 1710300120.0

    MotorStateEvent:
      name: MotorStateEvent
      title: モーター状態変化イベント
      contentType: application/json
      payload:
        $ref: "./schemas/event_motor_state.json"
      examples:
        - name: 自動閾値による起動
          payload:
            device_id: "x320-curtain-01"
            event_type: "motor_state"
            motor_id: "M1"
            direction: "forward"
            previous_direction: "stopped"
            reason: "auto_threshold"
            timestamp: 1710300000.0

    ModeChangeEvent:
      name: ModeChangeEvent
      title: 動作モード変更イベント
      contentType: application/json
      payload:
        $ref: "./schemas/event_mode_change.json"
      examples:
        - name: 手動→自動切替
          payload:
            device_id: "x320-curtain-01"
            event_type: "mode_change"
            mode: "auto"
            previous_mode: "manual"
            timestamp: 1710300000.0

    SensorTelemetry:
      name: SensorTelemetry
      title: センサーテレメトリ
      summary: 30秒間隔の定期センサーデータ
      contentType: application/json
      payload:
        $ref: "./schemas/telemetry.json"
      examples:
        - name: 温度・湿度テレメトリ
          payload:
            device_id: "x320-curtain-01"
            timestamp: 1710300000.0
            sensors:
              temperature:
                value_celsius: 28.4
                raw_value: 2150
                read_at: 1710299998.5
              humidity_pct: 71.2
            sampled_at: "2025-03-20T09:15:00Z"

    CurtainHealth:
      name: CurtainHealth
      title: ヘルスチェック
      summary: 300秒間隔のデバイス死活情報
      contentType: application/json
      payload:
        $ref: "./schemas/health.json"
      examples:
        - name: 正常
          payload:
            device_id: "x320-curtain-01"
            timestamp: 1710300000.0
            uptime_sec: 86400
            mqtt_connected: true
            firmware: "1.4.2"
            rssi_dbm: -65
            do_channels: ["EXT_DO0","EXT_DO1","EXT_DO2","EXT_DO3"]
            di_channels: ["Filtered_DI0","Filtered_DI1","Filtered_DI2","Filtered_DI3","Filtered_DI4"]
            ai_available: true
            errors: []
        - name: エラーあり
          payload:
            device_id: "x320-curtain-01"
            timestamp: 1710300300.0
            uptime_sec: 86700
            mqtt_connected: true
            firmware: "1.4.2"
            rssi_dbm: -65
            ai_available: true
            errors: ["M2:E01"]
