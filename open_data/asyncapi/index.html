<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACT Connect IoT API ドキュメント</title>
  <link rel="stylesheet"
    href="https://unpkg.com/@asyncapi/react-component@1.0.0-next.54/styles/default.min.css">
  <style>
    body { margin: 0; font-family: sans-serif; background: #f5f5f5; }
    #asyncapi { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="asyncapi"></div>

  <script src="https://unpkg.com/@asyncapi/react-component@1.0.0-next.54/browser/standalone/index.js"></script>
  <script>
    // サブパス対応: スクリプトと同じディレクトリの asyncapi.yaml を参照
    const base = document.currentScript
      ? document.currentScript.src.replace(/\/[^/]*$/, '/')
      : './';

    AsyncApiStandalone.render(
      {
        schema: {
          url: base + 'asyncapi.yaml',
        },
        config: {
          show: {
            sidebar:    true,
            info:       true,
            servers:    true,
            operations: true,
            messages:   true,
            schemas:    true,
          },
          sidebar: {
            showOperations: 'byDefault',
          },
        },
      },
      document.getElementById('asyncapi')
    );
  </script>
</body>
</html>
