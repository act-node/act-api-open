asyncapi: 3.0.0

info:
  title: ACT Connect IoT API
  version: 0.2.2
  description: |
    ACT Connect デバイス群と Greengrass アプリケーション間の MQTT / Shadow メッセージ仕様。

    ## Shadow 命名規則

    | プレフィックス | 対象 | 例 |
    |--------------|------|-----|
    | `dev-` | 物理デバイス 1台に対応する Shadow。デバイスの制御・センサー値・状態をすべて 1つにまとめる | `dev-curtain`, `dev-co2` |
    | `zone-` | 棟・エリア単位で共有する Shadow。複数デバイスの集約値を管理する | `zone-env` |

    ## Named Shadow 一覧

    ### デバイス固有 Shadow（`dev-` プレフィックス）
    | Shadow 名 | Thing | 書込主体 | 内容 |
    |-----------|-------|----------|------|
    | **dev-curtain** | x320-curtain-01 | Event Router / Aggregator / Health Reporter | カーテン制御 + 温湿度センサーをすべて 1つに統合 |
    | **dev-co2** | Sensor-co2 | Aggregator | CO2・温湿度計測値 |

    ### ゾーン共有 Shadow（`zone-` プレフィックス）
    | Shadow 名 | Thing | 書込主体 | 内容 |
    |-----------|-------|----------|------|
    | **zone-env** | x320-Edge-Node | Aggregator | エリア内全センサー集約値 |

    ## デバイス構成例
    | デバイスID | device_type | 説明 |
    |-----------|-------------|------|
    | x320-Edge-Node | ─ | 棟単位の仮想 Thing（zone- Shadow の親） |
    | x320-curtain-01 | curtain_ctrl | カーテン開閉・温湿度センサー内蔵 |
    | Sensor-co2 | env_sensor | LoRaWAN CO2センサー |

    ## QoS ポリシー
    | QoS | 対象 | 理由 |
    |-----|------|------|
    | 1 | command / response / event | 取りこぼすと制御不整合 |
    | 0 | telemetry / health | 次回データで補完可能 |

  contact:
    name: ACT Node Inc.
    url: https://act-node.co.jp
  license:
    name: Proprietary

defaultContentType: application/json

servers:
  greengrass-ipc:
    host: /greengrass/v2/ipc.socket
    protocol: greengrassv2
    description: |
      Greengrass IPC Pub/Sub ブローカー。
      同一デバイス上のコンポーネント間通信（Event Router / Aggregator / Health Reporter ↔ Control Logic）。
  local-mqtt:
    host: x320-Edge-Node.local:8883
    protocol: mqtts
    description: |
      LAN 内 MQTT ブローカー（Greengrass MQTT Bridge / MQTTS）。
      別筐体の Control Logic が AWS IoT Device SDK v2 で接続する。X.509 証明書認証。

channels:

  # ================================================================
  # zone- Shadow チャンネル（Thing: x320-Edge-Node）
  # ================================================================

  shadowZoneEnvUpdate:
    address: "$aws/things/{thing_name}/shadow/name/zone-env/update"
    description: |
      zone-env Shadow の更新。Aggregator が棟内全センサーの集約値を書き込む。

      ## sensors エントリの形式
      | sensor_schema.value_type | zone-env での形式 |
      |--------------------------|-----------------|
      | object | フィールドを直接展開 + source_device / source_shadow / sampled_at / stale |
      | number / integer 等 | {value, source_device, source_shadow, sampled_at, stale} |

      ## stale 判定
      stale_threshold_sec 以上 telemetry が届かないセンサーを stale: true に更新する。
      Event Router はこれを制御判断から除外する。
    messages:
      ZoneEnvUpdate:
        name: ZoneEnvUpdate
        title: zone-env reported 更新
        contentType: application/json
        payload:
          $ref: "#/components/schemas/ZoneEnvShadow"
        examples:
          - name: 温湿度＋CO2の集約（正常）
            payload:
              state:
                desired:
                  config: {stale_threshold_sec: 120}
                reported:
                  sensors:
                    temperature:
                      value_celsius: 28.4
                      raw_value: 2150
                      read_at: 1710300000.0
                      source_device: x320-curtain-01
                      source_shadow: dev-curtain
                      sampled_at: "2025-03-20T09:15:00Z"
                      stale: false
                    humidity_pct:
                      value: 71.2
                      source_device: x320-curtain-01
                      source_shadow: dev-curtain
                      sampled_at: "2025-03-20T09:15:00Z"
                      stale: false
                    co2_ppm:
                      value: 850
                      source_device: Sensor-co2
                      source_shadow: dev-co2
                      sampled_at: "2025-03-20T09:14:50Z"
                      stale: false
                  updated_at: "2025-03-20T09:15:02Z"
          - name: CO2センサー stale
            payload:
              state:
                reported:
                  sensors:
                    temperature:
                      value_celsius: 28.4
                      source_device: x320-curtain-01
                      source_shadow: dev-curtain
                      sampled_at: "2025-03-20T09:15:00Z"
                      stale: false
                    co2_ppm:
                      value: null
                      source_device: Sensor-co2
                      source_shadow: dev-co2
                      sampled_at: null
                      stale: true
                  updated_at: "2025-03-20T09:15:02Z"

  # ================================================================
  # dev- Shadow チャンネル（Thing: x320-curtain-01）
  # ================================================================

  shadowDevCurtainUpdate:
    address: "$aws/things/{thing_name}/shadow/name/dev-curtain/update"
    description: |
      dev-curtain Shadow の desired / reported を更新する。

      カーテン制御デバイス（x320-curtain-01）に関するすべての情報を 1つの Shadow に統合。
      モーター制御・スケジュール・センサー値・デバイス状態を含む。

      ## 書込主体
      | セクション | 書込主体 |
      |-----------|---------|
      | desired.control | curtain_ctrl プラグイン / ACT.app |
      | desired.sensor_config | ACT.app |
      | reported.control | curtain_ctrl プラグイン（curtain/response 受信後） |
      | reported.environment | Aggregator（telemetry 受信時） |
      | reported.device | Health Reporter（health 受信時） |

      ## 更新タイミング
      | セクション | タイミング |
      |-----------|----------|
      | reported.control.motors | コマンド実行後（即時） |
      | reported.environment | 30秒ごと（telemetry 受信時） |
      | reported.device | 300秒ごと（health 受信時） |
    messages:
      DevCurtainUpdate:
        name: DevCurtainUpdate
        title: dev-curtain Shadow 更新
        contentType: application/json
        payload:
          $ref: "#/components/schemas/DevCurtainShadow"

  # ================================================================
  # dev- Shadow チャンネル（Thing: Sensor-co2）
  # ================================================================

  shadowDevCo2Update:
    address: "$aws/things/{thing_name}/shadow/name/dev-co2/update"
    description: |
      dev-co2 Shadow の更新。

      ## 書込主体
      | セクション | 書込主体 |
      |-----------|---------|
      | desired.sensor_config | ACT.app |
      | reported.environment | Aggregator（telemetry 受信時） |
      | reported.device | Aggregator（stale 検知時のみ online フラグを更新） |

      ## LoRaWAN 特記事項
      health トピックを持たないため reported.device の更新は Aggregator が担当する。
    messages:
      DevCo2Update:
        name: DevCo2Update
        title: dev-co2 更新
        contentType: application/json
        payload:
          $ref: "#/components/schemas/DevCo2Shadow"
        examples:
          - name: CO2センサー計測値
            payload:
              state:
                desired:
                  sensor_config: {interval_sec: 30, co2_calibration_ppm: 0}
                reported:
                  environment:
                    co2_ppm: 850
                    temperature: {value_celsius: 27.8, raw_value: 2100, read_at: 1710299990.0}
                    humidity_pct: 70.5
                    sampled_at: "2025-03-20T09:14:50Z"
                  device: {online: true, firmware: "2.1.0", rssi_dbm: -72, errors: [], last_health_at: null}

  # ================================================================
  # GG IPC Pub/Sub チャンネル
  # ================================================================

  curtainCommand:
    address: "{device_id}/curtain/command"
    description: |
      Event Router の curtain_ctrl プラグインから Control Logic へのモーター制御指示（QoS 1）。

      ## 発行条件（source フィールド）
      | source | 発行契機 |
      |--------|---------|
      | zone_transition | スケジュールゾーン切替 |
      | event:motor_state | 温度閾値超過 / 復帰 |
      | event:limiter | リミッタースイッチ到達 |
      | manual | ACT.app からの手動指示 |
    messages:
      CurtainCommand:
        name: CurtainCommand
        title: カーテン制御コマンド
        contentType: application/json
        payload:
          type: object
          required: [command_id, issued_at, source, motors, options]
          properties:
            command_id: {type: string}
            issued_at:  {type: string, format: date-time}
            source:     {type: string, enum: ["event:motor_state", "event:limiter", "event:emergency_stop", zone_transition, manual]}
            zone_id:    {type: string, nullable: true}
            motors:
              type: object
              properties:
                M1: &motor_cmd
                  type: object
                  properties:
                    command:          {type: string, enum: [forward, reverse, stop]}
                    target_direction: {type: string, enum: [forward, reverse, stopped]}
                    skip:             {type: boolean, default: false}
                    reason:           {type: string, enum: [override, already_at_target, cooldown], description: skip=true の場合のみ設定}
                M2: *motor_cmd
            options:
              type: object
              properties:
                stop_before_reverse_ms: {type: integer, default: 500}
                cooldown_sec:           {type: integer, default: 30}
            trigger:
              type: object
              properties:
                event_type:    {type: string}
                temperature_c: {type: number}
        examples:
          - name: 温度閾値超過による開コマンド
            payload:
              command_id: cmd-abc123
              issued_at: "2025-03-20T09:15:00Z"
              source: "event:motor_state"
              zone_id: daytime_auto
              motors:
                M1: {command: forward, target_direction: forward, skip: false}
                M2: {command: forward, target_direction: forward, skip: false}
              options: {stop_before_reverse_ms: 500, cooldown_sec: 30}
              trigger: {event_type: motor_state, temperature_c: 30.6}
          - name: ゾーン切替による強制クローズ
            payload:
              command_id: cmd-def456
              issued_at: "2025-03-20T18:00:01Z"
              source: zone_transition
              zone_id: evening_close
              motors:
                M1: {command: reverse, target_direction: reverse, skip: false}
                M2: {command: reverse, target_direction: reverse, skip: false}
              options: {stop_before_reverse_ms: 500, cooldown_sec: 30}
          - name: リミッター到達による片側 stop（M2 は skip）
            payload:
              command_id: cmd-ghi789
              issued_at: "2025-03-20T09:15:30Z"
              source: "event:limiter"
              zone_id: null
              motors:
                M1: {command: stop, target_direction: stopped, skip: false}
                M2: {command: stop, target_direction: stopped, skip: true, reason: already_at_target}
              options: {stop_before_reverse_ms: 500, cooldown_sec: 30}

  curtainResponse:
    address: "{device_id}/curtain/response"
    description: Control Logic から Event Router へのコマンド実行結果（QoS 1）。
    messages:
      CurtainResponse:
        name: CurtainResponse
        title: コマンド実行結果
        contentType: application/json
        payload:
          type: object
          required: [command_id, responded_at, motors]
          properties:
            command_id:   {type: string}
            responded_at: {type: string, format: date-time}
            motors:
              type: object
              properties:
                M1: &motor_resp
                  type: object
                  properties:
                    result:          {type: string, enum: [success, pending, skipped, error]}
                    direction:       {type: string, enum: [forward, reverse, stopped]}
                    cooldown_active: {type: boolean}
                    cooldown_until:  {type: number, nullable: true}
                    reason:          {type: string, description: "error / pending / skipped の場合に設定"}
                    retry_after_sec: {type: integer, description: result=pending の場合のみ}
                    pending_command: {type: string, description: result=pending の場合のみ}
                    error_code:      {type: string, description: result=error の場合のみ}
                M2: *motor_resp
        examples:
          - name: 成功応答
            payload:
              command_id: cmd-abc123
              responded_at: "2025-03-20T09:15:08Z"
              motors:
                M1: {result: success, direction: forward, cooldown_active: true, cooldown_until: 1710300038}
                M2: {result: success, direction: forward, cooldown_active: true, cooldown_until: 1710300043}
          - name: 緊急停止中の拒否
            payload:
              command_id: cmd-ghi789
              responded_at: "2025-03-20T09:22:05Z"
              motors:
                M1: {result: error, reason: emergency_stop_active}
                M2: {result: error, reason: emergency_stop_active}
          - name: クールダウン中の保留
            payload:
              command_id: cmd-jkl012
              responded_at: "2025-03-20T09:20:01Z"
              motors:
                M1: {result: pending, reason: cooldown, retry_after_sec: 18, pending_command: reverse}
                M2: {result: success, direction: reverse, cooldown_active: true, cooldown_until: 1710300061}

  curtainEvent:
    address: "{device_id}/curtain/event"
    description: |
      Control Logic から curtain_ctrl プラグインへの状態変化通知（QoS 1）。

      ## イベント種別
      | event_type | 契機 | プラグインの処理 |
      |-----------|------|--------------|
      | limiter | リミッタースイッチ到達 / 解除 | stop コマンド発行 & dev-curtain 更新 |
      | emergency_stop | 物理ボタン押下 / 解除 | コマンドブロック & dev-curtain 更新 |
      | motor_state | モーター動作状態変化 | dev-curtain ログ記録 |
      | mode_change | auto / manual 切替 | dev-curtain 更新 |
    messages:
      LimiterEvent:
        name: LimiterEvent
        title: リミッター状態変化
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, motor_id, limiter, state, previous_state, timestamp]
          properties:
            device_id:      {type: string}
            event_type:     {type: string, enum: [limiter]}
            motor_id:       {type: string, enum: [M1, M2]}
            limiter:        {type: string, enum: [upper, lower], description: "upper=上限 / lower=下限"}
            state:          {type: string, enum: [active, inactive], description: "active=接点 ON"}
            previous_state: {type: string, enum: [active, inactive]}
            timestamp:      {type: number}
        examples:
          - name: M1 上限リミッター到達
            payload: {device_id: x320-curtain-01, event_type: limiter, motor_id: M1, limiter: upper, state: active, previous_state: inactive, timestamp: 1710300060.0}
      EmergencyStopEvent:
        name: EmergencyStopEvent
        title: 緊急停止
        description: 物理緊急停止ボタンの状態変化。active 中は全コマンドを拒否する。
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, state, timestamp]
          properties:
            device_id:  {type: string}
            event_type: {type: string, enum: [emergency_stop]}
            state:      {type: string, enum: [active, inactive], description: "active=押下中"}
            timestamp:  {type: number}
        examples:
          - name: 緊急停止押下
            payload: {device_id: x320-curtain-01, event_type: emergency_stop, state: active, timestamp: 1710300120.0}
      MotorStateEvent:
        name: MotorStateEvent
        title: モーター状態変化
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, motor_id, direction, previous_direction, reason, timestamp]
          properties:
            device_id:          {type: string}
            event_type:         {type: string, enum: [motor_state]}
            motor_id:           {type: string, enum: [M1, M2]}
            direction:          {type: string, enum: [forward, reverse, stopped]}
            previous_direction: {type: string, enum: [forward, reverse, stopped]}
            reason:             {type: string, enum: [command, limiter, emergency_stop, auto_threshold, error]}
            error_code:         {type: string}
            timestamp:          {type: number}
        examples:
          - name: 自動閾値による起動
            payload: {device_id: x320-curtain-01, event_type: motor_state, motor_id: M1, direction: forward, previous_direction: stopped, reason: auto_threshold, timestamp: 1710300000.0}
          - name: リミッターによる停止
            payload: {device_id: x320-curtain-01, event_type: motor_state, motor_id: M1, direction: stopped, previous_direction: forward, reason: limiter, timestamp: 1710300060.1}
      ModeChangeEvent:
        name: ModeChangeEvent
        title: 動作モード変更
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, mode, previous_mode, timestamp]
          properties:
            device_id:     {type: string}
            event_type:    {type: string, enum: [mode_change]}
            mode:          {type: string, enum: [manual, auto]}
            previous_mode: {type: string, enum: [manual, auto]}
            timestamp:     {type: number}
        examples:
          - name: 手動→自動
            payload: {device_id: x320-curtain-01, event_type: mode_change, mode: auto, previous_mode: manual, timestamp: 1710300000.0}

  sensorTelemetry:
    address: "{device_id}/sensor/telemetry"
    description: |
      Control Logic から Aggregator への定期テレメトリ（QoS 0 / 30秒間隔）。

      ## Aggregator の処理
      1. Deployment Configuration の sensor_schema.path に従い sensors から値を抽出
      2. device_id に対応する dev- Shadow の reported.environment を更新
      3. zone-env の reported.sensors を集約更新

      sensors フィールドはデバイス種別により内容が異なる。
      sensor_schema の path にドット区切りパスを指定することでネスト構造にも対応する。
    messages:
      SensorTelemetry:
        name: SensorTelemetry
        title: センサーテレメトリ
        contentType: application/json
        payload:
          type: object
          description: |
            全デバイス共通テレメトリメッセージ。
            Aggregator は Deployment Configuration の sensor_schema.path に従い
            sensors から値を抽出して dev- Shadow / zone-env を更新する。
          required: [device_id, timestamp, sensors, sampled_at]
          properties:
            device_id:      {type: string}
            timestamp:      {type: number}
            sensors:        {type: object, additionalProperties: true, description: センサー計測値マップ（デバイス種別により内容が異なる）}
            sampled_at:     {type: string, format: date-time}
            mode:           {type: string, enum: [manual, auto], description: 動作モード（制御デバイスのみ）}
            emergency_stop: {type: string, enum: [active, inactive], description: 緊急停止状態（制御デバイスのみ）}
            motors:
              type: object
              description: モーター状態（curtain_ctrl デバイスのみ）
              additionalProperties:
                type: object
                properties:
                  direction:   {type: string, enum: [forward, reverse, stopped]}
                  limit_upper: {type: string, enum: [active, inactive]}
                  limit_lower: {type: string, enum: [active, inactive]}
        examples:
          - name: カーテン制御デバイス（温湿度＋モーター状態）
            payload:
              device_id: x320-curtain-01
              timestamp: 1710300000.0
              mode: auto
              emergency_stop: inactive
              sensors:
                temperature: {value_celsius: 28.4, raw_value: 2150, read_at: 1710299998.5}
                humidity_pct: 71.2
              motors:
                M1: {direction: stopped, limit_upper: inactive, limit_lower: inactive}
                M2: {direction: stopped, limit_upper: inactive, limit_lower: inactive}
              sampled_at: "2025-03-20T09:15:00Z"
          - name: CO2センサー
            payload:
              device_id: Sensor-co2
              timestamp: 1710300000.0
              sensors:
                co2_ppm: 850
                temperature: {value_celsius: 27.8, raw_value: 2100, read_at: 1710299998.0}
                humidity_pct: 70.5
              sampled_at: "2025-03-20T09:15:00Z"
          - name: 土壌センサー（追加例）
            payload:
              device_id: soil-sensor-01
              timestamp: 1710300000.0
              sensors:
                soil_moisture_pct: 62.3
                soil_temp: {value_celsius: 18.5, raw_value: 1420, read_at: 1710299998.0}
                ec_mS_cm: 1.8
              sampled_at: "2025-03-20T09:15:00Z"

  deviceHealth:
    address: "{device_id}/health"
    description: |
      デバイスから Health Reporter への死活情報（QoS 0 / 300秒間隔）。

      ## トピックパス
      Deployment Configuration の topic_health フィールドで定義する。

      ## Health Reporter の処理
      1. device_id を元に Deployment Configuration の health_targets を取得
      2. 共通フィールドを DeviceDocument として各 dev- Shadow の reported.device に書込む
      3. extra フィールドは DeviceDocument.extra にそのまま格納する
    messages:
      DeviceHealth:
        name: DeviceHealth
        title: デバイスヘルスチェック
        contentType: application/json
        payload:
          type: object
          description: 全デバイス共通ヘルスチェックメッセージ。種別固有フィールドは extra にまとめる。
          required: [device_id, timestamp, uptime_sec, mqtt_connected, firmware, rssi_dbm, errors]
          properties:
            device_id:      {type: string}
            timestamp:      {type: number}
            uptime_sec:     {type: integer, minimum: 0}
            mqtt_connected: {type: boolean}
            firmware:       {type: string}
            rssi_dbm:       {type: integer, minimum: -120, maximum: 0}
            do_channels:    {type: array, items: {type: string}}
            di_channels:    {type: array, items: {type: string}}
            ai_available:   {type: boolean}
            errors:         {type: array, items: {type: string}}
            extra:          {type: object, additionalProperties: true}
        examples:
          - name: カーテン制御デバイス（X320）
            payload:
              device_id: x320-curtain-01
              timestamp: 1710300000.0
              uptime_sec: 86400
              mqtt_connected: true
              firmware: "1.4.2"
              rssi_dbm: -65
              do_channels: [EXT_DO0, EXT_DO1, EXT_DO2, EXT_DO3]
              di_channels: [Filtered_DI0, Filtered_DI1, Filtered_DI2, Filtered_DI3, Filtered_DI4]
              ai_available: true
              errors: []
          - name: エッジAIカメラ（extra 使用）
            payload:
              device_id: edge-ai-cam-01
              timestamp: 1710300000.0
              uptime_sec: 43200
              mqtt_connected: true
              firmware: "3.1.0"
              rssi_dbm: -58
              errors: []
              extra:
                cpu_temp_c: 62.1
                memory_used_mb: 1842
                inference_fps: 12.4
                model_version: yolov8n-v3

operations:

  receiveCommand:
    action: receive
    channel:
      $ref: "#/channels/curtainCommand"
    summary: モーター制御コマンドを受信する
    description: |
      Event Router の curtain_ctrl プラグインからモーター制御指示を受け取る。
      コマンド実行後は必ず publishResponse で結果を返す。
    bindings:
      mqtt: {qos: 1}

  publishResponse:
    action: send
    channel:
      $ref: "#/channels/curtainResponse"
    summary: コマンド実行結果を返す
    description: |
      受け取ったコマンドの実行結果を Event Router へ返す。
      curtain_ctrl プラグインはこの結果を元に dev-curtain Shadow の
      reported.control.motors を更新する。
    bindings:
      mqtt: {qos: 1, retain: false}

  publishCurtainEvent:
    action: send
    channel:
      $ref: "#/channels/curtainEvent"
    summary: 状態変化イベントを送信する（QoS 1）
    description: LimiterEvent / EmergencyStopEvent / MotorStateEvent / ModeChangeEvent
    bindings:
      mqtt: {qos: 1, retain: false}

  publishTelemetry:
    action: send
    channel:
      $ref: "#/channels/sensorTelemetry"
    summary: 定期センサーデータを送信する（30秒間隔 / QoS 0）
    bindings:
      mqtt: {qos: 0, retain: false}

  publishHealth:
    action: send
    channel:
      $ref: "#/channels/deviceHealth"
    summary: ヘルスチェック情報を送信する（300秒間隔 / QoS 0）
    bindings:
      mqtt: {qos: 0, retain: false}

# ================================================================
# components.schemas
# ================================================================

components:
  schemas:

    # ================================================================
    # zone- Shadow スキーマ（6つのみ）
    # ================================================================

    ZoneEnvShadow:
      type: object
      title: zone-env Shadow
      description: |
        棟内全センサーの集約値。Thing: x320-Edge-Node

        sensors キーは各コンポーネントの Deployment Configuration sensor_schema.key と同一。
        stale=true のエントリは Event Router が制御判断から除外する。
        source_shadow には dev- Shadow 名が記録される。

        ## sensors エントリの形式
        | sensor_schema.value_type | zone-env での形式 |
        |--------------------------|-----------------|
        | object | フィールドを直接展開 + source_device / source_shadow / sampled_at / stale |
        | number / integer 等 | {value, source_device, source_shadow, sampled_at, stale} |

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "config": {
                "stale_threshold_sec": 120
              }
            },
            "reported": {
              "sensors": {
                "temperature": {
                  "value_celsius": 28.4,
                  "raw_value": 2150,
                  "read_at": 1710300000.0,
                  "source_device": "x320-curtain-01",
                  "source_shadow": "dev-curtain",
                  "sampled_at": "2025-03-20T09:15:00Z",
                  "stale": false
                },
                "humidity_pct": {
                  "value": 71.2,
                  "source_device": "x320-curtain-01",
                  "source_shadow": "dev-curtain",
                  "sampled_at": "2025-03-20T09:15:00Z",
                  "stale": false
                },
                "co2_ppm": {
                  "value": 850,
                  "source_device": "Sensor-co2",
                  "source_shadow": "dev-co2",
                  "sampled_at": "2025-03-20T09:14:50Z",
                  "stale": false
                }
              },
              "updated_at": "2025-03-20T09:15:02Z"
            }
          }
        }
        ```

        </details>
      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              properties:
                config:
                  type: object
                  properties:
                    stale_threshold_sec: {type: integer, default: 120}
            reported:
              type: object
              properties:
                sensors:
                  type: object
                  description: センサーキーをキーとした集約値マップ（任意キーに対応）
                  additionalProperties:
                    type: object
                    description: |
                      object 型: フィールドを直接展開 + source_device / source_shadow / sampled_at / stale
                      スカラー型: {value, source_device, source_shadow, sampled_at, stale}
                    properties:
                      value:         {nullable: true}
                      source_device: {type: string}
                      source_shadow: {type: string, description: dev- プレフィックスの Shadow 名}
                      sampled_at:    {type: string, format: date-time, nullable: true}
                      stale:         {type: boolean}
                    additionalProperties: true
                updated_at: {type: string, format: date-time}

    # ================================================================
    # dev- Shadow スキーマ
    # ================================================================

    DevCurtainShadow:
      type: object
      title: dev-curtain Shadow
      description: |
        カーテン制御デバイス（x320-curtain-01）の全情報を 1つに統合した Shadow。

        - desired.control       : モーター制御設定・スケジュール（curtain_ctrl プラグイン / ACT.app が書込）
        - desired.sensor_config : センサー収集設定（ACT.app が書込）
        - reported.control      : モーター現在状態・アクティブゾーン（curtain_ctrl プラグインが書込）
        - reported.environment  : 温湿度センサー計測値（Aggregator が書込）
        - reported.device       : デバイス死活・ハードウェア情報（Health Reporter が書込）

        ## 更新タイミング
        | セクション | タイミング |
        |-----------|----------|
        | reported.control.motors | コマンド実行後（即時） |
        | reported.environment | 30秒ごと（telemetry 受信時） |
        | reported.device | 300秒ごと（health 受信時） |

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "control": {
                "mode": "auto",
                "motors": {
                  "M1": {
                    "override": false,
                    "command": null,
                    "threshold": { "open_temp": 28.0, "close_temp": 25.0, "hysteresis": 1.0 }
                  },
                  "M2": {
                    "override": false,
                    "command": null,
                    "threshold": { "open_temp": 30.0, "close_temp": 27.0, "hysteresis": 1.5 }
                  }
                },
                "schedule": {
                  "enabled": true,
                  "timezone": "Asia/Tokyo",
                  "time_zones": [
                    { "id": "night_close",   "from": "00:00", "to": "08:00", "control": "force_close" },
                    { "id": "daytime_auto",  "from": "08:00", "to": "18:00", "control": "temperature" },
                    { "id": "evening_close", "from": "18:00", "to": "24:00", "control": "force_close" }
                  ]
                },
                "motor_config": { "stop_before_reverse_ms": 500, "cooldown_sec": 30 }
              },
              "sensor_config": { "interval_sec": 30, "unit_temperature": "celsius" }
            },
            "reported": {
              "control": {
                "mode": "auto",
                "emergency_stop": "inactive",
                "motors": {
                  "M1": {
                    "direction": "stopped",
                    "limit_upper": "inactive",
                    "limit_lower": "inactive",
                    "cooldown_active": false,
                    "cooldown_until": null,
                    "pending_command": null,
                    "last_command": "forward",
                    "last_operated_at": "2025-03-20T08:00:05Z",
                    "operation_count": 1205,
                    "error_code": null
                  },
                  "M2": {
                    "direction": "stopped",
                    "limit_upper": "inactive",
                    "limit_lower": "inactive",
                    "cooldown_active": false,
                    "cooldown_until": null,
                    "pending_command": null,
                    "last_command": "forward",
                    "last_operated_at": "2025-03-20T08:00:10Z",
                    "operation_count": 986,
                    "error_code": null
                  }
                },
                "active_zone": {
                  "id": "daytime_auto",
                  "control": "temperature",
                  "entered_at": "2025-03-20T08:00:01Z"
                },
                "schedule": {
                  "last_executed_zone": "night_close",
                  "last_executed_at": "2025-03-20T08:00:01Z",
                  "next_zone": "evening_close",
                  "next_zone_at": "2025-03-20T18:00:00Z"
                }
              },
              "environment": {
                "temperature": {
                  "value_celsius": 28.4,
                  "raw_value": 2150,
                  "read_at": 1710300000.0
                },
                "humidity_pct": 71.2,
                "sampled_at": "2025-03-20T09:15:00Z"
              },
              "device": {
                "online": true,
                "firmware": "1.4.2",
                "rssi_dbm": -65,
                "uptime_sec": 86400,
                "mqtt_connected": true,
                "do_channels": ["EXT_DO0", "EXT_DO1", "EXT_DO2", "EXT_DO3"],
                "di_channels": ["Filtered_DI0", "Filtered_DI1", "Filtered_DI2", "Filtered_DI3", "Filtered_DI4"],
                "ai_available": true,
                "errors": [],
                "last_health_at": "2025-03-20T09:00:00Z"
              }
            }
          }
        }
        ```

        </details>
      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              properties:
                control:
                  type: object
                  description: モーター制御設定
                  properties:
                    mode:
                      type: string
                      enum: [auto, manual]
                      description: "auto=温度・スケジュールで自動制御 / manual=手動コマンドのみ"
                    motors:
                      type: object
                      properties:
                        M1: &motor_desired
                          type: object
                          properties:
                            override:  {type: boolean, default: false, description: "true=グループ指示を無視して command を優先"}
                            command:   {type: string, enum: [forward, reverse, stop], nullable: true}
                            threshold:
                              type: object
                              properties:
                                open_temp:  {type: number, description: この温度以上でカーテンを開く（℃）}
                                close_temp: {type: number, description: この温度以下でカーテンを閉じる（℃）}
                                hysteresis: {type: number, minimum: 0, description: チャタリング防止幅（℃）}
                        M2: *motor_desired
                    schedule:
                      type: object
                      properties:
                        enabled:  {type: boolean}
                        timezone: {type: string, description: IANA タイムゾーン識別子}
                        time_zones:
                          type: array
                          items:
                            type: object
                            required: [id, from, to, control]
                            properties:
                              id:      {type: string}
                              from:    {type: string, description: "開始時刻（HH:MM）"}
                              to:      {type: string, description: "終了時刻（HH:MM）"}
                              control: {type: string, enum: [force_close, temperature, force_open]}
                    motor_config:
                      type: object
                      properties:
                        stop_before_reverse_ms: {type: integer, default: 500, description: 逆転前停止待機（ms）}
                        cooldown_sec:           {type: integer, default: 30,  description: 動作後冷却待機（秒）}
                sensor_config:
                  type: object
                  description: センサー収集設定
                  properties:
                    interval_sec:     {type: integer, default: 30}
                    unit_temperature: {type: string, enum: [celsius, fahrenheit], default: celsius}
            reported:
              type: object
              properties:
                control:
                  type: object
                  description: モーター現在状態・アクティブゾーン（curtain_ctrl プラグインが書込）
                  properties:
                    mode:           {type: string, enum: [auto, manual]}
                    emergency_stop: {type: string, enum: [active, inactive], description: "active 中は全コマンド拒否"}
                    motors:
                      type: object
                      properties:
                        M1: &motor_reported
                          type: object
                          properties:
                            direction:        {type: string, enum: [forward, reverse, stopped]}
                            limit_upper:      {type: string, enum: [active, inactive], description: "active=上限到達 → forward を拒否"}
                            limit_lower:      {type: string, enum: [active, inactive], description: "active=下限到達 → reverse を拒否"}
                            cooldown_active:  {type: boolean, description: "true=クールダウン中。新規コマンドは pending_command に保留"}
                            cooldown_until:   {type: number, nullable: true, description: クールダウン解除時刻（Unix epoch 秒）}
                            pending_command:  {type: string, nullable: true, description: クールダウン解除後に自動実行するコマンド}
                            last_command:     {type: string, nullable: true}
                            last_operated_at: {type: string, format: date-time, nullable: true}
                            operation_count:  {type: integer, minimum: 0, description: 累計動作回数（保守・寿命管理用）}
                            error_code:       {type: string, nullable: true, description: "null=正常 / E01=過電流 / E02=タイムアウト / E03=センサー異常"}
                        M2: *motor_reported
                    active_zone:
                      type: object
                      properties:
                        id:         {type: string}
                        control:    {type: string, enum: [force_close, temperature, force_open]}
                        entered_at: {type: string, format: date-time}
                    schedule:
                      type: object
                      properties:
                        last_executed_zone: {type: string, nullable: true}
                        last_executed_at:   {type: string, format: date-time, nullable: true}
                        next_zone:          {type: string, nullable: true}
                        next_zone_at:       {type: string, format: date-time, nullable: true}
                environment:
                  type: object
                  description: 温湿度センサー計測値（Aggregator が書込）
                  properties:
                    temperature:
                      type: object
                      properties:
                        value_celsius: {type: number, minimum: -40, maximum: 85}
                        raw_value:     {type: integer, minimum: 0, maximum: 4095, description: "AD変換生データ（12bit）"}
                        read_at:       {type: number, description: センサー読取時刻（Unix epoch 秒）}
                    humidity_pct: {type: number, minimum: 0, maximum: 100}
                    sampled_at:   {type: string, format: date-time}
                device:
                  type: object
                  description: デバイス死活・ハードウェア情報（Health Reporter が書込）
                  required: [online, firmware, rssi_dbm, errors, last_health_at]
                  properties:
                    online:         {type: boolean, description: "true=正常通信中 / false=offline_threshold_sec 超過"}
                    firmware:       {type: string}
                    rssi_dbm:       {type: integer, description: "Wi-Fi 受信電波強度（dBm）"}
                    uptime_sec:     {type: integer, minimum: 0}
                    mqtt_connected: {type: boolean}
                    errors:         {type: array, items: {type: string}}
                    last_health_at: {type: string, format: date-time, nullable: true}
                    do_channels:    {type: array, items: {type: string}, description: デジタル出力（X320 系のみ）}
                    di_channels:    {type: array, items: {type: string}, description: デジタル入力（X320 系のみ）}
                    ai_available:   {type: boolean, description: アナログ入力 / AI 推論（X320 系のみ）}
                    extra:          {type: object, additionalProperties: true, description: デバイス種別固有フィールド}

    DevCo2Shadow:
      type: object
      title: dev-co2 Shadow
      description: |
        LoRaWAN CO2センサー（Sensor-co2）の全情報を 1つに統合した Shadow。

        - desired.sensor_config : センサー収集設定（ACT.app が書込）
        - reported.environment  : CO2・温湿度計測値（Aggregator が書込）
        - reported.device       : デバイス死活情報（Aggregator が stale 検知時のみ更新）

        ## LoRaWAN 特記事項
        health トピックを持たないため reported.device の更新は Aggregator が担当する。
        uptime_sec / mqtt_connected / last_health_at は null になる。

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "sensor_config": {
                "interval_sec": 30,
                "co2_calibration_ppm": 0
              }
            },
            "reported": {
              "environment": {
                "co2_ppm": 850,
                "temperature": {
                  "value_celsius": 27.8,
                  "raw_value": 2100,
                  "read_at": 1710299990.0
                },
                "humidity_pct": 70.5,
                "sampled_at": "2025-03-20T09:14:50Z"
              },
              "device": {
                "online": true,
                "firmware": "2.1.0",
                "rssi_dbm": -72,
                "uptime_sec": null,
                "mqtt_connected": null,
                "errors": [],
                "last_health_at": null
              }
            }
          }
        }
        ```

        </details>
      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              properties:
                sensor_config:
                  type: object
                  properties:
                    interval_sec:        {type: integer, default: 30}
                    co2_calibration_ppm: {type: integer, default: 0, description: CO2校正オフセット（ppm）}
            reported:
              type: object
              properties:
                environment:
                  type: object
                  properties:
                    co2_ppm:      {type: integer, minimum: 0, maximum: 10000}
                    temperature:
                      type: object
                      properties:
                        value_celsius: {type: number}
                        raw_value:     {type: integer}
                        read_at:       {type: number}
                    humidity_pct: {type: number, minimum: 0, maximum: 100}
                    sampled_at:   {type: string, format: date-time}
                device:
                  type: object
                  description: デバイス死活情報（Aggregator が stale 検知時のみ更新）
                  properties:
                    online:         {type: boolean}
                    firmware:       {type: string}
                    rssi_dbm:       {type: integer}
                    uptime_sec:     {type: integer, nullable: true}
                    mqtt_connected: {type: boolean, nullable: true}
                    errors:         {type: array, items: {type: string}}
                    last_health_at: {type: string, format: date-time, nullable: true}
