asyncapi: 3.0.0

info:
  title: ACT Connect IoT API
  version: "0.3.3"
  description: |
    ACT Connect デバイス群と Greengrass アプリケーション間の MQTT / Shadow メッセージ仕様。

    ## Shadow 命名規則

    | プレフィックス | 対象 | 命名パターン | 例 |
    |--------------|------|------------|-----|
    | `dev-` | 物理デバイス 1台に対応する Shadow。1 Edge Node に同種デバイスが複数台あっても一意に識別できる | `dev-{device_id}`（device_id = `{type}-{連番 or 設置場所}`） | `dev-curtain-01`, `dev-curtain-02`, `dev-co2-hall`, `dev-cam-entrance` |
    | `zone-` | 棟・エリア単位で共有する Shadow。複数デバイスの集約値や設定を管理する | `zone-{目的}` | `zone-env`, `zone-aggregator-cfg` |

    ## Named Shadow 一覧

    ### デバイス固有 Shadow（`dev-` プレフィックス）
    Shadow 名は `dev-{device_id}` の形式で、device_id は Deployment 設定で定義する。
    同種デバイスが複数台ある場合は連番や設置場所を付けて一意にする（`curtain-01`, `curtain-02` など）。
    全ての `dev-` Shadow は Edge Node の Thing に属する（デバイスごとに別 Thing は作らない）。

    | Shadow 名（パターン） | Thing | 書込主体 | 内容 |
    |---------------------|-------|----------|------|
    | **dev-curtain-{n}** | x320-Edge-Node | Event Router / Aggregator / Health Reporter | カーテン制御 + 温湿度センサー（例: dev-curtain-01, dev-curtain-02） |
    | **dev-co2-{n}** | x320-Edge-Node | Aggregator | CO2・温湿度計測値（例: dev-co2-01, dev-co2-hall） |
    | **dev-cam-{n}** | x320-Edge-Node | CameraCapture / ImageAI | キャプチャ設定・画像AI設定・動作状態（例: dev-cam-01, dev-cam-entrance） |

    ### ゾーン共有 Shadow（`zone-` プレフィックス）
    | Shadow 名 | Thing | 書込主体 | 内容 |
    |-----------|-------|----------|------|
    | **zone-aggregator-cfg** | x320-Edge-Node | Setup スクリプト / ACT.app | Aggregator センサー集約ルーティング（dict 形式） |
    | **zone-env** | x320-Edge-Node | Aggregator | エリア内全センサー集約値 |

    ## デバイス構成例
    device_id は Deployment 設定（zone-device-registry）で定義する論理識別子。
    Shadow 名は `dev-{device_id}` となる（例: device_id=curtain-01 → Shadow 名=dev-curtain-01）。

    | device_id（論理識別子） | device_type | Shadow 名 | 説明 |
    |----------------------|-------------|----------|------|
    | x320-Edge-Node | ─ | ─ | 棟単位の仮想 Thing（zone- Shadow の親・全 dev- Shadow の Thing） |
    | curtain-01 | curtain_ctrl | dev-curtain-01 | カーテン開閉デバイス 1号機 |
    | curtain-02 | curtain_ctrl | dev-curtain-02 | カーテン開閉デバイス 2号機（同種複数台の例） |
    | co2-01 | env_sensor | dev-co2-01 | LoRaWAN CO2センサー |
    | cam-01 | edge_ai_cam | dev-cam-01 | エッジAIカメラ 1号機 |

    ## QoS ポリシー
    | QoS | 対象 | 理由 |
    |-----|------|------|
    | 1 | command / response / event | 取りこぼすと制御不整合 |
    | 0 | telemetry / health | 次回データで補完可能 |

  contact:
    name: ACT Node Inc.
    url: https://act-node.co.jp
  license:
    name: Proprietary

defaultContentType: application/json

servers:
  greengrass-ipc:
    host: /greengrass/v2/ipc.socket
    protocol: greengrassv2
    description: |
      Greengrass IPC Pub/Sub ブローカー。
      同一デバイス上のコンポーネント間通信（Event Router / Aggregator / Health Reporter ↔ Control Logic）。
  local-mqtt:
    host: x320-Edge-Node.local:8883
    protocol: mqtts
    description: |
      LAN 内 MQTT ブローカー（Greengrass MQTT Bridge / MQTTS）。
      別筐体の Control Logic が AWS IoT Device SDK v2 で接続する。X.509 証明書認証。

channels:

  # ================================================================
  # zone- Shadow チャンネル（Thing: x320-Edge-Node）
  # ================================================================


  shadowZoneAggregatorCfgUpdate:
    address: "$aws/things/{thing_name}/shadow/name/zone-aggregator-cfg/update"
    description: |
      zone-aggregator-cfg Shadow の desired を更新する。

      ## 役割
      Aggregator のセンサー集約ルーティング設定。
      routing は dict 形式（key = device_id）のため、
      各デバイスの Setup スクリプトが既存エントリを消さずに追記できる。

      ## 書込主体
      | 操作 | 書込主体 |
      |------|---------|
      | 初期作成 | Aggregator（起動時に空 Shadow を作成） |
      | エントリ追記 | 各デバイスの Setup スクリプト（Lifecycle.Run） |
      | stale_threshold_sec 変更 | ACT.app |

      ## Aggregator のホットリロード
      Aggregator が 30秒ごとにポーリングし version 変化を検知したら
      routing テーブルと MQTT 購読を再構築する。
      新デバイスの Setup スクリプト実行から 30秒以内に自動反映される。
    messages:
      ZoneAggregatorCfgUpdate:
        name: ZoneAggregatorCfgUpdate
        title: zone-aggregator-cfg 更新
        contentType: application/json
        payload:
          $ref: "#/components/schemas/ZoneAggregatorCfgShadow"
        examples:
          - name: カーテン＋CO2センサーのルーティング（Setup 後の状態）
            payload:
              state:
                desired:
                  stale_threshold_sec: 120
                  routing:
                    curtain-01:
                      shadow_name: dev-curtain-01
                      input_mode: mqtt_telemetry
                      sensor_schema:
                        - {key: temperature,  path: temperature,  value_type: object}
                        - {key: humidity_pct, path: humidity_pct, value_type: number}
                      zone_target:
                        thing: x320-Edge-Node
                        shadow: zone-env
                    co2-01:
                      shadow_name: dev-co2-01
                      input_mode: mqtt_telemetry
                      sensor_schema:
                        - {key: co2_ppm,      path: co2_ppm,      value_type: integer}
                        - {key: temperature,  path: temperature,  value_type: object}
                        - {key: humidity_pct, path: humidity_pct, value_type: number}
                      zone_target:
                        thing: x320-Edge-Node
                        shadow: zone-env
          - name: ケース B（CO2が別 PC）の場合
            payload:
              state:
                desired:
                  stale_threshold_sec: 120
                  routing:
                    curtain-01:
                      shadow_name: dev-curtain-01
                      input_mode: mqtt_telemetry
                      sensor_schema:
                        - {key: temperature,  path: temperature,  value_type: object}
                        - {key: humidity_pct, path: humidity_pct, value_type: number}
                      zone_target:
                        thing: x320-Edge-Node
                        shadow: zone-env
                    co2-01:
                      shadow_name: dev-co2-01
                      input_mode: shadow_poll
                      poll_interval_sec: 60
                      sensor_schema:
                        - {key: co2_ppm, path: co2_ppm, value_type: integer}
                      zone_target:
                        thing: x320-Edge-Node
                        shadow: zone-env

  shadowZoneEnvUpdate:
    address: "$aws/things/{thing_name}/shadow/name/zone-env/update"
    description: |
      zone-env Shadow の更新。Aggregator が棟内全センサーの集約値を書き込む。

      ## sensors エントリの形式
      | sensor_schema.value_type | zone-env での形式 |
      |--------------------------|-----------------|
      | object | フィールドを直接展開 + source_device / source_shadow / sampled_at / stale |
      | number / integer 等 | {value, source_device, source_shadow, sampled_at, stale} |

      ## stale 判定
      stale_threshold_sec 以上 telemetry が届かないセンサーを stale: true に更新する。
      Event Router はこれを制御判断から除外する。
    messages:
      ZoneEnvUpdate:
        name: ZoneEnvUpdate
        title: zone-env reported 更新
        contentType: application/json
        payload:
          $ref: "#/components/schemas/ZoneEnvShadow"
        examples:
          - name: 温湿度＋CO2の集約（正常）
            payload:
              state:
                desired:
                  config: {stale_threshold_sec: 120}
                reported:
                  sensors:
                    temperature:
                      value_celsius: 28.4
                      raw_value: 2150
                      read_at: 1710300000.0
                      source_device: curtain-01
                      source_shadow: dev-curtain-01
                      sampled_at: "2025-03-20T09:15:00Z"
                      stale: false
                    humidity_pct:
                      value: 71.2
                      source_device: curtain-01
                      source_shadow: dev-curtain-01
                      sampled_at: "2025-03-20T09:15:00Z"
                      stale: false
                    co2_ppm:
                      value: 850
                      source_device: co2-01
                      source_shadow: dev-co2-01
                      sampled_at: "2025-03-20T09:14:50Z"
                      stale: false
                  updated_at: "2025-03-20T09:15:02Z"
          - name: CO2センサー stale
            payload:
              state:
                reported:
                  sensors:
                    temperature:
                      value_celsius: 28.4
                      source_device: curtain-01
                      source_shadow: dev-curtain-01
                      sampled_at: "2025-03-20T09:15:00Z"
                      stale: false
                    co2_ppm:
                      value: null
                      source_device: co2-01
                      source_shadow: dev-co2-01
                      sampled_at: null
                      stale: true
                  updated_at: "2025-03-20T09:15:02Z"

  # ================================================================
  # dev- Shadow チャンネル（Thing: x320-Edge-Node（全 dev- Shadow は Edge Node の Thing に属する））
  # ================================================================

  shadowDevCurtainUpdate:
    address: "$aws/things/{thing_name}/shadow/name/dev-curtain/update"
    description: |
      dev-curtain Shadow の desired / reported を更新する。

      カーテン制御デバイス（curtain-01）に関するすべての情報を 1つの Shadow に統合。
      モーター制御・スケジュール・センサー値・デバイス状態を含む。

      ## 書込主体
      | セクション | 書込主体 |
      |-----------|---------|
      | desired.control | curtain_ctrl プラグイン / ACT.app |
      | desired.sensor_config | ACT.app |
      | reported.control | curtain_ctrl プラグイン（curtain/response 受信後） |
      | reported.environment | Aggregator（telemetry 受信時） |
      | reported.device | Health Reporter（health 受信時） |

      ## 更新タイミング
      | セクション | タイミング |
      |-----------|----------|
      | reported.control.motors | コマンド実行後（即時） |
      | reported.environment | 30秒ごと（telemetry 受信時） |
      | reported.device | 300秒ごと（health 受信時） |
    messages:
      DevCurtainUpdate:
        name: DevCurtainUpdate
        title: "dev-{device_id} Shadow（例: dev-curtain-01） 更新"
        contentType: application/json
        payload:
          $ref: "#/components/schemas/DevCurtainShadow"

  # ================================================================
  # dev- Shadow チャンネル（Thing: x320-Edge-Node（全 dev- Shadow は Edge Node の Thing に属する））
  # ================================================================

  shadowDevCo2Update:
    address: "$aws/things/{thing_name}/shadow/name/dev-co2/update"
    description: |
      dev-{device_id} Shadow の desired / reported を更新する。

      全 dev- Shadow は Edge Node の Thing（x320-Edge-Node）に属する。
      device_id は Deployment 設定で定義する論理識別子（例: co2-01, co2-hall）。

      ## 書込主体
      | セクション | 書込主体 |
      |-----------|---------|
      | desired.sensor_config | ACT.app |
      | reported.environment | Aggregator（telemetry 受信時） |
      | reported.device | Aggregator（stale 検知時のみ online フラグを更新） |

      ## LoRaWAN 特記事項
      health トピックを持たないため reported.device の更新は Aggregator が担当する。
    messages:
      DevCo2Update:
        name: DevCo2Update
        title: dev-co2 更新
        contentType: application/json
        payload:
          $ref: "#/components/schemas/DevCo2Shadow"
        examples:
          - name: CO2センサー計測値
            payload:
              state:
                desired:
                  sensor_config: {interval_sec: 30, co2_calibration_ppm: 0}
                reported:
                  environment:
                    co2_ppm: 850
                    temperature: {value_celsius: 27.8, raw_value: 2100, read_at: 1710299990.0}
                    humidity_pct: 70.5
                    sampled_at: "2025-03-20T09:14:50Z"
                  device: {online: true, firmware: "2.1.0", rssi_dbm: -72, errors: [], last_health_at: null}

  # ================================================================
  # dev- Shadow チャンネル（Thing: cam-{n}）
  # ================================================================

  # ================================================================
  # dev- Shadow チャンネル（Thing: cam-{n}）
  # ================================================================

  shadowDevCamUpdate:
    address: "$aws/things/{thing_name}/shadow/name/dev-cam-{id}/update"
    description: |
      dev-cam Shadow の desired / reported を更新する。

      カメラデバイス 1台に関するすべての情報を 1つの Shadow に統合。
      キャプチャ設定・保存設定・画像AI設定・動作状態をすべて含む。

      ## 書込主体
      | セクション | 書込主体 |
      |-----------|---------|
      | desired.capture | ACT.app（撮影設定変更） |
      | desired.storage | ACT.app（保存・転送設定変更） |
      | desired.ai.schedule | ACT.app（AI実行タイミング設定） |
      | desired.ai.model | ACT.app（モデル・パラメータ設定） |
      | desired.ai.output | ACT.app（出力先設定） |
      | desired.ai.trigger | ACT.app（on_demand 実行指示） |
      | reported.capture | CameraCapture（撮影状態・定期更新） |
      | reported.storage | CameraCapture（ストレージ使用量） |
      | reported.ai.status | ImageAI（処理状態） |
      | reported.ai.last_result | ImageAI（最終実行結果） |

      ## 更新タイミング
      | セクション | タイミング |
      |-----------|----------|
      | reported.capture | 撮影完了ごと（interval_sec ごと） |
      | reported.storage | 定期更新（5分ごと程度） |
      | reported.ai.status | AI実行開始時・完了時 |
      | reported.ai.last_result | AI実行完了時 |

      ## Delta によるホットリロード
      CameraCapture / ImageAI は Shadow Delta を購読する。
      ACT.app が desired を変更すると再起動なしで即時反映される。
      - capture.enabled: false → 撮影を一時停止
      - ai.schedule.mode / interval_sec 変更 → 次のループから反映
      - ai.trigger.run_now: true → on_demand 即時実行

      ## ai.schedule.mode の動作
      | mode | 動作 |
      |------|------|
      | interval | interval_sec ごとに定期実行 |
      | cron | cron フィールドの式（例: "0 6 * * *"）で実行 |
      | on_capture | CameraCapture 撮影完了イベントを受けて実行 |
      | on_demand | trigger.run_now: true を検知して即時実行 |
    messages:
      DevCamUpdate:
        name: DevCamUpdate
        title: "dev-{device_id} Shadow（例: dev-cam-01） 更新"
        contentType: application/json
        payload:
          $ref: "#/components/schemas/DevCamShadow"
        examples:
          - name: 30秒撮影・1時間ごとAI分析・S3送信
            payload:
              state:
                desired:
                  capture:
                    enabled: true
                    interval_sec: 30
                    resolution: "1280x720"
                    format: jpeg
                    quality: 85
                  storage:
                    local:
                      enabled: true
                      path: "/data/capture"
                      retain_days: 3
                    cloud:
                      enabled: true
                      s3_bucket: act-node-farm01
                      s3_prefix: "cam/house-a/"
                      upload_on_detection: false
                      upload_interval_sec: 300
                  ai:
                    schedule:
                      mode: interval
                      interval_sec: 3600
                    input:
                      source_path: "/data/capture"
                      file_pattern: "*.jpg"
                      target:
                        mode: latest_n
                        count: 10
                    model:
                      id: plant-disease-v2
                      version: "1.0.0"
                      confidence_threshold: 0.5
                      parameters: {}
                    output:
                      cloud:
                        enabled: true
                        s3_bucket: act-node-farm01
                        s3_prefix: "ai-results/house-a/"
                        notify_actapp: true
                      local:
                        enabled: true
                        path: "/data/ai-results"
                        retain_days: 7
                    trigger:
                      run_now: false
                      reason: null
          - name: 撮影のたびにリアルタイムAI分析
            payload:
              state:
                desired:
                  capture:
                    enabled: true
                    interval_sec: 10
                    resolution: "1920x1080"
                    format: jpeg
                    quality: 90
                  storage:
                    local:
                      enabled: true
                      path: "/data/capture"
                      retain_days: 1
                    cloud:
                      enabled: true
                      s3_bucket: act-node-farm01
                      s3_prefix: "cam/house-b/"
                      upload_on_detection: true
                      upload_interval_sec: null
                  ai:
                    schedule:
                      mode: on_capture
                    input:
                      source_path: "/data/capture"
                      file_pattern: "*.jpg"
                      target:
                        mode: latest_n
                        count: 1
                    model:
                      id: pest-detection-v1
                      version: "1.0.0"
                      confidence_threshold: 0.65
                      parameters: {}
                    output:
                      cloud:
                        enabled: true
                        s3_bucket: act-node-farm01
                        s3_prefix: "ai-results/realtime/"
                        notify_actapp: true
                      local:
                        enabled: false
                        path: "/data/ai-results"
                        retain_days: 0
                    trigger:
                      run_now: false
                      reason: null
          - name: ACT.app からの on_demand 即時実行
            payload:
              state:
                desired:
                  ai:
                    trigger:
                      run_now: true
                      reason: manual-inspection
          - name: 撮影を一時停止
            payload:
              state:
                desired:
                  capture:
                    enabled: false
          - name: 正常動作中・AI検知あり
            payload:
              state:
                reported:
                  capture:
                    running: true
                    fps_actual: 1.0
                    last_captured_at: "2025-03-20T09:15:00Z"
                    last_uploaded_at: "2025-03-20T09:15:02Z"
                    error: null
                  storage:
                    local_file_count: 86
                    local_size_mb: 412
                  ai:
                    status:
                      state: idle
                      last_run_at: "2025-03-20T09:00:12Z"
                      last_run_duration_sec: 8.4
                      error: null
                    last_result:
                      run_at: "2025-03-20T09:00:12Z"
                      input_file_count: 10
                      processed_count: 10
                      anomaly_detected: true
                      detection_count: 2
                      result_s3_key: "ai-results/house-a/2025-03-20T09:00:12Z.json"
                      summary:
                        disease_probability: 0.82
                        affected_area_pct: 12.4
                        recommendation: "要防除（早期対応推奨）"
          - name: AI処理中
            payload:
              state:
                reported:
                  ai:
                    status:
                      state: running
                      last_run_at: "2025-03-20T09:00:00Z"
                      last_run_duration_sec: null
                      error: null

  cameraAiEvent:
    address: "{device_id}/ai/event"
    description: |
      CameraCapture から Event Router の edge_ai_cam プラグインへの検知通知（QoS 1）。
      inference.publish_event_on_detection: true の場合に送信される。
      Event Router はこのイベントを受け取り、カーテン開閉などの制御判断に利用できる。
    messages:
      CameraDetectionEvent:
        name: CameraDetectionEvent
        title: 物体検知イベント
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, timestamp, detections]
          properties:
            device_id:   {type: string}
            event_type:  {type: string, enum: [detection]}
            timestamp:   {type: number}
            detections:
              type: array
              items:
                type: object
                properties:
                  class:       {type: string, description: 検知クラス名}
                  confidence:  {type: number, minimum: 0, maximum: 1}
                  bbox:
                    type: object
                    description: バウンディングボックス（画像座標、0〜1正規化）
                    properties:
                      x: {type: number}
                      y: {type: number}
                      w: {type: number}
                      h: {type: number}
            image_s3_key:
              type: string
              nullable: true
              description: "検知時にS3に保存した画像のキー（upload_on_detection: true の場合）"
            sampled_at:  {type: string, format: date-time}
        examples:
          - name: 人物検知
            payload:
              device_id: cam-01
              event_type: detection
              timestamp: 1710300000.0
              detections:
                - class: person
                  confidence: 0.87
                  bbox: {x: 0.32, y: 0.14, w: 0.18, h: 0.52}
              image_s3_key: "cam/house-a/2025-03-20T09:15:00Z_detect.jpg"
              sampled_at: "2025-03-20T09:15:00Z"


  cameraCaptured:
    address: "{device_id}/camera/captured"
    description: |
      CameraCapture が画像・映像ファイルを保存完了した後に発行する通知（QoS 0）。
      ImageAI が schedule.mode: on_capture の場合にこのトピックを購読して
      即時分析を開始するトリガーとして使用する。

      ## 発行タイミング
      - ローカルへのファイル書き込み完了後に発行
      - S3 アップロードの完了は待たない（非同期）

      ## ImageAI の on_capture 動作
      1. ImageAI が {source_device_id}/camera/captured を購読
      2. メッセージ受信 → input.source_path から最新ファイルを取得
      3. モデルで推論 → 結果を S3 に送信 → reported.last_result を更新
    messages:
      CameraCapturedEvent:
        name: CameraCapturedEvent
        title: 画像保存完了通知
        contentType: application/json
        payload:
          type: object
          required: [device_id, file_path, sampled_at]
          properties:
            device_id:   {type: string}
            file_path:
              type: string
              description: ローカルファイルパス
              example: "/data/capture/2025-03-20T09:15:00Z.jpg"
            file_type:   {type: string, enum: [jpeg, png, h264, mp4]}
            file_size_bytes: {type: integer}
            sampled_at:  {type: string, format: date-time}
            s3_key:
              type: string
              nullable: true
              description: S3 アップロード済みの場合のキー（非同期のため null の場合もある）
        examples:
          - name: 画像保存完了
            payload:
              device_id: cam-01
              file_path: "/data/capture/2025-03-20T09:15:00Z.jpg"
              file_type: jpeg
              file_size_bytes: 245760
              sampled_at: "2025-03-20T09:15:00Z"
              s3_key: null


  curtainCommand:
    address: "{device_id}/curtain/command"
    description: |
      Event Router の curtain_ctrl プラグインから Control Logic へのモーター制御指示（QoS 1）。

      ## 発行条件（source フィールド）
      | source | 発行契機 |
      |--------|---------|
      | zone_transition | スケジュールゾーン切替 |
      | event:motor_state | 温度閾値超過 / 復帰 |
      | event:limiter | リミッタースイッチ到達 |
      | manual | ACT.app からの手動指示 |
    messages:
      CurtainCommand:
        name: CurtainCommand
        title: カーテン制御コマンド
        contentType: application/json
        payload:
          type: object
          required: [command_id, issued_at, source, motors, options]
          properties:
            command_id: {type: string}
            issued_at:  {type: string, format: date-time}
            source:     {type: string, enum: ["event:motor_state", "event:limiter", "event:emergency_stop", zone_transition, manual]}
            zone_id:    {type: string, nullable: true}
            motors:
              type: object
              properties:
                M1: &motor_cmd
                  type: object
                  properties:
                    command:          {type: string, enum: [forward, reverse, stop]}
                    target_direction: {type: string, enum: [forward, reverse, stopped]}
                    skip:             {type: boolean, default: false}
                    reason:           {type: string, enum: [override, already_at_target, cooldown], description: skip=true の場合のみ設定}
                M2: *motor_cmd
            options:
              type: object
              properties:
                stop_before_reverse_ms: {type: integer, default: 500}
                cooldown_sec:           {type: integer, default: 30}
            trigger:
              type: object
              properties:
                event_type:    {type: string}
                temperature_c: {type: number}
        examples:
          - name: 温度閾値超過による開コマンド
            payload:
              command_id: cmd-abc123
              issued_at: "2025-03-20T09:15:00Z"
              source: "event:motor_state"
              zone_id: daytime_auto
              motors:
                M1: {command: forward, target_direction: forward, skip: false}
                M2: {command: forward, target_direction: forward, skip: false}
              options: {stop_before_reverse_ms: 500, cooldown_sec: 30}
              trigger: {event_type: motor_state, temperature_c: 30.6}
          - name: ゾーン切替による強制クローズ
            payload:
              command_id: cmd-def456
              issued_at: "2025-03-20T18:00:01Z"
              source: zone_transition
              zone_id: evening_close
              motors:
                M1: {command: reverse, target_direction: reverse, skip: false}
                M2: {command: reverse, target_direction: reverse, skip: false}
              options: {stop_before_reverse_ms: 500, cooldown_sec: 30}
          - name: リミッター到達による片側 stop（M2 は skip）
            payload:
              command_id: cmd-ghi789
              issued_at: "2025-03-20T09:15:30Z"
              source: "event:limiter"
              zone_id: null
              motors:
                M1: {command: stop, target_direction: stopped, skip: false}
                M2: {command: stop, target_direction: stopped, skip: true, reason: already_at_target}
              options: {stop_before_reverse_ms: 500, cooldown_sec: 30}

  curtainResponse:
    address: "{device_id}/curtain/response"
    description: Control Logic から Event Router へのコマンド実行結果（QoS 1）。
    messages:
      CurtainResponse:
        name: CurtainResponse
        title: コマンド実行結果
        contentType: application/json
        payload:
          type: object
          required: [command_id, responded_at, motors]
          properties:
            command_id:   {type: string}
            responded_at: {type: string, format: date-time}
            motors:
              type: object
              properties:
                M1: &motor_resp
                  type: object
                  properties:
                    result:          {type: string, enum: [success, pending, skipped, error]}
                    direction:       {type: string, enum: [forward, reverse, stopped]}
                    cooldown_active: {type: boolean}
                    cooldown_until:  {type: number, nullable: true}
                    reason:          {type: string, description: "error / pending / skipped の場合に設定"}
                    retry_after_sec: {type: integer, description: result=pending の場合のみ}
                    pending_command: {type: string, description: result=pending の場合のみ}
                    error_code:      {type: string, description: result=error の場合のみ}
                M2: *motor_resp
        examples:
          - name: 成功応答
            payload:
              command_id: cmd-abc123
              responded_at: "2025-03-20T09:15:08Z"
              motors:
                M1: {result: success, direction: forward, cooldown_active: true, cooldown_until: 1710300038}
                M2: {result: success, direction: forward, cooldown_active: true, cooldown_until: 1710300043}
          - name: 緊急停止中の拒否
            payload:
              command_id: cmd-ghi789
              responded_at: "2025-03-20T09:22:05Z"
              motors:
                M1: {result: error, reason: emergency_stop_active}
                M2: {result: error, reason: emergency_stop_active}
          - name: クールダウン中の保留
            payload:
              command_id: cmd-jkl012
              responded_at: "2025-03-20T09:20:01Z"
              motors:
                M1: {result: pending, reason: cooldown, retry_after_sec: 18, pending_command: reverse}
                M2: {result: success, direction: reverse, cooldown_active: true, cooldown_until: 1710300061}

  curtainEvent:
    address: "{device_id}/curtain/event"
    description: |
      Control Logic から curtain_ctrl プラグインへの状態変化通知（QoS 1）。

      ## イベント種別
      | event_type | 契機 | プラグインの処理 |
      |-----------|------|--------------|
      | limiter | リミッタースイッチ到達 / 解除 | stop コマンド発行 & dev-curtain 更新 |
      | emergency_stop | 物理ボタン押下 / 解除 | コマンドブロック & dev-curtain 更新 |
      | motor_state | モーター動作状態変化 | dev-curtain ログ記録 |
      | mode_change | auto / manual 切替 | dev-curtain 更新 |
    messages:
      LimiterEvent:
        name: LimiterEvent
        title: リミッター状態変化
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, motor_id, limiter, state, previous_state, timestamp]
          properties:
            device_id:      {type: string}
            event_type:     {type: string, enum: [limiter]}
            motor_id:       {type: string, enum: [M1, M2]}
            limiter:        {type: string, enum: [upper, lower], description: "upper=上限 / lower=下限"}
            state:          {type: string, enum: [active, inactive], description: "active=接点 ON"}
            previous_state: {type: string, enum: [active, inactive]}
            timestamp:      {type: number}
        examples:
          - name: M1 上限リミッター到達
            payload: {device_id: curtain-01, event_type: limiter, motor_id: M1, limiter: upper, state: active, previous_state: inactive, timestamp: 1710300060.0}
      EmergencyStopEvent:
        name: EmergencyStopEvent
        title: 緊急停止
        description: 物理緊急停止ボタンの状態変化。active 中は全コマンドを拒否する。
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, state, timestamp]
          properties:
            device_id:  {type: string}
            event_type: {type: string, enum: [emergency_stop]}
            state:      {type: string, enum: [active, inactive], description: "active=押下中"}
            timestamp:  {type: number}
        examples:
          - name: 緊急停止押下
            payload: {device_id: curtain-01, event_type: emergency_stop, state: active, timestamp: 1710300120.0}
      MotorStateEvent:
        name: MotorStateEvent
        title: モーター状態変化
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, motor_id, direction, previous_direction, reason, timestamp]
          properties:
            device_id:          {type: string}
            event_type:         {type: string, enum: [motor_state]}
            motor_id:           {type: string, enum: [M1, M2]}
            direction:          {type: string, enum: [forward, reverse, stopped]}
            previous_direction: {type: string, enum: [forward, reverse, stopped]}
            reason:             {type: string, enum: [command, limiter, emergency_stop, auto_threshold, error]}
            error_code:         {type: string}
            timestamp:          {type: number}
        examples:
          - name: 自動閾値による起動
            payload: {device_id: curtain-01, event_type: motor_state, motor_id: M1, direction: forward, previous_direction: stopped, reason: auto_threshold, timestamp: 1710300000.0}
          - name: リミッターによる停止
            payload: {device_id: curtain-01, event_type: motor_state, motor_id: M1, direction: stopped, previous_direction: forward, reason: limiter, timestamp: 1710300060.1}
      ModeChangeEvent:
        name: ModeChangeEvent
        title: 動作モード変更
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, mode, previous_mode, timestamp]
          properties:
            device_id:     {type: string}
            event_type:    {type: string, enum: [mode_change]}
            mode:          {type: string, enum: [manual, auto]}
            previous_mode: {type: string, enum: [manual, auto]}
            timestamp:     {type: number}
        examples:
          - name: 手動→自動
            payload: {device_id: curtain-01, event_type: mode_change, mode: auto, previous_mode: manual, timestamp: 1710300000.0}

  sensorTelemetry:
    address: "{device_id}/sensor/telemetry"
    description: |
      Control Logic から Aggregator への定期テレメトリ（QoS 0 / 30秒間隔）。

      ## Aggregator の処理
      1. zone-aggregator-cfg の sensor_schema.path に従い sensors から値を抽出
      2. device_id に対応する dev- Shadow の reported.environment を更新
      3. zone-env の reported.sensors を集約更新

      sensors フィールドはデバイス種別により内容が異なる。
      sensor_schema の path にドット区切りパスを指定することでネスト構造にも対応する。
    messages:
      SensorTelemetry:
        name: SensorTelemetry
        title: センサーテレメトリ
        contentType: application/json
        payload:
          type: object
          description: |
            全デバイス共通テレメトリメッセージ。
            Aggregator は zone-aggregator-cfg の sensor_schema.path に従い
            sensors から値を抽出して dev- Shadow / zone-env を更新する。
          required: [device_id, timestamp, sensors, sampled_at]
          properties:
            device_id:      {type: string}
            timestamp:      {type: number}
            sensors:        {type: object, additionalProperties: true, description: センサー計測値マップ（デバイス種別により内容が異なる）}
            sampled_at:     {type: string, format: date-time}
            mode:           {type: string, enum: [manual, auto], description: 動作モード（制御デバイスのみ）}
            emergency_stop: {type: string, enum: [active, inactive], description: 緊急停止状態（制御デバイスのみ）}
            motors:
              type: object
              description: モーター状態（curtain_ctrl デバイスのみ）
              additionalProperties:
                type: object
                properties:
                  direction:   {type: string, enum: [forward, reverse, stopped]}
                  limit_upper: {type: string, enum: [active, inactive]}
                  limit_lower: {type: string, enum: [active, inactive]}
        examples:
          - name: カーテン制御デバイス（温湿度＋モーター状態）
            payload:
              device_id: curtain-01
              timestamp: 1710300000.0
              mode: auto
              emergency_stop: inactive
              sensors:
                temperature: {value_celsius: 28.4, raw_value: 2150, read_at: 1710299998.5}
                humidity_pct: 71.2
              motors:
                M1: {direction: stopped, limit_upper: inactive, limit_lower: inactive}
                M2: {direction: stopped, limit_upper: inactive, limit_lower: inactive}
              sampled_at: "2025-03-20T09:15:00Z"
          - name: CO2センサー
            payload:
              device_id: co2-01
              timestamp: 1710300000.0
              sensors:
                co2_ppm: 850
                temperature: {value_celsius: 27.8, raw_value: 2100, read_at: 1710299998.0}
                humidity_pct: 70.5
              sampled_at: "2025-03-20T09:15:00Z"
          - name: 土壌センサー（追加例）
            payload:
              device_id: soil-sensor-01
              timestamp: 1710300000.0
              sensors:
                soil_moisture_pct: 62.3
                soil_temp: {value_celsius: 18.5, raw_value: 1420, read_at: 1710299998.0}
                ec_mS_cm: 1.8
              sampled_at: "2025-03-20T09:15:00Z"

  deviceHealth:
    address: "{device_id}/health"
    description: |
      デバイスから Health Reporter への死活情報（QoS 0 / 300秒間隔）。

      ## トピックパス
      Deployment Configuration の topic_health フィールドで定義する。

      ## Health Reporter の処理
      1. device_id を元に Component Configuration の health_targets を取得
      2. 共通フィールドを DeviceDocument として各 dev- Shadow の reported.device に書込む
      3. extra フィールドは DeviceDocument.extra にそのまま格納する
    messages:
      DeviceHealth:
        name: DeviceHealth
        title: デバイスヘルスチェック
        contentType: application/json
        payload:
          type: object
          description: 全デバイス共通ヘルスチェックメッセージ。種別固有フィールドは extra にまとめる。
          required: [device_id, timestamp, uptime_sec, mqtt_connected, firmware, rssi_dbm, errors]
          properties:
            device_id:      {type: string}
            timestamp:      {type: number}
            uptime_sec:     {type: integer, minimum: 0}
            mqtt_connected: {type: boolean}
            firmware:       {type: string}
            rssi_dbm:       {type: integer, minimum: -120, maximum: 0}
            do_channels:    {type: array, items: {type: string}}
            di_channels:    {type: array, items: {type: string}}
            ai_available:   {type: boolean}
            errors:         {type: array, items: {type: string}}
            extra:          {type: object, additionalProperties: true}
        examples:
          - name: カーテン制御デバイス（X320）
            payload:
              device_id: curtain-01
              timestamp: 1710300000.0
              uptime_sec: 86400
              mqtt_connected: true
              firmware: "1.4.2"
              rssi_dbm: -65
              do_channels: [EXT_DO0, EXT_DO1, EXT_DO2, EXT_DO3]
              di_channels: [Filtered_DI0, Filtered_DI1, Filtered_DI2, Filtered_DI3, Filtered_DI4]
              ai_available: true
              errors: []
          - name: エッジAIカメラ（extra 使用）
            payload:
              device_id: cam-01
              timestamp: 1710300000.0
              uptime_sec: 43200
              mqtt_connected: true
              firmware: "3.1.0"
              rssi_dbm: -58
              errors: []
              extra:
                cpu_temp_c: 62.1
                memory_used_mb: 1842
                inference_fps: 12.4
                model_version: yolov8n-v3

  imageAiResult:
    address: "act-connect/results/{device_id}"
    description: |
      ImageAI が分析完了後に AWS IoT Core に発行する結果通知。
      ACT.app は IoT Rule でこのトピックを受信して処理する。

      ## 通信経路
      ImageAI → Greengrass MQTT Bridge → AWS IoT Core → IoT Rule → ACT.app

      ## ACT.app 側の受信設定（IoT Rule 例）
      SELECT * FROM 'act-connect/results/+'
      → Lambda / API Gateway で結果を受信
    messages:
      ImageAiResultNotification:
        name: ImageAiResultNotification
        title: 画像AI分析結果通知
        contentType: application/json
        payload:
          type: object
          required: [device_id, model_id, run_at, result_s3_key, anomaly_detected]
          properties:
            device_id:
              type: string
            model_id:
              type: string
            model_version:
              type: string
            run_at:
              type: string
              format: date-time
            input_file_count:
              type: integer
            processed_count:
              type: integer
            anomaly_detected:
              type: boolean
              description: 異常・検知があった場合 true。ACT.app のアラート判断に使用する
            detection_count:
              type: integer
              minimum: 0
            result_s3_key:
              type: string
              description: 詳細結果 JSON が格納された S3 キー
            summary:
              type: object
              additionalProperties: true
              description: モデル固有のサマリ情報
            edge_node_thing:
              type: string
              description: 送信元 Edge Node の Thing 名（棟の特定に使用）
        examples:
          - name: 病害検知あり
            payload:
              device_id: cam-01
              model_id: plant-disease-v2
              model_version: "1.0.0"
              run_at: "2025-03-20T09:00:12Z"
              input_file_count: 10
              processed_count: 10
              anomaly_detected: true
              detection_count: 2
              result_s3_key: "ai-results/house-a/2025-03-20T09:00:12Z.json"
              summary:
                disease_probability: 0.82
                affected_area_pct: 12.4
                recommendation: "要防除（早期対応推奨）"
              edge_node_thing: x320-Edge-Node
          - name: 異常なし
            payload:
              device_id: cam-01
              model_id: plant-disease-v2
              model_version: "1.0.0"
              run_at: "2025-03-20T09:00:12Z"
              input_file_count: 10
              processed_count: 10
              anomaly_detected: false
              detection_count: 0
              result_s3_key: "ai-results/house-a/2025-03-20T09:00:12Z.json"
              summary:
                disease_probability: 0.03
              edge_node_thing: x320-Edge-Node


operations:

  receiveCommand:
    action: receive
    channel:
      $ref: "#/channels/curtainCommand"
    summary: モーター制御コマンドを受信する
    description: |
      Event Router の curtain_ctrl プラグインからモーター制御指示を受け取る。
      コマンド実行後は必ず publishResponse で結果を返す。
    bindings:
      mqtt: {qos: 1}

  publishResponse:
    action: send
    channel:
      $ref: "#/channels/curtainResponse"
    summary: コマンド実行結果を返す
    description: |
      受け取ったコマンドの実行結果を Event Router へ返す。
      curtain_ctrl プラグインはこの結果を元に dev-curtain Shadow の
      reported.control.motors を更新する。
    bindings:
      mqtt: {qos: 1, retain: false}

  publishCurtainEvent:
    action: send
    channel:
      $ref: "#/channels/curtainEvent"
    summary: 状態変化イベントを送信する（QoS 1）
    description: LimiterEvent / EmergencyStopEvent / MotorStateEvent / ModeChangeEvent
    bindings:
      mqtt: {qos: 1, retain: false}

  publishTelemetry:
    action: send
    channel:
      $ref: "#/channels/sensorTelemetry"
    summary: 定期センサーデータを送信する（30秒間隔 / QoS 0）
    bindings:
      mqtt: {qos: 0, retain: false}

  publishHealth:
    action: send
    channel:
      $ref: "#/channels/deviceHealth"
    summary: ヘルスチェック情報を送信する（300秒間隔 / QoS 0）
    bindings:
      mqtt: {qos: 0, retain: false}

# ================================================================
# components.schemas
# ================================================================

components:
  schemas:

    # ================================================================
    # zone- Shadow スキーマ（6つのみ）
    # ================================================================

    ZoneAggregatorCfgShadow:
      type: object
      title: zone-aggregator-cfg Shadow
      description: |
        Aggregator のセンサー集約ルーティング設定。Thing: x320-Edge-Node

        ## routing が dict 形式である理由
        Greengrass configurationUpdate の merge は dict のキー追加には対応するが
        array への要素追記には対応しない。
        各デバイスの Setup スクリプトが自身のエントリだけを追記できるよう
        routing を dict 形式（key = device_id）にしている。

        ## 書込主体
        | 操作 | 書込主体 |
        |------|---------|
        | 初期作成（routing: {}） | Aggregator |
        | エントリ追記 | 各デバイスの Setup スクリプト |

        ## input_mode
        | input_mode | 説明 |
        |------------|------|
        | mqtt_telemetry | GG IPC Pub/Sub でテレメトリを受信（ケース A） |
        | shadow_poll | dev- Shadow を定期 GetShadow で読取（ケース B） |

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "stale_threshold_sec": 120,
              "routing": {
                "curtain-01": {
                  "shadow_name": "dev-curtain-01",
                  "input_mode": "mqtt_telemetry",
                  "sensor_schema": [
                    { "key": "temperature",  "path": "temperature",  "value_type": "object" },
                    { "key": "humidity_pct", "path": "humidity_pct", "value_type": "number" }
                  ],
                  "zone_target": { "thing": "x320-Edge-Node", "shadow": "zone-env" }
                },
                "co2-01": {
                  "shadow_name": "dev-co2-01",
                  "input_mode": "mqtt_telemetry",
                  "sensor_schema": [
                    { "key": "co2_ppm",      "path": "co2_ppm",      "value_type": "integer" },
                    { "key": "temperature",  "path": "temperature",  "value_type": "object" },
                    { "key": "humidity_pct", "path": "humidity_pct", "value_type": "number" }
                  ],
                  "zone_target": { "thing": "x320-Edge-Node", "shadow": "zone-env" }
                }
              }
            }
          }
        }
        ```

        </details>
      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              required: [stale_threshold_sec, routing]
              properties:
                stale_threshold_sec:
                  type: integer
                  default: 120
                  description: stale 判定秒数（全デバイス共通）
                routing:
                  type: object
                  description: device_id をキーとした集約ルーティング dict
                  additionalProperties:
                    type: object
                    required: [shadow_name, input_mode, sensor_schema, zone_target]
                    properties:
                      shadow_name:
                        type: string
                        description: デバイス固有 Shadow 名（dev-{device_id} 形式）
                        example: dev-curtain-01-01
                      input_mode:
                        type: string
                        enum: [mqtt_telemetry, shadow_poll]
                      poll_interval_sec:
                        type: integer
                        default: 60
                        description: shadow_poll 時のみ使用
                      sensor_schema:
                        type: array
                        items:
                          type: object
                          required: [key, path, value_type]
                          properties:
                            key:        {type: string}
                            path:       {type: string}
                            value_type: {type: string, enum: [object, number, integer, string, boolean]}
                      zone_target:
                        type: object
                        required: [thing, shadow]
                        properties:
                          thing:  {type: string}
                          shadow: {type: string}


    ZoneEnvShadow:
      type: object
      title: zone-env Shadow
      description: |
        棟内全センサーの集約値。Thing: x320-Edge-Node

        sensors キーは zone-aggregator-cfg の各エントリ sensor_schema.key と同一。
        stale=true のエントリは Event Router が制御判断から除外する。
        source_shadow には dev- Shadow 名が記録される。

        ## sensors エントリの形式
        | sensor_schema.value_type | zone-env での形式 |
        |--------------------------|-----------------|
        | object | フィールドを直接展開 + source_device / source_shadow / sampled_at / stale |
        | number / integer 等 | {value, source_device, source_shadow, sampled_at, stale} |

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "config": {
                "stale_threshold_sec": 120
              }
            },
            "reported": {
              "sensors": {
                "temperature": {
                  "value_celsius": 28.4,
                  "raw_value": 2150,
                  "read_at": 1710300000.0,
                  "source_device": "curtain-01",
                  "source_shadow": "dev-curtain-01",
                  "sampled_at": "2025-03-20T09:15:00Z",
                  "stale": false
                },
                "humidity_pct": {
                  "value": 71.2,
                  "source_device": "curtain-01",
                  "source_shadow": "dev-curtain-01",
                  "sampled_at": "2025-03-20T09:15:00Z",
                  "stale": false
                },
                "co2_ppm": {
                  "value": 850,
                  "source_device": "co2-01",
                  "source_shadow": "dev-co2-01",
                  "sampled_at": "2025-03-20T09:14:50Z",
                  "stale": false
                }
              },
              "updated_at": "2025-03-20T09:15:02Z"
            }
          }
        }
        ```

        </details>
      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              properties:
                config:
                  type: object
                  properties:
                    stale_threshold_sec: {type: integer, default: 120}
            reported:
              type: object
              properties:
                sensors:
                  type: object
                  description: センサーキーをキーとした集約値マップ（任意キーに対応）
                  additionalProperties:
                    type: object
                    description: |
                      object 型: フィールドを直接展開 + source_device / source_shadow / sampled_at / stale
                      スカラー型: {value, source_device, source_shadow, sampled_at, stale}
                    properties:
                      value:         {nullable: true}
                      source_device: {type: string}
                      source_shadow: {type: string, description: dev- プレフィックスの Shadow 名}
                      sampled_at:    {type: string, format: date-time, nullable: true}
                      stale:         {type: boolean}
                    additionalProperties: true
                updated_at: {type: string, format: date-time}

    # ================================================================
    # dev- Shadow スキーマ
    # ================================================================

    DevCurtainShadow:
      type: object
      title: "dev-{device_id} Shadow（例: dev-curtain-01）"
      description: |
        カーテン制御デバイス（curtain-01）の全情報を 1つに統合した Shadow。

        - desired.control       : モーター制御設定・スケジュール（curtain_ctrl プラグイン / ACT.app が書込）
        - desired.sensor_config : センサー収集設定（ACT.app が書込）
        - reported.control      : モーター現在状態・アクティブゾーン（curtain_ctrl プラグインが書込）
        - reported.environment  : 温湿度センサー計測値（Aggregator が書込）
        - reported.device       : デバイス死活・ハードウェア情報（Health Reporter が書込）

        ## 更新タイミング
        | セクション | タイミング |
        |-----------|----------|
        | reported.control.motors | コマンド実行後（即時） |
        | reported.environment | 30秒ごと（telemetry 受信時） |
        | reported.device | 300秒ごと（health 受信時） |

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "control": {
                "mode": "auto",
                "motors": {
                  "M1": {
                    "override": false,
                    "command": null,
                    "threshold": { "open_temp": 28.0, "close_temp": 25.0, "hysteresis": 1.0 }
                  },
                  "M2": {
                    "override": false,
                    "command": null,
                    "threshold": { "open_temp": 30.0, "close_temp": 27.0, "hysteresis": 1.5 }
                  }
