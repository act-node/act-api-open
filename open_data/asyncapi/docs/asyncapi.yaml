asyncapi: 3.0.0

info:
  title: ACT Connect IoT API
  version: 0.9.0
  description: |
    ACT Connect デバイス群と Greengrass アプリケーション間の MQTT / Shadow メッセージ仕様。

    ## Shadow 命名規則

    | プレフィックス | 対象 | 例 |
    |--------------|------|-----|
    | `dev-` | 物理デバイス 1台に対応する Shadow。デバイスの制御・センサー値・状態をすべて 1つにまとめる | `dev-curtain`, `dev-co2` |
    | `zone-` | 棟・エリア単位で共有する Shadow。複数デバイスの集約値や設定を管理する | `zone-env`, `zone-device-registry`, `zone-aggregator-cfg`, `zone-health-cfg` |

    ## Named Shadow 一覧

    ### デバイス固有 Shadow（`dev-` プレフィックス）
    | Shadow 名 | Thing | 書込主体 | 内容 |
    |-----------|-------|----------|------|
    | **dev-curtain** | x320-curtain-01 | Event Router / Aggregator / Health Reporter | カーテン制御 + 温湿度センサーをすべて 1つに統合 |
    | **dev-co2** | Sensor-co2 | Aggregator | CO2・温湿度計測値 |

    ### ゾーン共有 Shadow（`zone-` プレフィックス）
    | Shadow 名 | Thing | 書込主体 | 内容 |
    |-----------|-------|----------|------|
    | **zone-device-registry** | x320-Edge-Node | ACT.app | 全デバイス中央カタログ |
    | **zone-aggregator-cfg** | x320-Edge-Node | ACT.app | Aggregator センサー集約ルーティング |
    | **zone-health-cfg** | x320-Edge-Node | ACT.app / 自動生成 | Health Reporter 報告先設定 |
    | **zone-env** | x320-Edge-Node | Aggregator | エリア内全センサー集約値 |

    ## デバイス構成例
    | デバイスID | device_type | 説明 |
    |-----------|-------------|------|
    | x320-Edge-Node | ─ | 棟単位の仮想 Thing（zone- Shadow の親） |
    | x320-curtain-01 | curtain_ctrl | カーテン開閉・温湿度センサー内蔵 |
    | Sensor-co2 | env_sensor | LoRaWAN CO2センサー |

    ## QoS ポリシー
    | QoS | 対象 | 理由 |
    |-----|------|------|
    | 1 | command / response / event | 取りこぼすと制御不整合 |
    | 0 | telemetry / health | 次回データで補完可能 |

  contact:
    name: ACT Node Inc.
    url: https://act-node.co.jp
  license:
    name: Proprietary

defaultContentType: application/json

servers:
  greengrass-ipc:
    host: /greengrass/v2/ipc.socket
    protocol: greengrassv2
    description: |
      Greengrass IPC Pub/Sub ブローカー。
      同一デバイス上のコンポーネント間通信（Event Router / Aggregator / Health Reporter ↔ Control Logic）。
  local-mqtt:
    host: x320-Edge-Node.local:8883
    protocol: mqtts
    description: |
      LAN 内 MQTT ブローカー（Greengrass MQTT Bridge / MQTTS）。
      別筐体の Control Logic が AWS IoT Device SDK v2 で接続する。X.509 証明書認証。

channels:

  # ================================================================
  # zone- Shadow チャンネル（Thing: x320-Edge-Node）
  # ================================================================

  shadowZoneDeviceRegistryUpdate:
    address: "$aws/things/{thing_name}/shadow/name/zone-device-registry/update"
    description: |
      zone-device-registry Shadow の desired を更新する。

      ## 役割
      全デバイスの中央カタログ。Event Router / Aggregator / Health Reporter が
      30 秒ごとにポーリングし、version 変化を検知した場合にホットリロードする。

      ## 読取後の動作
      | コンポーネント | 動作 |
      |--------------|------|
      | Event Router | 新デバイスの event / response トピックを購読し、device_type に対応するプラグインを割り当てる |
      | Aggregator | 新デバイスのテレメトリトピックを購読する |
      | Health Reporter | 新デバイスのヘルストピックを購読し routing table を更新する |

      ## device_type とプラグイン
      | device_type | Event Router プラグイン |
      |-------------|----------------------|
      | curtain_ctrl | plugins/curtain_ctrl.py |
      | env_sensor | なし（センサーのみ） |
      | edge_ai_cam | plugins/edge_ai_cam.py |
      | actuator_valve | plugins/valve_ctrl.py |

      ## capabilities
      | capability | 対象コンポーネント |
      |-----------|-----------------|
      | motor_control / inference / actuator | Event Router |
      | sensor | Aggregator |
      | health | Health Reporter |
    messages:
      ZoneDeviceRegistryUpdate:
        name: ZoneDeviceRegistryUpdate
        title: zone-device-registry desired 更新
        contentType: application/json
        payload:
          $ref: "#/components/schemas/ZoneDeviceRegistryShadow"
        examples:
          - name: カーテンデバイスと CO2センサーを登録
            payload:
              state:
                desired:
                  devices:
                    x320-curtain-01:
                      device_type: curtain_ctrl
                      thing_name: x320-curtain-01
                      enabled: true
                      capabilities: [motor_control, sensor, health]
                      topics:
                        event:     "x320-curtain-01/curtain/event"
                        response:  "x320-curtain-01/curtain/response"
                        command:   "x320-curtain-01/curtain/command"
                        telemetry: "x320-curtain-01/sensor/telemetry"
                        health:    "x320-curtain-01/health"
                      shadows:
                        device: dev-curtain
                      meta: {}
                    Sensor-co2:
                      device_type: env_sensor
                      thing_name: Sensor-co2
                      enabled: true
                      capabilities: [sensor]
                      topics:
                        event: null
                        response: null
                        command: null
                        telemetry: "Sensor-co2/sensor/telemetry"
                        health: null
                      shadows:
                        device: dev-co2
                      meta: {protocol: lorawan}

  shadowZoneAggregatorCfgUpdate:
    address: "$aws/things/{thing_name}/shadow/name/zone-aggregator-cfg/update"
    description: |
      zone-aggregator-cfg Shadow の更新。

      ## sensor_schema の path 記法
      - フラットフィールド: `"humidity_pct"` → `msg.sensors.humidity_pct`
      - ネストフィールド: `"inference.fps"` → `msg.sensors.inference.fps`

      ## value_type
      | value_type | zone-env への書込形式 |
      |------------|----------------------|
      | object | フィールドを直接展開 + source_device / source_shadow / sampled_at / stale |
      | number / integer 等 | {value, source_device, source_shadow, sampled_at, stale} |

      ## ホットリロード
      ACT.app が desired を更新 → Aggregator が 30秒以内に version 変化を検知 →
      routing_table 再構築 → reported を desired に同期
    messages:
      ZoneAggregatorCfgUpdate:
        name: ZoneAggregatorCfgUpdate
        title: zone-aggregator-cfg 更新
        contentType: application/json
        payload:
          $ref: "#/components/schemas/ZoneAggregatorCfgShadow"
        examples:
          - name: カーテン＋CO2センサーのルーティング
            payload:
              state:
                desired:
                  stale_threshold_sec: 120
                  routing:
                    - device_id: x320-curtain-01
                      shadow_name: dev-curtain
                      sensor_schema:
                        - {key: temperature,  path: temperature,  value_type: object}
                        - {key: humidity_pct, path: humidity_pct, value_type: number}
                      zone_thing: x320-Edge-Node
                      zone_shadow: zone-env
                    - device_id: Sensor-co2
                      shadow_name: dev-co2
                      sensor_schema:
                        - {key: co2_ppm,      path: co2_ppm,      value_type: integer}
                        - {key: temperature,  path: temperature,  value_type: object}
                        - {key: humidity_pct, path: humidity_pct, value_type: number}
                      zone_thing: x320-Edge-Node
                      zone_shadow: zone-env
                reported:
                  stale_threshold_sec: 120
                  routing:
                    - device_id: x320-curtain-01
                      shadow_name: dev-curtain
                      sensor_schema:
                        - {key: temperature,  path: temperature,  value_type: object}
                        - {key: humidity_pct, path: humidity_pct, value_type: number}
                      zone_thing: x320-Edge-Node
                      zone_shadow: zone-env
                    - device_id: Sensor-co2
                      shadow_name: dev-co2
                      sensor_schema:
                        - {key: co2_ppm,      path: co2_ppm,      value_type: integer}
                        - {key: temperature,  path: temperature,  value_type: object}
                        - {key: humidity_pct, path: humidity_pct, value_type: number}
                      zone_thing: x320-Edge-Node
                      zone_shadow: zone-env
          - name: 土壌センサーのルーティング追加例
            payload:
              state:
                desired:
                  stale_threshold_sec: 120
                  routing:
                    - device_id: soil-sensor-01
                      shadow_name: dev-soil
                      sensor_schema:
                        - {key: soil_moisture_pct, path: soil_moisture_pct, value_type: number}
                        - {key: soil_temp,         path: soil_temp,         value_type: object}
                        - {key: ec_mS_cm,          path: ec_mS_cm,          value_type: number}
                      zone_thing: x320-Edge-Node
                      zone_shadow: zone-env

  shadowZoneHealthCfgUpdate:
    address: "$aws/things/{thing_name}/shadow/name/zone-health-cfg/update"
    description: |
      zone-health-cfg Shadow の更新。

      ## 自動生成
      この Shadow が存在しない場合、Health Reporter が zone-device-registry から
      capabilities に "health" を持つデバイスを抽出して自動生成する。

      ## offline 検知
      offline_threshold_sec 以上 health が届かないデバイスの
      target_shadows 全件の reported.device.online を false にする。
    messages:
      ZoneHealthCfgUpdate:
        name: ZoneHealthCfgUpdate
        title: zone-health-cfg 更新
        contentType: application/json
        payload:
          $ref: "#/components/schemas/ZoneHealthCfgShadow"
        examples:
          - name: カーテンデバイスのヘルス報告先
            payload:
              state:
                desired:
                  offline_threshold_sec: 600
                  routing:
                    - device_id: x320-curtain-01
                      target_shadows:
                        - {thing: x320-curtain-01, shadow: dev-curtain}
                reported:
                  offline_threshold_sec: 600
                  routing:
                    - device_id: x320-curtain-01
                      target_shadows:
                        - {thing: x320-curtain-01, shadow: dev-curtain}

  shadowZoneEnvUpdate:
    address: "$aws/things/{thing_name}/shadow/name/zone-env/update"
    description: |
      zone-env Shadow の更新。Aggregator が棟内全センサーの集約値を書き込む。

      ## sensors エントリの形式
      | sensor_schema.value_type | zone-env での形式 |
      |--------------------------|-----------------|
      | object | フィールドを直接展開 + source_device / source_shadow / sampled_at / stale |
      | number / integer 等 | {value, source_device, source_shadow, sampled_at, stale} |

      ## stale 判定
      stale_threshold_sec 以上 telemetry が届かないセンサーを stale: true に更新する。
      Event Router はこれを制御判断から除外する。
    messages:
      ZoneEnvUpdate:
        name: ZoneEnvUpdate
        title: zone-env reported 更新
        contentType: application/json
        payload:
          $ref: "#/components/schemas/ZoneEnvShadow"
        examples:
          - name: 温湿度＋CO2の集約（正常）
            payload:
              state:
                desired:
                  config: {stale_threshold_sec: 120}
                reported:
                  sensors:
                    temperature:
                      value_celsius: 28.4
                      raw_value: 2150
                      read_at: 1710300000.0
                      source_device: x320-curtain-01
                      source_shadow: dev-curtain
                      sampled_at: "2025-03-20T09:15:00Z"
                      stale: false
                    humidity_pct:
                      value: 71.2
                      source_device: x320-curtain-01
                      source_shadow: dev-curtain
                      sampled_at: "2025-03-20T09:15:00Z"
                      stale: false
                    co2_ppm:
                      value: 850
                      source_device: Sensor-co2
                      source_shadow: dev-co2
                      sampled_at: "2025-03-20T09:14:50Z"
                      stale: false
                  updated_at: "2025-03-20T09:15:02Z"
          - name: CO2センサー stale
            payload:
              state:
                reported:
                  sensors:
                    temperature:
                      value_celsius: 28.4
                      source_device: x320-curtain-01
                      source_shadow: dev-curtain
                      sampled_at: "2025-03-20T09:15:00Z"
                      stale: false
                    co2_ppm:
                      value: null
                      source_device: Sensor-co2
                      source_shadow: dev-co2
                      sampled_at: null
                      stale: true
                  updated_at: "2025-03-20T09:15:02Z"

  # ================================================================
  # dev- Shadow チャンネル（Thing: x320-curtain-01）
  # ================================================================

  shadowDevCurtainUpdate:
    address: "$aws/things/{thing_name}/shadow/name/dev-curtain/update"
    description: |
      dev-curtain Shadow の desired / reported を更新する。

      カーテン制御デバイス（x320-curtain-01）に関するすべての情報を 1つの Shadow に統合。
      モーター制御・スケジュール・センサー値・デバイス状態を含む。

      ## 書込主体
      | セクション | 書込主体 |
      |-----------|---------|
      | desired.control | curtain_ctrl プラグイン / ACT.app |
      | desired.sensor_config | ACT.app |
      | reported.control | curtain_ctrl プラグイン（curtain/response 受信後） |
      | reported.environment | Aggregator（telemetry 受信時） |
      | reported.device | Health Reporter（health 受信時） |

      ## 更新タイミング
      | セクション | タイミング |
      |-----------|----------|
      | reported.control.motors | コマンド実行後（即時） |
      | reported.environment | 30秒ごと（telemetry 受信時） |
      | reported.device | 300秒ごと（health 受信時） |
    messages:
      DevCurtainUpdate:
        name: DevCurtainUpdate
        title: dev-curtain Shadow 更新
        contentType: application/json
        payload:
          $ref: "#/components/schemas/DevCurtainShadow"

  # ================================================================
  # dev- Shadow チャンネル（Thing: Sensor-co2）
  # ================================================================

  shadowDevCo2Update:
    address: "$aws/things/{thing_name}/shadow/name/dev-co2/update"
    description: |
      dev-co2 Shadow の更新。

      ## 書込主体
      | セクション | 書込主体 |
      |-----------|---------|
      | desired.sensor_config | ACT.app |
      | reported.environment | Aggregator（telemetry 受信時） |
      | reported.device | Aggregator（stale 検知時のみ online フラグを更新） |

      ## LoRaWAN 特記事項
      health トピックを持たないため reported.device の更新は Aggregator が担当する。
    messages:
      DevCo2Update:
        name: DevCo2Update
        title: dev-co2 更新
        contentType: application/json
        payload:
          $ref: "#/components/schemas/DevCo2Shadow"
        examples:
          - name: CO2センサー計測値
            payload:
              state:
                desired:
                  sensor_config: {interval_sec: 30, co2_calibration_ppm: 0}
                reported:
                  environment:
                    co2_ppm: 850
                    temperature: {value_celsius: 27.8, raw_value: 2100, read_at: 1710299990.0}
                    humidity_pct: 70.5
                    sampled_at: "2025-03-20T09:14:50Z"
                  device: {online: true, firmware: "2.1.0", rssi_dbm: -72, errors: [], last_health_at: null}

  # ================================================================
  # GG IPC Pub/Sub チャンネル
  # ================================================================

  curtainCommand:
    address: "{device_id}/curtain/command"
    description: |
      Event Router の curtain_ctrl プラグインから Control Logic へのモーター制御指示（QoS 1）。

      ## 発行条件（source フィールド）
      | source | 発行契機 |
      |--------|---------|
      | zone_transition | スケジュールゾーン切替 |
      | event:motor_state | 温度閾値超過 / 復帰 |
      | event:limiter | リミッタースイッチ到達 |
      | manual | ACT.app からの手動指示 |
    messages:
      CurtainCommand:
        name: CurtainCommand
        title: カーテン制御コマンド
        contentType: application/json
        payload:
          $ref: "#/components/schemas/CurtainCommandPayload"
        examples:
          - name: 温度閾値超過による開コマンド
            payload:
              command_id: cmd-abc123
              issued_at: "2025-03-20T09:15:00Z"
              source: "event:motor_state"
              zone_id: daytime_auto
              motors:
                M1: {command: forward, target_direction: forward, skip: false}
                M2: {command: forward, target_direction: forward, skip: false}
              options: {stop_before_reverse_ms: 500, cooldown_sec: 30}
              trigger: {event_type: motor_state, temperature_c: 30.6}
          - name: ゾーン切替による強制クローズ
            payload:
              command_id: cmd-def456
              issued_at: "2025-03-20T18:00:01Z"
              source: zone_transition
              zone_id: evening_close
              motors:
                M1: {command: reverse, target_direction: reverse, skip: false}
                M2: {command: reverse, target_direction: reverse, skip: false}
              options: {stop_before_reverse_ms: 500, cooldown_sec: 30}
          - name: リミッター到達による片側 stop（M2 は skip）
            payload:
              command_id: cmd-ghi789
              issued_at: "2025-03-20T09:15:30Z"
              source: "event:limiter"
              zone_id: null
              motors:
                M1: {command: stop, target_direction: stopped, skip: false}
                M2: {command: stop, target_direction: stopped, skip: true, reason: already_at_target}
              options: {stop_before_reverse_ms: 500, cooldown_sec: 30}

  curtainResponse:
    address: "{device_id}/curtain/response"
    description: Control Logic から Event Router へのコマンド実行結果（QoS 1）。
    messages:
      CurtainResponse:
        name: CurtainResponse
        title: コマンド実行結果
        contentType: application/json
        payload:
          $ref: "#/components/schemas/CurtainResponsePayload"
        examples:
          - name: 成功応答
            payload:
              command_id: cmd-abc123
              responded_at: "2025-03-20T09:15:08Z"
              motors:
                M1: {result: success, direction: forward, cooldown_active: true, cooldown_until: 1710300038}
                M2: {result: success, direction: forward, cooldown_active: true, cooldown_until: 1710300043}
          - name: 緊急停止中の拒否
            payload:
              command_id: cmd-ghi789
              responded_at: "2025-03-20T09:22:05Z"
              motors:
                M1: {result: error, reason: emergency_stop_active}
                M2: {result: error, reason: emergency_stop_active}
          - name: クールダウン中の保留
            payload:
              command_id: cmd-jkl012
              responded_at: "2025-03-20T09:20:01Z"
              motors:
                M1: {result: pending, reason: cooldown, retry_after_sec: 18, pending_command: reverse}
                M2: {result: success, direction: reverse, cooldown_active: true, cooldown_until: 1710300061}

  curtainEvent:
    address: "{device_id}/curtain/event"
    description: |
      Control Logic から curtain_ctrl プラグインへの状態変化通知（QoS 1）。

      ## イベント種別
      | event_type | 契機 | プラグインの処理 |
      |-----------|------|--------------|
      | limiter | リミッタースイッチ到達 / 解除 | stop コマンド発行 & dev-curtain 更新 |
      | emergency_stop | 物理ボタン押下 / 解除 | コマンドブロック & dev-curtain 更新 |
      | motor_state | モーター動作状態変化 | dev-curtain ログ記録 |
      | mode_change | auto / manual 切替 | dev-curtain 更新 |
    messages:
      LimiterEvent:
        name: LimiterEvent
        title: リミッター状態変化
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, motor_id, limiter, state, previous_state, timestamp]
          properties:
            device_id:      {type: string}
            event_type:     {type: string, enum: [limiter]}
            motor_id:       {type: string, enum: [M1, M2]}
            limiter:        {type: string, enum: [upper, lower], description: "upper=上限 / lower=下限"}
            state:          {type: string, enum: [active, inactive], description: "active=接点 ON"}
            previous_state: {type: string, enum: [active, inactive]}
            timestamp:      {type: number}
        examples:
          - name: M1 上限リミッター到達
            payload: {device_id: x320-curtain-01, event_type: limiter, motor_id: M1, limiter: upper, state: active, previous_state: inactive, timestamp: 1710300060.0}
      EmergencyStopEvent:
        name: EmergencyStopEvent
        title: 緊急停止
        description: 物理緊急停止ボタンの状態変化。active 中は全コマンドを拒否する。
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, state, timestamp]
          properties:
            device_id:  {type: string}
            event_type: {type: string, enum: [emergency_stop]}
            state:      {type: string, enum: [active, inactive], description: "active=押下中"}
            timestamp:  {type: number}
        examples:
          - name: 緊急停止押下
            payload: {device_id: x320-curtain-01, event_type: emergency_stop, state: active, timestamp: 1710300120.0}
      MotorStateEvent:
        name: MotorStateEvent
        title: モーター状態変化
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, motor_id, direction, previous_direction, reason, timestamp]
          properties:
            device_id:          {type: string}
            event_type:         {type: string, enum: [motor_state]}
            motor_id:           {type: string, enum: [M1, M2]}
            direction:          {type: string, enum: [forward, reverse, stopped]}
            previous_direction: {type: string, enum: [forward, reverse, stopped]}
            reason:             {type: string, enum: [command, limiter, emergency_stop, auto_threshold, error]}
            error_code:         {type: string}
            timestamp:          {type: number}
        examples:
          - name: 自動閾値による起動
            payload: {device_id: x320-curtain-01, event_type: motor_state, motor_id: M1, direction: forward, previous_direction: stopped, reason: auto_threshold, timestamp: 1710300000.0}
          - name: リミッターによる停止
            payload: {device_id: x320-curtain-01, event_type: motor_state, motor_id: M1, direction: stopped, previous_direction: forward, reason: limiter, timestamp: 1710300060.1}
      ModeChangeEvent:
        name: ModeChangeEvent
        title: 動作モード変更
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, mode, previous_mode, timestamp]
          properties:
            device_id:     {type: string}
            event_type:    {type: string, enum: [mode_change]}
            mode:          {type: string, enum: [manual, auto]}
            previous_mode: {type: string, enum: [manual, auto]}
            timestamp:     {type: number}
        examples:
          - name: 手動→自動
            payload: {device_id: x320-curtain-01, event_type: mode_change, mode: auto, previous_mode: manual, timestamp: 1710300000.0}

  sensorTelemetry:
    address: "{device_id}/sensor/telemetry"
    description: |
      Control Logic から Aggregator への定期テレメトリ（QoS 0 / 30秒間隔）。

      ## Aggregator の処理
      1. zone-aggregator-cfg の sensor_schema.path に従い sensors から値を抽出
      2. device_id に対応する dev- Shadow の reported.environment を更新
      3. zone-env の reported.sensors を集約更新

      sensors フィールドはデバイス種別により内容が異なる。
      sensor_schema の path にドット区切りパスを指定することでネスト構造にも対応する。
    messages:
      SensorTelemetry:
        name: SensorTelemetry
        title: センサーテレメトリ
        contentType: application/json
        payload:
          $ref: "#/components/schemas/SensorTelemetryPayload"
        examples:
          - name: カーテン制御デバイス（温湿度＋モーター状態）
            payload:
              device_id: x320-curtain-01
              timestamp: 1710300000.0
              mode: auto
              emergency_stop: inactive
              sensors:
                temperature: {value_celsius: 28.4, raw_value: 2150, read_at: 1710299998.5}
                humidity_pct: 71.2
              motors:
                M1: {direction: stopped, limit_upper: inactive, limit_lower: inactive}
                M2: {direction: stopped, limit_upper: inactive, limit_lower: inactive}
              sampled_at: "2025-03-20T09:15:00Z"
          - name: CO2センサー
            payload:
              device_id: Sensor-co2
              timestamp: 1710300000.0
              sensors:
                co2_ppm: 850
                temperature: {value_celsius: 27.8, raw_value: 2100, read_at: 1710299998.0}
                humidity_pct: 70.5
              sampled_at: "2025-03-20T09:15:00Z"
          - name: 土壌センサー（追加例）
            payload:
              device_id: soil-sensor-01
              timestamp: 1710300000.0
              sensors:
                soil_moisture_pct: 62.3
                soil_temp: {value_celsius: 18.5, raw_value: 1420, read_at: 1710299998.0}
                ec_mS_cm: 1.8
              sampled_at: "2025-03-20T09:15:00Z"

  deviceHealth:
    address: "{device_id}/health"
    description: |
      デバイスから Health Reporter への死活情報（QoS 0 / 300秒間隔）。

      ## トピックパス
      zone-device-registry の topics.health フィールドで定義する。

      ## Health Reporter の処理
      1. device_id を元に zone-health-cfg から target_shadows を取得
      2. 共通フィールドを DeviceDocument として各 dev- Shadow の reported.device に書込む
      3. extra フィールドは DeviceDocument.extra にそのまま格納する
    messages:
      DeviceHealth:
        name: DeviceHealth
        title: デバイスヘルスチェック
        contentType: application/json
        payload:
          $ref: "#/components/schemas/DeviceHealthPayload"
        examples:
          - name: カーテン制御デバイス（X320）
            payload:
              device_id: x320-curtain-01
              timestamp: 1710300000.0
              uptime_sec: 86400
              mqtt_connected: true
              firmware: "1.4.2"
              rssi_dbm: -65
              do_channels: [EXT_DO0, EXT_DO1, EXT_DO2, EXT_DO3]
              di_channels: [Filtered_DI0, Filtered_DI1, Filtered_DI2, Filtered_DI3, Filtered_DI4]
              ai_available: true
              errors: []
          - name: エッジAIカメラ（extra 使用）
            payload:
              device_id: edge-ai-cam-01
              timestamp: 1710300000.0
              uptime_sec: 43200
              mqtt_connected: true
              firmware: "3.1.0"
              rssi_dbm: -58
              errors: []
              extra:
                cpu_temp_c: 62.1
                memory_used_mb: 1842
                inference_fps: 12.4
                model_version: yolov8n-v3

operations:

  receiveCommand:
    action: receive
    channel:
      $ref: "#/channels/curtainCommand"
    summary: モーター制御コマンドを受信する
    description: |
      Event Router の curtain_ctrl プラグインからモーター制御指示を受け取る。
      コマンド実行後は必ず publishResponse で結果を返す。
    bindings:
      mqtt: {qos: 1}

  publishResponse:
    action: send
    channel:
      $ref: "#/channels/curtainResponse"
    summary: コマンド実行結果を返す
    description: |
      受け取ったコマンドの実行結果を Event Router へ返す。
      curtain_ctrl プラグインはこの結果を元に dev-curtain Shadow の
      reported.control.motors を更新する。
    bindings:
      mqtt: {qos: 1, retain: false}

  publishCurtainEvent:
    action: send
    channel:
      $ref: "#/channels/curtainEvent"
    summary: 状態変化イベントを送信する（QoS 1）
    description: LimiterEvent / EmergencyStopEvent / MotorStateEvent / ModeChangeEvent
    bindings:
      mqtt: {qos: 1, retain: false}

  publishTelemetry:
    action: send
    channel:
      $ref: "#/channels/sensorTelemetry"
    summary: 定期センサーデータを送信する（30秒間隔 / QoS 0）
    bindings:
      mqtt: {qos: 0, retain: false}

  publishHealth:
    action: send
    channel:
      $ref: "#/channels/deviceHealth"
    summary: ヘルスチェック情報を送信する（300秒間隔 / QoS 0）
    bindings:
      mqtt: {qos: 0, retain: false}

# ================================================================
# components.schemas
# ================================================================

components:
  schemas:

    # ================================================================
    # 共有スキーマ
    # ================================================================

    DeviceDocument:
      type: object
      title: DeviceDocument
      description: |
        全 dev- Shadow の reported.device で共通して使用するスキーマ。
        Health Reporter が health 受信時 / offline 検知時に書き込む。
        do_channels / di_channels / ai_available は X320 系デバイスのみ含める。
        デバイス種別固有フィールドは extra にまとめる。
      required: [online, firmware, rssi_dbm, errors, last_health_at]
      properties:
        online:          {type: boolean, description: "true=正常通信中 / false=offline_threshold_sec 超過"}
        firmware:        {type: string}
        rssi_dbm:        {type: integer, description: "Wi-Fi 受信電波強度（dBm）"}
        uptime_sec:      {type: integer, minimum: 0}
        mqtt_connected:  {type: boolean}
        errors:          {type: array, items: {type: string}}
        last_health_at:  {type: string, format: date-time, nullable: true}
        do_channels:     {type: array, items: {type: string}, description: デジタル出力（X320 系のみ）}
        di_channels:     {type: array, items: {type: string}, description: デジタル入力（X320 系のみ）}
        ai_available:    {type: boolean, description: アナログ入力 / AI 推論（X320 系のみ）}
        extra:           {type: object, additionalProperties: true, description: デバイス種別固有フィールド}

    DeviceHealthPayload:
      type: object
      title: DeviceHealthPayload
      description: 全デバイス共通ヘルスチェックメッセージ。種別固有フィールドは extra にまとめる。
      required: [device_id, timestamp, uptime_sec, mqtt_connected, firmware, rssi_dbm, errors]
      properties:
        device_id:      {type: string}
        timestamp:      {type: number}
        uptime_sec:     {type: integer, minimum: 0}
        mqtt_connected: {type: boolean}
        firmware:       {type: string}
        rssi_dbm:       {type: integer, minimum: -120, maximum: 0}
        do_channels:    {type: array, items: {type: string}}
        di_channels:    {type: array, items: {type: string}}
        ai_available:   {type: boolean}
        errors:         {type: array, items: {type: string}}
        extra:          {type: object, additionalProperties: true}

    SensorTelemetryPayload:
      type: object
      title: SensorTelemetryPayload
      description: |
        全デバイス共通テレメトリメッセージ。
        Aggregator は zone-aggregator-cfg の sensor_schema.path に従い
        sensors から値を抽出して dev- Shadow / zone-env を更新する。
      required: [device_id, timestamp, sensors, sampled_at]
      properties:
        device_id:      {type: string}
        timestamp:      {type: number}
        sensors:        {type: object, additionalProperties: true, description: センサー計測値マップ}
        sampled_at:     {type: string, format: date-time}
        mode:           {type: string, enum: [manual, auto], description: 動作モード（制御デバイスのみ）}
        emergency_stop: {type: string, enum: [active, inactive], description: 緊急停止状態（制御デバイスのみ）}
        motors:
          type: object
          description: モーター状態（curtain_ctrl デバイスのみ）
          additionalProperties:
            type: object
            properties:
              direction:   {type: string, enum: [forward, reverse, stopped]}
              limit_upper: {type: string, enum: [active, inactive]}
              limit_lower: {type: string, enum: [active, inactive]}

    # ================================================================
    # zone- Shadow スキーマ
    # ================================================================

    ZoneDeviceRegistryShadow:
      type: object
      title: zone-device-registry Shadow
      description: |
        全デバイスの中央カタログ。Thing: x320-Edge-Node

        3コンポーネントが 30秒ごとにポーリングし version 変化でホットリロードする。
        zone-device-registry の shadows フィールドは dev- Shadow 名を保持する。
        1物理デバイス = 1つの dev- Shadow のため、shadows.device に 1エントリのみ設定する。

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "devices": {
                "x320-curtain-01": {
                  "device_type": "curtain_ctrl",
                  "thing_name": "x320-curtain-01",
                  "enabled": true,
                  "capabilities": ["motor_control", "sensor", "health"],
                  "topics": {
                    "event":     "x320-curtain-01/curtain/event",
                    "response":  "x320-curtain-01/curtain/response",
                    "command":   "x320-curtain-01/curtain/command",
                    "telemetry": "x320-curtain-01/sensor/telemetry",
                    "health":    "x320-curtain-01/health"
                  },
                  "shadows": {
                    "device": "dev-curtain"
                  },
                  "meta": {}
                },
                "Sensor-co2": {
                  "device_type": "env_sensor",
                  "thing_name": "Sensor-co2",
                  "enabled": true,
                  "capabilities": ["sensor"],
                  "topics": {
                    "event":     null,
                    "response":  null,
                    "command":   null,
                    "telemetry": "Sensor-co2/sensor/telemetry",
                    "health":    null
                  },
                  "shadows": {
                    "device": "dev-co2"
                  },
                  "meta": { "protocol": "lorawan" }
                }
              }
            }
          }
        }
        ```

        </details>
      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              required: [devices]
              properties:
                devices:
                  type: object
                  additionalProperties:
                    $ref: "#/components/schemas/DeviceEntry"

    DeviceEntry:
      type: object
      title: DeviceEntry
      description: zone-device-registry の 1デバイス分のエントリ
      required: [device_type, thing_name, enabled, capabilities, topics, shadows]
      properties:
        device_type:
          type: string
          examples: [curtain_ctrl, env_sensor, soil_sensor, edge_ai_cam, actuator_valve]
        thing_name:  {type: string}
        enabled:     {type: boolean, default: true}
        capabilities:
          type: array
          items:
            type: string
            enum: [motor_control, sensor, health, inference, actuator, gateway]
        topics:
          type: object
          properties:
            event:     {type: ["string", "null"]}
            response:  {type: ["string", "null"]}
            command:   {type: ["string", "null"]}
            telemetry: {type: ["string", "null"]}
            health:    {type: ["string", "null"]}
        shadows:
          type: object
          description: |
            デバイスに関連する Shadow のマップ。
            1物理デバイス = 1 dev- Shadow のため、device キーに dev- Shadow 名を設定する。
            追加の用途固有 Shadow が必要な場合のみ別キーを追加する。
          required: [device]
          properties:
            device:
              type: ["string", "null"]
              description: デバイス固有 Shadow（dev- プレフィックス）
          additionalProperties: {type: ["string", "null"]}
        meta:
          type: object
          additionalProperties: true

    ZoneAggregatorCfgShadow:
      type: object
      title: zone-aggregator-cfg Shadow
      description: |
        Aggregator のルーティング設定。Thing: x320-Edge-Node
        desired と reported が一致している状態が「設定適用済み」を示す。

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "stale_threshold_sec": 120,
              "routing": [
                {
                  "device_id": "x320-curtain-01",
                  "shadow_name": "dev-curtain",
                  "sensor_schema": [
                    { "key": "temperature",  "path": "temperature",  "value_type": "object" },
                    { "key": "humidity_pct", "path": "humidity_pct", "value_type": "number" }
                  ],
                  "zone_thing": "x320-Edge-Node",
                  "zone_shadow": "zone-env"
                },
                {
                  "device_id": "Sensor-co2",
                  "shadow_name": "dev-co2",
                  "sensor_schema": [
                    { "key": "co2_ppm",      "path": "co2_ppm",      "value_type": "integer" },
                    { "key": "temperature",  "path": "temperature",  "value_type": "object" },
                    { "key": "humidity_pct", "path": "humidity_pct", "value_type": "number" }
                  ],
                  "zone_thing": "x320-Edge-Node",
                  "zone_shadow": "zone-env"
                }
              ]
            },
            "reported": {
              "stale_threshold_sec": 120,
              "routing": [
                {
                  "device_id": "x320-curtain-01",
                  "shadow_name": "dev-curtain",
                  "sensor_schema": [
                    { "key": "temperature",  "path": "temperature",  "value_type": "object" },
                    { "key": "humidity_pct", "path": "humidity_pct", "value_type": "number" }
                  ],
                  "zone_thing": "x320-Edge-Node",
                  "zone_shadow": "zone-env"
                },
                {
                  "device_id": "Sensor-co2",
                  "shadow_name": "dev-co2",
                  "sensor_schema": [
                    { "key": "co2_ppm",      "path": "co2_ppm",      "value_type": "integer" },
                    { "key": "temperature",  "path": "temperature",  "value_type": "object" },
                    { "key": "humidity_pct", "path": "humidity_pct", "value_type": "number" }
                  ],
                  "zone_thing": "x320-Edge-Node",
                  "zone_shadow": "zone-env"
                }
              ]
            }
          }
        }
        ```

        </details>
      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              required: [stale_threshold_sec, routing]
              properties:
                stale_threshold_sec: {type: integer, default: 120}
                routing:
                  type: array
                  items:
                    $ref: "#/components/schemas/AggregatorRoutingEntry"
            reported:
              type: object
              description: desired と同じ構造。一致している状態が「設定適用済み」

    AggregatorRoutingEntry:
      type: object
      required: [device_id, shadow_name, sensor_schema, zone_thing, zone_shadow]
      properties:
        device_id:
          type: string
        shadow_name:
          type: string
          description: デバイス固有 Shadow 名（dev- プレフィックス）。Aggregator が reported.environment を更新する
          example: dev-curtain
        sensor_schema:
          type: array
          description: センサーフィールド抽出スキーマ
          items:
            type: object
            required: [key, path, value_type]
            properties:
              key:        {type: string, description: zone-env / dev- Shadow への書込キー名}
              path:       {type: string, description: "msg.sensors 内のフィールドパス（ドット区切り）"}
              value_type: {type: string, enum: [object, number, integer, string, boolean]}
        zone_thing:
          type: string
        zone_shadow:
          type: string
          description: 集約先 zone- Shadow 名
          example: zone-env

    ZoneHealthCfgShadow:
      type: object
      title: zone-health-cfg Shadow
      description: |
        Health Reporter のルーティング設定。Thing: x320-Edge-Node
        不在時は Health Reporter が zone-device-registry から自動生成する。

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "offline_threshold_sec": 600,
              "routing": [
                {
                  "device_id": "x320-curtain-01",
                  "target_shadows": [
                    { "thing": "x320-curtain-01", "shadow": "dev-curtain" }
                  ]
                }
              ]
            },
            "reported": {
              "offline_threshold_sec": 600,
              "routing": [
                {
                  "device_id": "x320-curtain-01",
                  "target_shadows": [
                    { "thing": "x320-curtain-01", "shadow": "dev-curtain" }
                  ]
                }
              ]
            }
          }
        }
        ```

        </details>
      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              required: [offline_threshold_sec, routing]
              properties:
                offline_threshold_sec: {type: integer, default: 600}
                routing:
                  type: array
                  items:
                    type: object
                    required: [device_id, target_shadows]
                    properties:
                      device_id: {type: string}
                      target_shadows:
                        type: array
                        description: reported.device を更新する dev- Shadow のリスト
                        items:
                          type: object
                          required: [thing, shadow]
                          properties:
                            thing:  {type: string}
                            shadow: {type: string, description: "dev- プレフィックスの Shadow 名"}
            reported:
              type: object
              description: desired と同じ構造。一致している状態が「設定適用済み」

    ZoneEnvShadow:
      type: object
      title: zone-env Shadow
      description: |
        棟内全センサーの集約値。Thing: x320-Edge-Node

        sensors キーは zone-aggregator-cfg の sensor_schema.key と同一。
        stale=true のエントリは Event Router が制御判断から除外する。

        ## source_shadow の値
        zone-env の source_shadow フィールドには dev- Shadow 名が記録される。
        これにより、どのデバイスのどの Shadow から来たデータかを追跡できる。

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "config": {
                "stale_threshold_sec": 120
              }
            },
            "reported": {
              "sensors": {
                "temperature": {
                  "value_celsius": 28.4,
                  "raw_value": 2150,
                  "read_at": 1710300000.0,
                  "source_device": "x320-curtain-01",
                  "source_shadow": "dev-curtain",
                  "sampled_at": "2025-03-20T09:15:00Z",
                  "stale": false
                },
                "humidity_pct": {
                  "value": 71.2,
                  "source_device": "x320-curtain-01",
                  "source_shadow": "dev-curtain",
                  "sampled_at": "2025-03-20T09:15:00Z",
                  "stale": false
                },
                "co2_ppm": {
                  "value": 850,
                  "source_device": "Sensor-co2",
                  "source_shadow": "dev-co2",
                  "sampled_at": "2025-03-20T09:14:50Z",
                  "stale": false
                }
              },
              "updated_at": "2025-03-20T09:15:02Z"
            }
          }
        }
        ```

        </details>
      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              properties:
                config:
                  type: object
                  properties:
                    stale_threshold_sec: {type: integer, default: 120}
            reported:
              type: object
              properties:
                sensors:
                  type: object
                  additionalProperties:
                    type: object
                    description: |
                      object 型: フィールドを直接展開 + source_device / source_shadow / sampled_at / stale
                      スカラー型: {value, source_device, source_shadow, sampled_at, stale}
                    properties:
                      value:         {nullable: true}
                      source_device: {type: string}
                      source_shadow: {type: string, description: dev- プレフィックスの Shadow 名}
                      sampled_at:    {type: string, format: date-time, nullable: true}
                      stale:         {type: boolean}
                    additionalProperties: true
                updated_at: {type: string, format: date-time}

    # ================================================================
    # dev- Shadow スキーマ（デバイス固有）
    # ================================================================

    DevCurtainShadow:
      type: object
      title: dev-curtain Shadow
      description: |
        カーテン制御デバイス（x320-curtain-01）の全情報を 1つに統合した Shadow。

        - desired.control       : モーター制御設定・スケジュール（Event Router / ACT.app が書込）
        - desired.sensor_config : センサー収集設定（ACT.app が書込）
        - reported.control      : モーター現在状態・アクティブゾーン（curtain_ctrl プラグインが書込）
        - reported.environment  : 温湿度センサー計測値（Aggregator が書込）
        - reported.device       : デバイス死活・ハードウェア情報（Health Reporter が書込）

        ## 更新タイミング
        | セクション | タイミング |
        |-----------|----------|
        | reported.control.motors | コマンド実行後（即時） |
        | reported.environment | 30秒ごと（telemetry 受信時） |
        | reported.device | 300秒ごと（health 受信時） |

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "control": {
                "mode": "auto",
                "motors": {
                  "M1": {
                    "override": false,
                    "command": null,
                    "threshold": { "open_temp": 28.0, "close_temp": 25.0, "hysteresis": 1.0 }
                  },
                  "M2": {
                    "override": false,
                    "command": null,
                    "threshold": { "open_temp": 30.0, "close_temp": 27.0, "hysteresis": 1.5 }
                  }
                },
                "schedule": {
                  "enabled": true,
                  "timezone": "Asia/Tokyo",
                  "time_zones": [
                    { "id": "night_close",   "from": "00:00", "to": "08:00", "control": "force_close" },
                    { "id": "daytime_auto",  "from": "08:00", "to": "18:00", "control": "temperature" },
                    { "id": "evening_close", "from": "18:00", "to": "24:00", "control": "force_close" }
                  ]
                },
                "motor_config": { "stop_before_reverse_ms": 500, "cooldown_sec": 30 }
              },
              "sensor_config": { "interval_sec": 30, "unit_temperature": "celsius" }
            },
            "reported": {
              "control": {
                "mode": "auto",
                "emergency_stop": "inactive",
                "motors": {
                  "M1": {
                    "direction": "stopped",
                    "limit_upper": "inactive",
                    "limit_lower": "inactive",
                    "cooldown_active": false,
                    "cooldown_until": null,
                    "pending_command": null,
                    "last_command": "forward",
                    "last_operated_at": "2025-03-20T08:00:05Z",
                    "operation_count": 1205,
                    "error_code": null
                  },
                  "M2": {
                    "direction": "stopped",
