    # ----------------------------------------------------------
    # zone-env Shadow
    # Thing: x320-Edge-Node（棟単位の仮想Thing）
    # ----------------------------------------------------------
    ZoneEnvShadow:
      type: object
      title: zone-env Shadow
      description: |
        棟内全センサーの集約値。Event Router が制御判断に参照する。

        ## 書込主体
        | セクション | 書込主体 |
        |-----------|---------|
        | desired.config | ACT.app |
        | reported.sensors | Sensor Aggregator |

        ## stale 判定ロジック
        stale_threshold_sec（デフォルト120秒）以内に telemetry が届かない場合、
        Sensor Aggregator が該当センサーの stale を true にする。
        Event Router は stale=true のセンサー値を制御判断から除外する。

        ## source_device の意義
        どのデバイスから来たデータかを記録することで
        故障調査・データ可視化・複数センサー平均計算に対応できる。
        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "config": {
                "stale_threshold_sec": 120
              }
            },
            "reported": {
              "sensors": {
                "temperature": {
                  "value_celsius": 28.4,
                  "raw_value": 2150,
                  "read_at": 1710300000.0,
                  "source_device": "x320-curtain-01",
                  "source_shadow": "curtain-sensor",
                  "sampled_at": "2025-03-20T09:15:00Z",
                  "stale": false
                },
                "humidity_pct": {
                  "value": 71.2,
                  "source_device": "x320-curtain-01",
                  "source_shadow": "curtain-sensor",
                  "sampled_at": "2025-03-20T09:15:00Z",
                  "stale": false
                },
                "co2_ppm": {
                  "value": 850,
                  "source_device": "Sensor-co2",
                  "source_shadow": "co2-sensor",
                  "sampled_at": "2025-03-20T09:14:50Z",
                  "stale": false
                }
              },
              "updated_at": "2025-03-20T09:15:02Z"
            }
          }
        }
        ```

        </details>

      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              properties:
                config:
                  type: object
                  properties:
                    stale_threshold_sec:
                      type: integer
                      description: stale 判定までの秒数（全センサー共通）
                      default: 120
            reported:
              type: object
              properties:
                sensors:
                  type: object
                  description: センサーキーをキーとした集約値マップ
                  properties:
                    temperature:
                      type: object
                      properties:
                        value_celsius:
                          type: number
                          nullable: true
                        raw_value:
                          type: integer
                          nullable: true
                        read_at:
                          type: number
                          nullable: true
                        source_device:
                          type: string
                          description: 送信元デバイスID
                        source_shadow:
                          type: string
                          description: 送信元 Shadow 名
                        sampled_at:
                          type: string
                          format: date-time
                          nullable: true
                        stale:
                          type: boolean
                          description: "true=stale_threshold_sec 秒以上無通信。制御判断から除外"
                    humidity_pct:
                      type: object
                      properties:
                        value:
                          type: number
                          nullable: true
                        source_device:
                          type: string
                        source_shadow:
                          type: string
                        sampled_at:
                          type: string
                          format: date-time
                          nullable: true
                        stale:
                          type: boolean
                    co2_ppm:
                      type: object
                      properties:
                        value:
                          type: integer
                          nullable: true
                        source_device:
                          type: string
                        source_shadow:
                          type: string
                        sampled_at:
                          type: string
                          format: date-time
                          nullable: true
                        stale:
                          type: boolean
                updated_at:
                  type: string
                  format: date-time
      example:
        state:
          desired:
            config:
              stale_threshold_sec: 120
          reported:
            sensors:
              temperature:
                value_celsius: 28.4
                raw_value: 2150
                read_at: 1710300000.0
                source_device: x320-curtain-01
                source_shadow: curtain-sensor
                sampled_at: "2025-03-20T09:15:00Z"
                stale: false
              humidity_pct:
                value: 71.2
                source_device: x320-curtain-01
                source_shadow: curtain-sensor
                sampled_at: "2025-03-20T09:15:00Z"
                stale: false
              co2_ppm:
                value: 850
                source_device: Sensor-co2
                source_shadow: co2-sensor
                sampled_at: "2025-03-20T09:14:50Z"
                stale: false
            updated_at: "2025-03-20T09:15:02Z"

    # ----------------------------------------------------------
    # aggregator-config Shadow
    # Thing: x320-Edge-Node
    # ----------------------------------------------------------
    AggregatorConfigShadow:
      type: object
      title: aggregator-config Shadow
      description: |
        Sensor Aggregator のルーティング設定。
        どのデバイスのどのセンサーキーをどの zone-env に集約するかを定義する。

        ## 書込主体
        | セクション | 書込主体 |
        |-----------|---------|
        | desired | ACT.app（設定変更） |
        | reported | Sensor Aggregator（適用完了後に desired と同期） |

        ## ホットリロードの仕組み
        1. ACT.app が desired を更新する
        2. AWS IoT が delta を生成して Sensor Aggregator に配信する
        3. Sensor Aggregator が GetThingShadow で最新 desired を取得して routing_table を再構築する
        4. 再構築後に reported を desired に同期して delta を解消する
        5. 以降の telemetry 受信から新しいルーティングが有効になる

        ## desired == reported の意味
        desired と reported が一致している状態が「設定適用済み」を示す。
        差異がある間は Sensor Aggregator が再起動中または未起動の可能性がある。
        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "stale_threshold_sec": 120,
              "routing": [
                {
                  "device_id": "x320-curtain-01",
                  "shadow_name": "curtain-sensor",
                  "sensor_keys": [
                    "temperature",
                    "humidity_pct"
                  ],
                  "zone_thing": "x320-Edge-Node",
                  "zone_shadow": "zone-env"
                },
                {
                  "device_id": "Sensor-co2",
                  "shadow_name": "co2-sensor",
                  "sensor_keys": [
                    "co2_ppm",
                    "temperature",
                    "humidity_pct"
                  ],
                  "zone_thing": "x320-Edge-Node",
                  "zone_shadow": "zone-env"
                }
              ]
            },
            "reported": {
              "stale_threshold_sec": 120,
              "routing": [
                {
                  "device_id": "x320-curtain-01",
                  "shadow_name": "curtain-sensor",
                  "sensor_keys": [
                    "temperature",
                    "humidity_pct"
                  ],
                  "zone_thing": "x320-Edge-Node",
                  "zone_shadow": "zone-env"
                },
                {
                  "device_id": "Sensor-co2",
                  "shadow_name": "co2-sensor",
                  "sensor_keys": [
                    "co2_ppm",
                    "temperature",
                    "humidity_pct"
                  ],
                  "zone_thing": "x320-Edge-Node",
                  "zone_shadow": "zone-env"
                }
              ]
            }
          }
        }
        ```

        </details>

      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              required: [stale_threshold_sec, routing]
              properties:
                stale_threshold_sec:
                  type: integer
                  description: stale 判定までの秒数（全デバイス共通）
                  default: 120
                routing:
                  type: array
                  description: デバイスごとの集約ルーティング定義
                  items:
                    type: object
                    required: [device_id, shadow_name, sensor_keys, zone_thing, zone_shadow]
                    properties:
                      device_id:
                        type: string
                        description: 対象デバイスID
                      shadow_name:
                        type: string
                        description: 対象デバイスの Shadow 名
                      sensor_keys:
                        type: array
                        items:
                          type: string
                        description: zone-env に集約するセンサーキー
                      zone_thing:
                        type: string
                        description: 集約先の Thing 名
                      zone_shadow:
                        type: string
                        description: 集約先の Shadow 名
            reported:
              type: object
              description: desired と同じ構造。desired と一致している状態が「設定適用済み」
              properties:
                stale_threshold_sec:
                  type: integer
                routing:
                  type: array
                  items:
                    type: object
      example:
        state:
          desired:
            stale_threshold_sec: 120
            routing:
              - device_id: x320-curtain-01
                shadow_name: curtain-sensor
                sensor_keys: [temperature, humidity_pct]
                zone_thing: x320-Edge-Node
                zone_shadow: zone-env
              - device_id: Sensor-co2
                shadow_name: co2-sensor
                sensor_keys: [co2_ppm, temperature, humidity_pct]
                zone_thing: x320-Edge-Node
                zone_shadow: zone-env
          reported:
            stale_threshold_sec: 120
            routing:
              - device_id: x320-curtain-01
                shadow_name: curtain-sensor
                sensor_keys: [temperature, humidity_pct]
                zone_thing: x320-Edge-Node
                zone_shadow: zone-env
              - device_id: Sensor-co2
                shadow_name: co2-sensor
                sensor_keys: [co2_ppm, temperature, humidity_pct]
                zone_thing: x320-Edge-Node
                zone_shadow: zone-env

    # ----------------------------------------------------------
    # health-reporter-config Shadow
    # Thing: x320-Edge-Node
    # ----------------------------------------------------------
    HealthReporterConfigShadow:
      type: object
      title: health-reporter-config Shadow
      description: |
        Health Reporter のルーティング設定。
        デバイスの health 受信時にどの Shadow の reported.device を更新するかを定義する。

        ## 書込主体
        | セクション | 書込主体 |
        |-----------|---------|
        | desired | ACT.app（設定変更） |
        | reported | Health Reporter（適用完了後に desired と同期） |

        ## ホットリロードの仕組み
        aggregator-config と同じパターン。
        desired を変更すると delta が発生し Health Reporter が routing_table を再構築する。

        ## offline 検知ロジック
        offline_threshold_sec（デフォルト600秒）以内に health が届かない場合、
        Health Reporter が target_shadows 全件の reported.device.online を false にする。
        health が再び届いた場合は online を true に戻す。

        ## LoRaWAN デバイス（Sensor-co2）について
        LoRaWAN デバイスは MQTT health トピックを使用しないため
        health-reporter-config のルーティング対象から除外する。

        ## x320-curtain-01 が 2つの Shadow を持つ理由
        カーテン開閉デバイスは curtain-ctrl と curtain-sensor の
        2つの Shadow を持つため、両方の reported.device を更新する必要がある。
        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
