        </details>
      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              properties:
                control:
                  type: object
                  description: モーター制御設定
                  properties:
                    mode:
                      type: string
                      enum: [auto, manual]
                      description: "auto=温度・スケジュールで自動制御 / manual=手動コマンドのみ"
                    motors:
                      type: object
                      properties:
                        M1: &motor_desired
                          type: object
                          properties:
                            override:  {type: boolean, default: false, description: "true=グループ指示を無視して command を優先"}
                            command:   {type: string, enum: [forward, reverse, stop], nullable: true}
                            threshold:
                              type: object
                              properties:
                                open_temp:  {type: number, description: この温度以上でカーテンを開く（℃）}
                                close_temp: {type: number, description: この温度以下でカーテンを閉じる（℃）}
                                hysteresis: {type: number, minimum: 0, description: チャタリング防止幅（℃）}
                        M2: *motor_desired
                    schedule:
                      type: object
                      properties:
                        enabled:  {type: boolean}
                        timezone: {type: string, description: IANA タイムゾーン識別子}
                        time_zones:
                          type: array
                          items:
                            type: object
                            required: [id, from, to, control]
                            properties:
                              id:      {type: string}
                              from:    {type: string, description: "開始時刻（HH:MM）"}
                              to:      {type: string, description: "終了時刻（HH:MM）"}
                              control: {type: string, enum: [force_close, temperature, force_open]}
                    motor_config:
                      type: object
                      properties:
                        stop_before_reverse_ms: {type: integer, default: 500, description: 逆転前停止待機（ms）}
                        cooldown_sec:           {type: integer, default: 30,  description: 動作後冷却待機（秒）}
                sensor_config:
                  type: object
                  description: センサー収集設定
                  properties:
                    interval_sec:     {type: integer, default: 30}
                    unit_temperature: {type: string, enum: [celsius, fahrenheit], default: celsius}
            reported:
              type: object
              properties:
                control:
                  type: object
                  description: モーター現在状態・アクティブゾーン（curtain_ctrl プラグインが書込）
                  properties:
                    mode:           {type: string, enum: [auto, manual]}
                    emergency_stop: {type: string, enum: [active, inactive], description: "active 中は全コマンド拒否"}
                    motors:
                      type: object
                      properties:
                        M1: &motor_reported
                          type: object
                          properties:
                            direction:        {type: string, enum: [forward, reverse, stopped]}
                            limit_upper:      {type: string, enum: [active, inactive], description: "active=上限到達 → forward を拒否"}
                            limit_lower:      {type: string, enum: [active, inactive], description: "active=下限到達 → reverse を拒否"}
                            cooldown_active:  {type: boolean, description: "true=クールダウン中。新規コマンドは pending_command に保留"}
                            cooldown_until:   {type: number, nullable: true, description: クールダウン解除時刻（Unix epoch 秒）}
                            pending_command:  {type: string, nullable: true, description: クールダウン解除後に自動実行するコマンド}
                            last_command:     {type: string, nullable: true}
                            last_operated_at: {type: string, format: date-time, nullable: true}
                            operation_count:  {type: integer, minimum: 0, description: 累計動作回数（保守・寿命管理用）}
                            error_code:       {type: string, nullable: true, description: "null=正常 / E01=過電流 / E02=タイムアウト / E03=センサー異常"}
                        M2: *motor_reported
                    active_zone:
                      type: object
                      properties:
                        id:         {type: string}
                        control:    {type: string, enum: [force_close, temperature, force_open]}
                        entered_at: {type: string, format: date-time}
                    schedule:
                      type: object
                      properties:
                        last_executed_zone: {type: string, nullable: true}
                        last_executed_at:   {type: string, format: date-time, nullable: true}
                        next_zone:          {type: string, nullable: true}
                        next_zone_at:       {type: string, format: date-time, nullable: true}
                environment:
                  type: object
                  description: 温湿度センサー計測値（Aggregator が書込）
                  properties:
                    temperature:
                      type: object
                      properties:
                        value_celsius: {type: number, minimum: -40, maximum: 85}
                        raw_value:     {type: integer, minimum: 0, maximum: 4095, description: "AD変換生データ（12bit）"}
                        read_at:       {type: number, description: センサー読取時刻（Unix epoch 秒）}
                    humidity_pct: {type: number, minimum: 0, maximum: 100}
                    sampled_at:   {type: string, format: date-time}
                device:
                  type: object
                  description: デバイス死活・ハードウェア情報（Health Reporter が書込）
                  required: [online, firmware, rssi_dbm, errors, last_health_at]
                  properties:
                    online:         {type: boolean, description: "true=正常通信中 / false=offline_threshold_sec 超過"}
                    firmware:       {type: string}
                    rssi_dbm:       {type: integer, description: "Wi-Fi 受信電波強度（dBm）"}
                    uptime_sec:     {type: integer, minimum: 0}
                    mqtt_connected: {type: boolean}
                    errors:         {type: array, items: {type: string}}
                    last_health_at: {type: string, format: date-time, nullable: true}
                    do_channels:    {type: array, items: {type: string}, description: デジタル出力（X320 系のみ）}
                    di_channels:    {type: array, items: {type: string}, description: デジタル入力（X320 系のみ）}
                    ai_available:   {type: boolean, description: アナログ入力 / AI 推論（X320 系のみ）}
                    extra:          {type: object, additionalProperties: true, description: デバイス種別固有フィールド}

    DevCo2Shadow:
      type: object
      title: "dev-{device_id} Shadow（例: dev-co2-01）"
      description: |
        LoRaWAN CO2センサー（co2-01）の全情報を 1つに統合した Shadow。

        - desired.sensor_config : センサー収集設定（ACT.app が書込）
        - reported.environment  : CO2・温湿度計測値（Aggregator が書込）
        - reported.device       : デバイス死活情報（Aggregator が stale 検知時のみ更新）

        ## LoRaWAN 特記事項
        health トピックを持たないため reported.device の更新は Aggregator が担当する。
        uptime_sec / mqtt_connected / last_health_at は null になる。

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "sensor_config": {
                "interval_sec": 30,
                "co2_calibration_ppm": 0
              }
            },
            "reported": {
              "environment": {
                "co2_ppm": 850,
                "temperature": {
                  "value_celsius": 27.8,
                  "raw_value": 2100,
                  "read_at": 1710299990.0
                },
                "humidity_pct": 70.5,
                "sampled_at": "2025-03-20T09:14:50Z"
              },
              "device": {
                "online": true,
                "firmware": "2.1.0",
                "rssi_dbm": -72,
                "uptime_sec": null,
                "mqtt_connected": null,
                "errors": [],
                "last_health_at": null
              }
            }
          }
        }
        ```

        </details>
      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              properties:
                sensor_config:
                  type: object
                  properties:
                    interval_sec:        {type: integer, default: 30}
                    co2_calibration_ppm: {type: integer, default: 0, description: CO2校正オフセット（ppm）}
            reported:
              type: object
              properties:
                environment:
                  type: object
                  properties:
                    co2_ppm:      {type: integer, minimum: 0, maximum: 10000}
                    temperature:
                      type: object
                      properties:
                        value_celsius: {type: number}
                        raw_value:     {type: integer}
                        read_at:       {type: number}
                    humidity_pct: {type: number, minimum: 0, maximum: 100}
                    sampled_at:   {type: string, format: date-time}
                device:
                  type: object
                  description: デバイス死活情報（Aggregator が stale 検知時のみ更新）
                  properties:
                    online:         {type: boolean}
                    firmware:       {type: string}
                    rssi_dbm:       {type: integer}
                    uptime_sec:     {type: integer, nullable: true}
                    mqtt_connected: {type: boolean, nullable: true}
                    errors:         {type: array, items: {type: string}}
                    last_health_at: {type: string, format: date-time, nullable: true}


    DevCamShadow:
      type: object
      title: "dev-{device_id} Shadow（例: dev-cam-01）"
      description: |
        カメラデバイス 1台に関するすべての情報を 1つに統合した Shadow。

        - desired.capture    : 撮影設定（ACT.app が書込）
        - desired.storage    : 保存・転送設定（ACT.app が書込）
        - desired.ai         : 画像AI設定（スケジュール・モデル・出力先、ACT.app が書込）
        - reported.capture   : 撮影状態（CameraCapture が書込）
        - reported.storage   : ストレージ使用量（CameraCapture が書込）
        - reported.ai        : AI処理状態・最終結果（ImageAI が書込）

        ## desired.ai.schedule.mode
        | mode | 動作 |
        |------|------|
        | interval | interval_sec ごとに定期実行 |
        | cron | cron 式で指定した時刻に実行 |
        | on_capture | CameraCapture 撮影完了後に即時実行 |
        | on_demand | trigger.run_now: true を検知して即時実行 |

        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "capture": {
                "enabled": true,
                "interval_sec": 30,
                "resolution": "1280x720",
                "format": "jpeg",
                "quality": 85
              },
              "storage": {
                "local": {
                  "enabled": true,
                  "path": "/data/capture",
                  "retain_days": 3
                },
                "cloud": {
                  "enabled": true,
                  "s3_bucket": "act-node-farm01",
                  "s3_prefix": "cam/house-a/",
                  "upload_on_detection": true,
                  "upload_interval_sec": null
                }
              },
              "ai": {
                "schedule": {
                  "mode": "interval",
                  "interval_sec": 3600
                },
                "input": {
                  "source_path": "/data/capture",
                  "file_pattern": "*.jpg",
                  "target": { "mode": "latest_n", "count": 10 }
                },
                "model": {
                  "id": "plant-disease-v2",
                  "version": "1.0.0",
                  "confidence_threshold": 0.5,
                  "parameters": {}
                },
                "output": {
                  "cloud": {
                    "enabled": true,
                    "s3_bucket": "act-node-farm01",
                    "s3_prefix": "ai-results/house-a/",
                    "notify_actapp": true
                  },
                  "local": {
                    "enabled": true,
                    "path": "/data/ai-results",
                    "retain_days": 7
                  }
                },
                "trigger": { "run_now": false, "reason": null }
              }
            },
            "reported": {
              "capture": {
                "running": true,
                "fps_actual": 1.0,
                "last_captured_at": "2025-03-20T09:15:00Z",
                "last_uploaded_at": "2025-03-20T09:15:02Z",
                "error": null
              },
              "storage": {
                "local_file_count": 86,
                "local_size_mb": 412
              },
              "ai": {
                "status": {
                  "state": "idle",
                  "last_run_at": "2025-03-20T09:00:12Z",
                  "last_run_duration_sec": 8.4,
                  "error": null
                },
                "last_result": {
                  "run_at": "2025-03-20T09:00:12Z",
                  "input_file_count": 10,
                  "processed_count": 10,
                  "anomaly_detected": true,
                  "detection_count": 2,
                  "result_s3_key": "ai-results/house-a/2025-03-20T09:00:12Z.json",
                  "summary": {
                    "disease_probability": 0.82,
                    "affected_area_pct": 12.4,
                    "recommendation": "要防除（早期対応推奨）"
                  }
                }
              }
            }
          }
        }
        ```

        </details>
      properties:
        state:
          type: object
          properties:
            desired:
              $ref: "#/components/schemas/DevCamDesired"
            reported:
              $ref: "#/components/schemas/DevCamReported"

    DevCamDesired:
      type: object
      title: DevCamDesired
      properties:
        capture:
          type: object
          description: 撮影設定
          properties:
            enabled:
              type: boolean
              default: true
              description: "false で撮影を一時停止"
            interval_sec:
              type: integer
              minimum: 1
              default: 30
              description: 撮影間隔（秒）
            resolution:
              type: string
              description: "解像度（例: 1280x720, 1920x1080）"
              default: "1280x720"
            format:
              type: string
              enum: [jpeg, png, h264]
              default: jpeg
            quality:
              type: integer
              minimum: 1
              maximum: 100
              default: 85
              description: JPEG/PNG 品質（1-100）

        storage:
          type: object
          description: 保存・転送設定
          properties:
            local:
              type: object
              properties:
                enabled:     {type: boolean, default: true}
                path:        {type: string, default: "/data/capture"}
                retain_days: {type: integer, minimum: 0, default: 3, description: 0=無制限}
            cloud:
              type: object
              properties:
                enabled:
                  type: boolean
                  default: false
                s3_bucket:
                  type: string
                s3_prefix:
                  type: string
                  description: "S3 キーのプレフィックス（例: cam/house-a/）"
                upload_on_detection:
                  type: boolean
                  default: true
                  description: "true=AI検知時のみ転送 / false=upload_interval_sec ごとに定期転送"
                upload_interval_sec:
                  type: integer
                  nullable: true
                  description: upload_on_detection が false の場合の転送間隔（秒）

        ai:
          type: object
          description: 画像AI分析設定
          properties:
            schedule:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [interval, cron, on_capture, on_demand]
                  description: |
                    interval   : interval_sec ごとに定期実行
                    cron       : cron 式で指定した時刻に実行
                    on_capture : CameraCapture 撮影完了後に即時実行
                    on_demand  : trigger.run_now: true を検知して即時実行
                interval_sec:
                  type: integer
                  minimum: 60
                  description: mode=interval の場合の実行間隔（秒）
                cron:
                  type: string
                  description: "mode=cron の場合の cron 式（5フィールド形式、例: 0 6 * * *）"

            input:
              type: object
              description: 入力ファイル設定
              properties:
                source_path:
                  type: string
                  description: CameraCapture がファイルを保存するローカルパス
                  example: "/data/capture"
                file_pattern:
                  type: string
                  default: "*.jpg"
                target:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum: [latest_n, all_since_last, time_range]
                      description: |
                        latest_n      : 最新 count 件を処理
                        all_since_last: 前回実行以降のファイルを全件処理
                        time_range    : from_offset_sec〜to_offset_sec の範囲を処理
                    count:
                      type: integer
                      minimum: 1
                      description: mode=latest_n の場合の件数
                    from_offset_sec:
                      type: integer
                      description: mode=time_range の場合、現在時刻から何秒前から処理するか
                    to_offset_sec:
                      type: integer
                      default: 0
                      description: mode=time_range の場合、現在時刻から何秒前まで処理するか（0=現在）

            model:
              type: object
              required: [id, version]
              properties:
                id:
                  type: string
                  description: モデル識別子（エッジ PC にデプロイ済みのモデル名）
                  example: plant-disease-v2
                version:
                  type: string
                  example: "1.0.0"
                confidence_threshold:
                  type: number
                  minimum: 0
                  maximum: 1
                  default: 0.5
                parameters:
                  type: object
                  additionalProperties: true
                  description: モデル固有の追加パラメータ

            output:
              type: object
              properties:
                cloud:
                  type: object
                  properties:
                    enabled:       {type: boolean, default: true}
                    s3_bucket:     {type: string}
                    s3_prefix:     {type: string, example: "ai-results/house-a/"}
                    notify_actapp:
                      type: boolean
                      default: true
                      description: 分析完了後に act-connect/results/{device_id} トピックへ通知する
                local:
                  type: object
                  properties:
                    enabled:     {type: boolean, default: true}
                    path:        {type: string, default: "/data/ai-results"}
                    retain_days: {type: integer, minimum: 0, default: 7}

            trigger:
              type: object
              description: "on_demand 実行指示。ImageAI が run_now: true を検知して即時実行し、完了後に false に戻す"
              properties:
                run_now: {type: boolean, default: false}
                reason:  {type: string, nullable: true, description: 実行理由（ログ・監査用）}

    DevCamReported:
      type: object
      title: DevCamReported
      properties:
        capture:
          type: object
          description: 撮影動作状態（CameraCapture が更新）
          properties:
            running:
              type: boolean
              description: "true=正常撮影中 / false=停止中（エラーまたは enabled:false）"
            fps_actual:
              type: number
              description: 実測フレームレート
            last_captured_at:
              type: string
              format: date-time
              nullable: true
            last_uploaded_at:
              type: string
              format: date-time
              nullable: true
            error:
              type: string
              nullable: true
              description: "null=正常 / エラーメッセージ（例: RTSP connection timeout）"

        storage:
          type: object
          description: ストレージ使用量（CameraCapture が更新）
          properties:
            local_file_count: {type: integer, minimum: 0}
            local_size_mb:    {type: number,  minimum: 0}

        ai:
          type: object
          description: AI処理状態・最終結果（ImageAI が更新）
          properties:
            status:
              type: object
              properties:
                state:
                  type: string
                  enum: [idle, running, error]
                  description: "idle=待機中 / running=分析中 / error=エラー停止"
                last_run_at:
                  type: string
                  format: date-time
                  nullable: true
                last_run_duration_sec:
                  type: number
                  nullable: true
                  description: 最終実行の処理時間（秒）。実行中は null
                error:
                  type: string
                  nullable: true
            last_result:
              type: object
              description: 最終実行の結果サマリ（分析完了後に更新）
              properties:
                run_at:             {type: string, format: date-time}
                input_file_count:   {type: integer, minimum: 0}
                processed_count:    {type: integer, minimum: 0}
                anomaly_detected:   {type: boolean, description: 異常・検知があった場合 true}
                detection_count:    {type: integer, minimum: 0}
                result_s3_key:
                  type: string
                  nullable: true
                  description: 詳細結果 JSON が格納された S3 キー
                summary:
                  type: object
                  additionalProperties: true
                  description: モデル固有のサマリ情報

