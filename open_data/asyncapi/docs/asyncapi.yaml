      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              required: [offline_threshold_sec, routing]
              properties:
                offline_threshold_sec:
                  type: integer
                  description: offline 判定までの秒数
                  default: 600
                routing:
                  type: array
                  description: デバイスごとの health 報告先 Shadow リスト
                  items:
                    type: object
                    required: [device_id, target_shadows]
                    properties:
                      device_id:
                        type: string
                        description: 対象デバイスID
                      target_shadows:
                        type: array
                        description: reported.device を更新する Shadow リスト
                        items:
                          type: object
                          required: [thing, shadow]
                          properties:
                            thing:
                              type: string
                              description: 対象 Thing 名
                            shadow:
                              type: string
                              description: 対象 Shadow 名
            reported:
              type: object
              description: desired と同じ構造。desired と一致している状態が「設定適用済み」
              properties:
                offline_threshold_sec:
                  type: integer
                routing:
                  type: array
                  items:
                    type: object
