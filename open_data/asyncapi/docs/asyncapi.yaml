    # ----------------------------------------------------------
    # curtain-sensor Shadow
    # Thing: x320-curtain-01
    # ----------------------------------------------------------
    CurtainSensorShadow:
      type: object
      title: curtain-sensor Shadow
      description: |
        カーテン開閉デバイスに内蔵された温度・湿度センサーの計測値を管理する。

        ## 書込主体
        | セクション | 書込主体 |
        |-----------|---------|
        | desired.config | ACT.app（収集設定変更） |
        | reported.environment | Sensor Aggregator |
        | reported.device | Health Reporter |

        ## 更新頻度
        - reported.environment: 30秒ごと（telemetry 受信時）
        - reported.device: 300秒ごと（health 受信時）

        ## read_at と sampled_at の違い
        - read_at: センサーチップが値を読み取った時刻（Unix epoch 秒）
        - sampled_at: MQTT として送信した時刻（ISO 8601）
        - 差が大きい場合はデバイス内バッファリングや送信遅延を示す
        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "config": {
                "interval_sec": 30,
                "unit_temperature": "celsius"
              }
            },
            "reported": {
              "environment": {
                "temperature": {
                  "value_celsius": 28.4,
                  "raw_value": 2150,
                  "read_at": 1710300000.0
                },
                "humidity_pct": 71.2,
                "sampled_at": "2025-03-20T09:15:00Z"
              },
              "device": {
                "online": true,
                "firmware": "1.4.2",
                "rssi_dbm": -65,
                "ai_available": true,
                "errors": [],
                "last_health_at": "2025-03-20T09:00:00Z"
              }
            }
          }
        }
        ```

        </details>

      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              properties:
                config:
                  type: object
                  properties:
                    interval_sec:
                      type: integer
                      description: センサー収集間隔（秒）
                      default: 30
                    unit_temperature:
                      type: string
                      enum: [celsius, fahrenheit]
                      description: 温度単位。内部処理は常に ℃
                      default: celsius
            reported:
              type: object
              properties:
                environment:
                  type: object
                  properties:
                    temperature:
                      type: object
                      properties:
                        value_celsius:
                          type: number
                          minimum: -40
                          maximum: 85
                          description: AD変換後の温度（℃）
                        raw_value:
                          type: integer
                          minimum: 0
                          maximum: 4095
                          description: "AD変換生データ（12bit）。0=断線 / 4095=短絡の可能性あり"
                        read_at:
                          type: number
                          description: センサー読取時刻（Unix epoch 秒）
                    humidity_pct:
                      type: number
                      minimum: 0
                      maximum: 100
                      description: 相対湿度（%）
                    sampled_at:
                      type: string
                      format: date-time
                      description: MQTT telemetry の送信時刻（ISO 8601 / UTC）
                device:
                  type: object
                  properties:
                    online:
                      type: boolean
                    firmware:
                      type: string
                    rssi_dbm:
                      type: integer
                      description: "Wi-Fi 受信電波強度（dBm）。-70 以下で通信不安定"
                    ai_available:
                      type: boolean
                      description: false の場合 temperature の値は無効
                    errors:
                      type: array
                      items:
                        type: string
                    last_health_at:
                      type: string
                      format: date-time
                      nullable: true
      example:
        state:
          desired:
            config:
              interval_sec: 30
              unit_temperature: celsius
          reported:
            environment:
              temperature:
                value_celsius: 28.4
                raw_value: 2150
                read_at: 1710300000.0
              humidity_pct: 71.2
              sampled_at: "2025-03-20T09:15:00Z"
            device:
              online: true
              firmware: "1.4.2"
              rssi_dbm: -65
              ai_available: true
              errors: []
              last_health_at: "2025-03-20T09:00:00Z"

