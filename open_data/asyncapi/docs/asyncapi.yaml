asyncapi: 3.0.0

info:
  title: ACT Connect カーテン制御 IoT API
  version: 1.0.0
  description: |
    ACT Connect のカーテン開閉デバイス（X320）と
    クラウド / Greengrass アプリケーション間の MQTT メッセージ仕様。

    ## デバイス構成
    - x320-Edge-Node  : Edge-IoT-Controller Node 棟単位の仮想Thing（zone-env / 設定Shadow）
    - x320-curtain-01 : カーテン開閉デバイス（温度・湿度センサー内蔵、モーター M1/M2）
    - Sensor-co2      : LoRaWAN CO2センサー

    ## Named Shadow 一覧
    各 Shadow のフィールド定義・サンプルは画面下部の **Schemas** セクションに記載しています。

    | Shadow 名 | Thing | 用途 |
    |-----------|-------|------|
    | curtain-ctrl | x320-curtain-01 | モーター制御・スケジュール・状態 |
    | curtain-sensor | x320-curtain-01 | 温度・湿度センサー計測値 |
    | co2-sensor | Sensor-co2 | CO2・温度・湿度計測値（LoRaWAN）|
    | zone-env | x320-Edge-Node | エリア内全センサー集約値 |
    | aggregator-config | x320-Edge-Node | Sensor Aggregator ルーティング設定 |
    | health-reporter-config | x320-Edge-Node | Health Reporter ルーティング設定 |

    ## 通信仕様
    - プロトコル: MQTT v3.1.1 / Greengrass IPC
    - ブローカー: Greengrass IPC Pub/Sub（コンポーネント間）/ LAN 内 MQTT ブローカー（別ノード間）

    ## QoS ポリシー
    | QoS | 対象トピック | 理由 |
    |-----|------------|------|
    | 1   | command / response / event / Shadow update | 取りこぼすと制御不整合 |
    | 0   | telemetry / health | 次回データで補完可能 |

  contact:
    name: ACT Node Inc.
    url: https://act-node.co.jp
  license:
    name: Proprietary

defaultContentType: application/json

servers:
  greengrass-ipc:
    host: /greengrass/v2/ipc.socket
    protocol: greengrassv2
    description: |
      Greengrass IPC Pub/Sub ブローカー。
      同一デバイス上のアプリコンポーネント間通信に使用。
      Event Router / Sensor Aggregator / Health Reporter と
      Control Logic 間のメッセージ交換はすべてこの経路を通る。
  local-mqtt:
    host: x320-Edge-Node.local:1883
    protocol: mqtt
    description: |
      LAN 内 MQTT ブローカー（Greengrass MQTT Bridge 経由）。
      同一 LAN 上の別ノード（ACT.app サーバー・他の x320 デバイスなど）
      との通信に使用。インターネット接続不要。

channels:

  # ============================================================
  # AWS IoT Shadow チャンネル（先頭）
  # ============================================================

  shadowCurtainCtrlUpdate:
    address: "$aws/things/{thing_name}/shadow/name/curtain-ctrl/update"
    description: |
      curtain-ctrl Shadow の desired / reported を更新する。
      - desired 書き込み: Event Router / ACT.app
      - reported 書き込み: Event Router（curtain/response 受信後）
    messages:
      CurtainCtrlDesiredUpdate:
        name: CurtainCtrlDesiredUpdate
        title: curtain-ctrl desired 更新（制御指示）
        contentType: application/json
        payload:
          type: object
          properties:
            state:
              type: object
              properties:
                desired:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum: [auto, manual]
                      description: "auto=温度・スケジュールで自動制御 / manual=手動コマンドのみ"
                    motors:
                      type: object
                      properties:
                        M1:
                          type: object
                          properties:
                            override:
                              type: boolean
                              description: true=グループ指示を無視して個別コマンドを優先
                              default: false
                            command:
                              type: string
                              enum: [forward, reverse, stop]
                              nullable: true
                            threshold:
                              type: object
                              properties:
                                open_temp:
                                  type: number
                                  description: この温度以上でカーテンを開く（℃）
                                  example: 28.0
                                close_temp:
                                  type: number
                                  description: この温度以下でカーテンを閉じる（℃）
                                  example: 25.0
                                hysteresis:
                                  type: number
                                  description: チャタリング防止幅（℃）
                                  example: 1.0
                        M2:
                          type: object
                          properties:
                            override:
                              type: boolean
                              default: false
                            command:
                              type: string
                              enum: [forward, reverse, stop]
                              nullable: true
                            threshold:
                              type: object
                              properties:
                                open_temp:
                                  type: number
                                  example: 30.0
                                close_temp:
                                  type: number
                                  example: 27.0
                                hysteresis:
                                  type: number
                                  example: 1.5
                    schedule:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        timezone:
                          type: string
                          example: Asia/Tokyo
                        time_zones:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              from:
                                type: string
                                example: "08:00"
                              to:
                                type: string
                                example: "18:00"
                              control:
                                type: string
                                enum: [force_close, temperature, force_open]
                    motor_config:
                      type: object
                      properties:
                        stop_before_reverse_ms:
                          type: integer
                          default: 500
                        cooldown_sec:
                          type: integer
                          default: 30
        examples:
          - name: 自動モード・スケジュール設定
            payload:
              state:
                desired:
                  mode: auto
                  motors:
                    M1: {override: false, command: null, threshold: {open_temp: 28.0, close_temp: 25.0, hysteresis: 1.0}}
                    M2: {override: false, command: null, threshold: {open_temp: 30.0, close_temp: 27.0, hysteresis: 1.5}}
                  schedule:
                    enabled: true
                    timezone: Asia/Tokyo
                    time_zones:
                      - {id: night_close,   from: "00:00", to: "08:00", control: force_close}
                      - {id: daytime_auto,  from: "08:00", to: "18:00", control: temperature}
                      - {id: evening_close, from: "18:00", to: "24:00", control: force_close}
                  motor_config: {stop_before_reverse_ms: 500, cooldown_sec: 30}
      CurtainCtrlReportedUpdate:
        name: CurtainCtrlReportedUpdate
        title: curtain-ctrl reported 更新（Event Router が反映）
        contentType: application/json
        payload:
          type: object
          properties:
            state:
              type: object
              properties:
                reported:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum: [auto, manual]
                    emergency_stop:
                      type: string
                      enum: [active, inactive]
                    motors:
                      type: object
                      properties:
                        M1:
                          type: object
                          properties:
                            direction:
                              type: string
                              enum: [forward, reverse, stopped]
                            limit_upper:
                              type: string
                              enum: [active, inactive]
                            limit_lower:
                              type: string
                              enum: [active, inactive]
                            cooldown_active:
                              type: boolean
                            cooldown_until:
                              type: number
                              nullable: true
                            pending_command:
                              type: string
                              nullable: true
                            last_command:
                              type: string
                              nullable: true
                            last_operated_at:
                              type: string
                              nullable: true
                            operation_count:
                              type: integer
                            error_code:
                              type: string
                              nullable: true
                        M2:
                          type: object
                          properties:
                            direction:
                              type: string
                              enum: [forward, reverse, stopped]
                            limit_upper:
                              type: string
                              enum: [active, inactive]
                            limit_lower:
                              type: string
                              enum: [active, inactive]
                            cooldown_active:
                              type: boolean
                            cooldown_until:
                              type: number
                              nullable: true
                            pending_command:
                              type: string
                              nullable: true
                            last_command:
                              type: string
                              nullable: true
                            last_operated_at:
                              type: string
                              nullable: true
                            operation_count:
                              type: integer
                            error_code:
                              type: string
                              nullable: true
                    active_zone:
                      type: object
                      properties:
                        id:
                          type: string
                        control:
                          type: string
                        entered_at:
                          type: string
                    device:
                      type: object
                      properties:
                        online:
                          type: boolean
                        firmware:
                          type: string
                        rssi_dbm:
                          type: integer
                        uptime_sec:
                          type: integer
                        do_channels:
                          type: array
                          items:
                            type: string
                        di_channels:
                          type: array
                          items:
                            type: string
                        ai_available:
                          type: boolean
                        errors:
                          type: array
                          items:
                            type: string
                        last_health_at:
                          type: string
                          nullable: true
        examples:
          - name: モーター動作後の reported 更新
            payload:
              state:
                reported:
                  mode: auto
                  emergency_stop: inactive
                  motors:
                    M1: {direction: forward, limit_upper: inactive, limit_lower: inactive, cooldown_active: true, cooldown_until: 1710300038, pending_command: null, last_command: forward, last_operated_at: "2025-03-20T09:15:05Z", operation_count: 1206, error_code: null}
                    M2: {direction: forward, limit_upper: inactive, limit_lower: inactive, cooldown_active: true, cooldown_until: 1710300043, pending_command: null, last_command: forward, last_operated_at: "2025-03-20T09:15:10Z", operation_count: 987, error_code: null}
                  active_zone: {id: daytime_auto, control: temperature, entered_at: "2025-03-20T08:00:01Z"}
                  device: {online: true, firmware: "1.4.2", rssi_dbm: -65, uptime_sec: 86400, do_channels: [EXT_DO0, EXT_DO1, EXT_DO2, EXT_DO3], di_channels: [Filtered_DI0, Filtered_DI1, Filtered_DI2, Filtered_DI3, Filtered_DI4], ai_available: true, errors: [], last_health_at: "2025-03-20T09:00:00Z"}

  shadowCurtainCtrlDelta:
    address: "$aws/things/{thing_name}/shadow/name/curtain-ctrl/update/delta"
    description: curtain-ctrl Shadow の desired と reported の差分。AWS IoT が自動生成して Event Router に配信する。
    messages:
      CurtainCtrlDelta:
        name: CurtainCtrlDelta
        title: curtain-ctrl delta 通知
        contentType: application/json
        payload:
          type: object
          properties:
            version:
              type: integer
              description: Shadow のバージョン番号
            timestamp:
              type: integer
              description: Unix epoch 秒
            state:
              type: object
              description: desired と reported の差分のみ含む
        examples:
          - name: モード変更の delta
            payload:
              version: 48
              timestamp: 1710300000
              state:
                mode: auto
                motors:
                  M1:
                    threshold: {open_temp: 30.0, close_temp: 25.0, hysteresis: 1.0}

  shadowCurtainSensorUpdate:
    address: "$aws/things/{thing_name}/shadow/name/curtain-sensor/update"
    description: curtain-sensor Shadow の更新。Sensor Aggregator が reported を書き込む。
    messages:
      CurtainSensorReportedUpdate:
        name: CurtainSensorReportedUpdate
        title: curtain-sensor reported 更新（センサー計測値）
        contentType: application/json
        payload:
          type: object
          properties:
            state:
              type: object
              properties:
                desired:
                  type: object
                  properties:
                    config:
                      type: object
                      properties:
                        interval_sec:
                          type: integer
                          default: 30
                        unit_temperature:
                          type: string
                          enum: [celsius, fahrenheit]
                          default: celsius
                reported:
                  type: object
                  properties:
                    environment:
                      type: object
                      properties:
                        temperature:
                          type: object
                          properties:
                            value_celsius:
                              type: number
                              example: 28.4
                            raw_value:
                              type: integer
                              example: 2150
                            read_at:
                              type: number
                        humidity_pct:
                          type: number
                          example: 71.2
                        sampled_at:
                          type: string
                          format: date-time
                    device:
                      type: object
                      properties:
                        online:
                          type: boolean
                        firmware:
                          type: string
                        rssi_dbm:
                          type: integer
                        ai_available:
                          type: boolean
                        errors:
                          type: array
                          items:
                            type: string
                        last_health_at:
                          type: string
                          nullable: true
        examples:
          - name: 温度・湿度センサー計測値
            payload:
              state:
                desired:
                  config: {interval_sec: 30, unit_temperature: celsius}
                reported:
                  environment:
                    temperature: {value_celsius: 28.4, raw_value: 2150, read_at: 1710300000.0}
                    humidity_pct: 71.2
                    sampled_at: "2025-03-20T09:15:00Z"
                  device: {online: true, firmware: "1.4.2", rssi_dbm: -65, ai_available: true, errors: [], last_health_at: "2025-03-20T09:00:00Z"}

  shadowCo2SensorUpdate:
    address: "$aws/things/{thing_name}/shadow/name/co2-sensor/update"
    description: co2-sensor Shadow の更新。Sensor Aggregator が reported を書き込む。
    messages:
      Co2SensorReportedUpdate:
        name: Co2SensorReportedUpdate
        title: co2-sensor reported 更新（CO2・センサー計測値）
        contentType: application/json
        payload:
          type: object
          properties:
            state:
              type: object
              properties:
                desired:
                  type: object
                  properties:
                    config:
                      type: object
                      properties:
                        interval_sec:
                          type: integer
                          default: 30
                        co2_calibration_ppm:
                          type: integer
                          description: CO2センサー校正オフセット（ppm）
                          default: 0
                reported:
                  type: object
                  properties:
                    environment:
                      type: object
                      properties:
                        co2_ppm:
                          type: integer
                          example: 850
                        temperature:
                          type: object
                          properties:
                            value_celsius:
                              type: number
                              example: 27.8
                            raw_value:
                              type: integer
                              example: 2100
                            read_at:
                              type: number
                        humidity_pct:
                          type: number
                          example: 70.5
                        sampled_at:
                          type: string
                          format: date-time
                    device:
                      type: object
                      properties:
                        online:
                          type: boolean
                        firmware:
                          type: string
                        rssi_dbm:
                          type: integer
                        errors:
                          type: array
                          items:
                            type: string
                        last_health_at:
                          type: string
                          nullable: true
        examples:
          - name: CO2センサー計測値
            payload:
              state:
                desired:
                  config: {interval_sec: 30, co2_calibration_ppm: 0}
                reported:
                  environment:
                    co2_ppm: 850
                    temperature: {value_celsius: 27.8, raw_value: 2100, read_at: 1710299990.0}
                    humidity_pct: 70.5
                    sampled_at: "2025-03-20T09:14:50Z"
                  device: {online: true, firmware: "2.1.0", rssi_dbm: -72, errors: [], last_health_at: "2025-03-20T09:00:00Z"}

  shadowZoneEnvUpdate:
    address: "$aws/things/{thing_name}/shadow/name/zone-env/update"
    description: zone-env Shadow の更新。Sensor Aggregator が棟内全センサーの集約値を書き込む。
    messages:
      ZoneEnvReportedUpdate:
        name: ZoneEnvReportedUpdate
        title: zone-env reported 更新（エリア集約センサー値）
        contentType: application/json
        payload:
          type: object
          properties:
            state:
              type: object
              properties:
                desired:
                  type: object
                  properties:
                    config:
                      type: object
                      properties:
                        stale_threshold_sec:
                          type: integer
                          description: stale 判定までの秒数
                          default: 120
                reported:
                  type: object
                  properties:
                    sensors:
                      type: object
                      properties:
                        temperature:
                          type: object
                          properties:
                            value_celsius:
                              type: number
                              nullable: true
                            raw_value:
                              type: integer
                              nullable: true
                            read_at:
                              type: number
                              nullable: true
                            source_device:
                              type: string
                            source_shadow:
                              type: string
                            sampled_at:
                              type: string
                              nullable: true
                            stale:
                              type: boolean
                              description: "true=stale_threshold_sec 秒以上無通信。Event Router は制御判断から除外"
                        humidity_pct:
                          type: object
                          properties:
                            value:
                              type: number
                              nullable: true
                            source_device:
                              type: string
                            source_shadow:
                              type: string
                            sampled_at:
                              type: string
                              nullable: true
                            stale:
                              type: boolean
                        co2_ppm:
                          type: object
                          properties:
                            value:
                              type: integer
                              nullable: true
                            source_device:
                              type: string
                            source_shadow:
                              type: string
                            sampled_at:
                              type: string
                              nullable: true
                            stale:
                              type: boolean
                    updated_at:
                      type: string
                      format: date-time
        examples:
          - name: 全センサー正常集約
            payload:
              state:
                desired:
                  config: {stale_threshold_sec: 120}
                reported:
                  sensors:
                    temperature: {value_celsius: 28.4, raw_value: 2150, read_at: 1710300000.0, source_device: x320-curtain-01, source_shadow: curtain-sensor, sampled_at: "2025-03-20T09:15:00Z", stale: false}
                    humidity_pct: {value: 71.2, source_device: x320-curtain-01, source_shadow: curtain-sensor, sampled_at: "2025-03-20T09:15:00Z", stale: false}
                    co2_ppm: {value: 850, source_device: Sensor-co2, source_shadow: co2-sensor, sampled_at: "2025-03-20T09:14:50Z", stale: false}
                  updated_at: "2025-03-20T09:15:02Z"
          - name: CO2センサー stale 状態
            payload:
              state:
                reported:
                  sensors:
                    temperature: {value_celsius: 28.4, raw_value: 2150, read_at: 1710300000.0, source_device: x320-curtain-01, source_shadow: curtain-sensor, sampled_at: "2025-03-20T09:15:00Z", stale: false}
                    co2_ppm: {value: null, source_device: Sensor-co2, source_shadow: co2-sensor, sampled_at: null, stale: true}
                  updated_at: "2025-03-20T09:15:02Z"

  shadowAggregatorConfigUpdate:
    address: "$aws/things/{thing_name}/shadow/name/aggregator-config/update"
    description: |
      aggregator-config Shadow の更新。
      - desired 書き込み: ACT.app（ルーティング設定変更）
      - reported 書き込み: Sensor Aggregator（設定反映後に desired と同期）
    messages:
      AggregatorConfigUpdate:
        name: AggregatorConfigUpdate
        title: aggregator-config 更新（センサー集約ルーティング）
        contentType: application/json
        payload:
          type: object
          properties:
            state:
              type: object
              properties:
                desired:
                  type: object
                  properties:
                    stale_threshold_sec:
                      type: integer
                      default: 120
                    routing:
                      type: array
                      items:
                        type: object
                        required: [device_id, shadow_name, sensor_keys, zone_thing, zone_shadow]
                        properties:
                          device_id:
                            type: string
                            example: x320-curtain-01
                          shadow_name:
                            type: string
                            example: curtain-sensor
                          sensor_keys:
                            type: array
                            items:
                              type: string
                            example: [temperature, humidity_pct]
                          zone_thing:
                            type: string
                            example: x320-Edge-Node
                          zone_shadow:
                            type: string
                            example: zone-env
        examples:
          - name: 2デバイスのルーティング設定
            payload:
              state:
                desired:
                  stale_threshold_sec: 120
                  routing:
                    - {device_id: x320-curtain-01, shadow_name: curtain-sensor, sensor_keys: [temperature, humidity_pct], zone_thing: x320-Edge-Node, zone_shadow: zone-env}
                    - {device_id: Sensor-co2, shadow_name: co2-sensor, sensor_keys: [co2_ppm, temperature, humidity_pct], zone_thing: x320-Edge-Node, zone_shadow: zone-env}
                reported:
                  stale_threshold_sec: 120
                  routing:
                    - {device_id: x320-curtain-01, shadow_name: curtain-sensor, sensor_keys: [temperature, humidity_pct], zone_thing: x320-Edge-Node, zone_shadow: zone-env}
                    - {device_id: Sensor-co2, shadow_name: co2-sensor, sensor_keys: [co2_ppm, temperature, humidity_pct], zone_thing: x320-Edge-Node, zone_shadow: zone-env}

  shadowHealthReporterConfigUpdate:
    address: "$aws/things/{thing_name}/shadow/name/health-reporter-config/update"
    description: |
      health-reporter-config Shadow の更新。
      - desired 書き込み: ACT.app（ルーティング設定変更）
      - reported 書き込み: Health Reporter（設定反映後に desired と同期）
    messages:
      HealthReporterConfigUpdate:
        name: HealthReporterConfigUpdate
        title: health-reporter-config 更新（ヘルス報告先設定）
        contentType: application/json
        payload:
          type: object
          properties:
            state:
              type: object
              properties:
                desired:
                  type: object
                  properties:
                    offline_threshold_sec:
                      type: integer
                      default: 600
                    routing:
                      type: array
                      items:
                        type: object
                        required: [device_id, target_shadows]
                        properties:
                          device_id:
                            type: string
                            example: x320-curtain-01
                          target_shadows:
                            type: array
                            items:
                              type: object
                              required: [thing, shadow]
                              properties:
                                thing:
                                  type: string
                                shadow:
                                  type: string
        examples:
          - name: 2デバイスのヘルス報告先設定
            payload:
              state:
                desired:
                  offline_threshold_sec: 600
                  routing:
                    - device_id: x320-curtain-01
                      target_shadows:
                        - {thing: x320-curtain-01, shadow: curtain-ctrl}
                        - {thing: x320-curtain-01, shadow: curtain-sensor}
                reported:
                  offline_threshold_sec: 600
                  routing:
                    - device_id: x320-curtain-01
                      target_shadows:
                        - {thing: x320-curtain-01, shadow: curtain-ctrl}
                        - {thing: x320-curtain-01, shadow: curtain-sensor}

  # ============================================================
  # GG IPC Pub/Sub チャンネル
  # ============================================================

  curtainCommand:
    address: "{device_id}/curtain/command"
    description: Event Router から Control Logic へのモーター制御指示（QoS 1）。
    messages:
      CurtainCommand:
        name: CurtainCommand
        title: カーテン制御コマンド
        contentType: application/json
        payload:
          type: object
          required: [command_id, issued_at, source, motors, options]
          properties:
            command_id:
              type: string
              description: コマンドの一意識別子
              example: cmd-abc123
            issued_at:
              type: string
              format: date-time
              example: "2025-03-20T09:15:00Z"
            source:
              type: string
              enum: ["event:motor_state", "event:limiter", "event:emergency_stop", zone_transition, timer, manual, shadow_delta, timeout_retry]
            zone_id:
              type: string
              nullable: true
            motors:
              type: object
              properties:
                M1:
                  type: object
                  properties:
                    command:
                      type: string
                      enum: [forward, reverse, stop]
                      description: "forward=開 / reverse=閉 / stop=停止"
                    target_direction:
                      type: string
                      enum: [forward, reverse, stopped]
                    skip:
                      type: boolean
                    reason:
                      type: string
                      enum: [override, override_false, already_at_target, cooldown]
                M2:
                  type: object
                  properties:
                    command:
                      type: string
                      enum: [forward, reverse, stop]
                    target_direction:
                      type: string
                      enum: [forward, reverse, stopped]
                    skip:
                      type: boolean
                    reason:
                      type: string
                      enum: [override, override_false, already_at_target, cooldown]
            options:
              type: object
              properties:
                stop_before_reverse_ms:
                  type: integer
                  default: 500
                cooldown_sec:
                  type: integer
                  default: 30
            trigger:
              type: object
              properties:
                event_type:
                  type: string
                temperature_c:
                  type: number
        examples:
          - name: 自動閾値越えによる開コマンド
            payload:
              command_id: cmd-abc123
              issued_at: "2025-03-20T09:15:00Z"
              source: "event:motor_state"
              zone_id: daytime_auto
              motors:
                M1: {command: forward, target_direction: forward}
                M2: {command: forward, target_direction: forward}
              options: {stop_before_reverse_ms: 500, cooldown_sec: 30}
              trigger: {event_type: motor_state, temperature_c: 30.6}
          - name: ゾーン切替による強制クローズ
            payload:
              command_id: cmd-def456
              issued_at: "2025-03-20T18:00:01Z"
              source: zone_transition
              zone_id: evening_close
              motors:
                M1: {command: reverse, target_direction: reverse}
                M2: {command: reverse, target_direction: reverse}
              options: {stop_before_reverse_ms: 500, cooldown_sec: 30}

  curtainResponse:
    address: "{device_id}/curtain/response"
    description: Control Logic から Event Router へのコマンド実行結果（QoS 1）。
    messages:
      CurtainResponse:
        name: CurtainResponse
        title: コマンド実行結果
        contentType: application/json
        payload:
          type: object
          required: [command_id, responded_at, motors]
          properties:
            command_id:
              type: string
            responded_at:
              type: string
              format: date-time
            motors:
              type: object
              properties:
                M1:
                  type: object
                  properties:
                    result:
                      type: string
                      enum: [success, pending, skipped, error]
                    direction:
                      type: string
                      enum: [forward, reverse, stopped]
                    cooldown_active:
                      type: boolean
                    cooldown_until:
                      type: number
                      nullable: true
                    reason:
                      type: string
                    retry_after_sec:
                      type: integer
                    pending_command:
                      type: string
                    error_code:
                      type: string
                M2:
                  type: object
                  properties:
                    result:
                      type: string
                      enum: [success, pending, skipped, error]
                    direction:
                      type: string
                      enum: [forward, reverse, stopped]
                    cooldown_active:
                      type: boolean
                    cooldown_until:
                      type: number
                      nullable: true
                    reason:
                      type: string
                    retry_after_sec:
                      type: integer
                    pending_command:
                      type: string
                    error_code:
                      type: string
        examples:
          - name: 成功応答
            payload:
              command_id: cmd-abc123
              responded_at: "2025-03-20T09:15:08Z"
              motors:
                M1: {result: success, direction: forward, cooldown_active: true, cooldown_until: 1710300038}
                M2: {result: success, direction: forward, cooldown_active: true, cooldown_until: 1710300043}
          - name: 緊急停止中の拒否
            payload:
              command_id: cmd-ghi789
              responded_at: "2025-03-20T09:22:05Z"
              motors:
                M1: {result: error, reason: emergency_stop_active}
                M2: {result: error, reason: emergency_stop_active}
          - name: クールダウン中の保留
            payload:
              command_id: cmd-jkl012
              responded_at: "2025-03-20T09:20:01Z"
              motors:
                M1: {result: pending, reason: cooldown, retry_after_sec: 18, pending_command: reverse}
                M2: {result: success, direction: reverse, cooldown_active: true, cooldown_until: 1710300061}

  curtainEvent:
    address: "{device_id}/curtain/event"
    description: Control Logic から Event Router への状態変化即時通知（QoS 1）。
    messages:
      LimiterEvent:
        name: LimiterEvent
        title: リミッター状態変化イベント
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, motor_id, limiter, state, previous_state, timestamp]
          properties:
            device_id:
              type: string
            event_type:
              type: string
              enum: [limiter]
            motor_id:
              type: string
              enum: [M1, M2]
            limiter:
              type: string
              enum: [upper, lower]
              description: "upper=上限リミッター / lower=下限リミッター"
            state:
              type: string
              enum: [active, inactive]
              description: "active=到達（接点ON） / inactive=未到達（接点OFF）"
            previous_state:
              type: string
              enum: [active, inactive]
            timestamp:
              type: number
        examples:
          - name: 上限リミッター到達
            payload:
              device_id: x320-curtain-01
              event_type: limiter
              motor_id: M1
              limiter: upper
              state: active
              previous_state: inactive
              timestamp: 1710300060.0
      EmergencyStopEvent:
        name: EmergencyStopEvent
        title: 緊急停止イベント
        description: 物理緊急停止ボタンの状態変化。MQTT コマンドでの制御不可。
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, state, timestamp]
          properties:
            device_id:
              type: string
            event_type:
              type: string
              enum: [emergency_stop]
            state:
              type: string
              enum: [active, inactive]
              description: "active=ボタン押下中 / inactive=解除"
            timestamp:
              type: number
        examples:
          - name: 緊急停止ボタン押下
            payload:
              device_id: x320-curtain-01
              event_type: emergency_stop
              state: active
              timestamp: 1710300120.0
      MotorStateEvent:
        name: MotorStateEvent
        title: モーター状態変化イベント
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, motor_id, direction, previous_direction, reason, timestamp]
          properties:
            device_id:
              type: string
            event_type:
              type: string
              enum: [motor_state]
            motor_id:
              type: string
              enum: [M1, M2]
            direction:
              type: string
              enum: [forward, reverse, stopped]
            previous_direction:
              type: string
              enum: [forward, reverse, stopped]
            reason:
              type: string
              enum: [command, limiter, emergency_stop, auto_threshold, error]
            error_code:
              type: string
            timestamp:
              type: number
        examples:
          - name: 自動閾値による起動
            payload:
              device_id: x320-curtain-01
              event_type: motor_state
              motor_id: M1
              direction: forward
              previous_direction: stopped
              reason: auto_threshold
              timestamp: 1710300000.0
          - name: リミッターによる停止
            payload:
              device_id: x320-curtain-01
              event_type: motor_state
              motor_id: M1
              direction: stopped
              previous_direction: forward
              reason: limiter
              timestamp: 1710300060.1
      ModeChangeEvent:
        name: ModeChangeEvent
        title: 動作モード変更イベント
        contentType: application/json
        payload:
          type: object
          required: [device_id, event_type, mode, previous_mode, timestamp]
          properties:
            device_id:
              type: string
            event_type:
              type: string
              enum: [mode_change]
            mode:
              type: string
              enum: [manual, auto]
            previous_mode:
              type: string
              enum: [manual, auto]
            timestamp:
              type: number
        examples:
          - name: 手動から自動への切替
            payload:
              device_id: x320-curtain-01
              event_type: mode_change
              mode: auto
              previous_mode: manual
              timestamp: 1710300000.0

  sensorTelemetry:
    address: "{device_id}/sensor/telemetry"
    description: Control Logic から Sensor Aggregator への定期センサーデータ（QoS 0 / 30秒間隔）。
    messages:
      SensorTelemetry:
        name: SensorTelemetry
        title: センサーテレメトリ
        contentType: application/json
        payload:
          type: object
          required: [device_id, timestamp, sensors, sampled_at]
          properties:
            device_id:
              type: string
            timestamp:
              type: number
            sensors:
              type: object
              properties:
                temperature:
                  type: object
                  properties:
                    value_celsius:
                      type: number
                      minimum: -40
                      maximum: 85
                    raw_value:
                      type: integer
                      minimum: 0
                      maximum: 4095
                      description: AD変換生データ（12bit）
                    read_at:
                      type: number
                humidity_pct:
                  type: number
                  minimum: 0
                  maximum: 100
                co2_ppm:
                  type: integer
                  minimum: 0
                  maximum: 10000
                  description: CO2濃度（ppm）。CO2センサーデバイスのみ
            sampled_at:
              type: string
              format: date-time
        examples:
          - name: 温度・湿度テレメトリ
            payload:
              device_id: x320-curtain-01
              timestamp: 1710300000.0
              sensors:
                temperature: {value_celsius: 28.4, raw_value: 2150, read_at: 1710299998.5}
                humidity_pct: 71.2
              sampled_at: "2025-03-20T09:15:00Z"
          - name: CO2センサーテレメトリ
            payload:
              device_id: Sensor-co2
              timestamp: 1710300000.0
              sensors:
                co2_ppm: 850
                temperature: {value_celsius: 27.8, raw_value: 2100, read_at: 1710299998.0}
                humidity_pct: 70.5
              sampled_at: "2025-03-20T09:15:00Z"

  curtainHealth:
    address: "{device_id}/curtain/health"
    description: Control Logic から Health Reporter へのデバイス死活情報（QoS 0 / 300秒間隔）。
    messages:
      CurtainHealth:
        name: CurtainHealth
        title: ヘルスチェック
        contentType: application/json
        payload:
          type: object
          required: [device_id, timestamp, uptime_sec, mqtt_connected, firmware, rssi_dbm, ai_available, errors]
          properties:
            device_id:
              type: string
            timestamp:
              type: number
            uptime_sec:
              type: integer
              minimum: 0
              description: 起動からの経過秒数。前回より大幅に小さい場合は再起動を示す
            mqtt_connected:
              type: boolean
            firmware:
              type: string
            rssi_dbm:
              type: integer
              minimum: -120
              maximum: 0
            do_channels:
              type: array
              items:
                type: string
            di_channels:
              type: array
              items:
                type: string
            ai_available:
              type: boolean
            errors:
              type: array
              items:
                type: string
        examples:
          - name: 正常ヘルスチェック
            payload:
              device_id: x320-curtain-01
              timestamp: 1710300000.0
              uptime_sec: 86400
              mqtt_connected: true
              firmware: "1.4.2"
              rssi_dbm: -65
              do_channels: [EXT_DO0, EXT_DO1, EXT_DO2, EXT_DO3]
              di_channels: [Filtered_DI0, Filtered_DI1, Filtered_DI2, Filtered_DI3, Filtered_DI4]
              ai_available: true
              errors: []
          - name: エラーあり
            payload:
              device_id: x320-curtain-01
              timestamp: 1710300300.0
              uptime_sec: 86700
              mqtt_connected: true
              firmware: "1.4.2"
              rssi_dbm: -65
              ai_available: true
              errors: ["M2:E01"]

operations:

  # ============================================================
  # Control Logic（x320-curtain-01）が使用する Operations
  # Shadow への反映は Event Router / Sensor Aggregator / Health Reporter が担当
  # ============================================================

  receiveCommand:
    action: receive
    channel:
      $ref: "#/channels/curtainCommand"
    summary: モーター制御コマンドを受信する
    description: |
      Event Router からモーター制御指示を受け取る。
      コマンド実行後は必ず publishResponse で結果を返す。
    bindings:
      mqtt: {qos: 1}

  publishResponse:
    action: send
    channel:
      $ref: "#/channels/curtainResponse"
    summary: コマンド実行結果を送信する
    description: |
      receiveCommand で受け取ったコマンドの実行結果を Event Router へ返す。
      Event Router はこの結果を元に curtain-ctrl Shadow の reported を更新する。
    bindings:
      mqtt: {qos: 1, retain: false}

  publishEvent:
    action: send
    channel:
      $ref: "#/channels/curtainEvent"
    summary: 状態変化イベントを送信する
    description: |
      以下の状態変化が発生した時に即時送信する。
      - リミッタースイッチ到達（LimiterEvent）
      - 緊急停止ボタン押下・解除（EmergencyStopEvent）
      - モーター動作状態変化（MotorStateEvent）
      - 動作モード変更（ModeChangeEvent）
    bindings:
      mqtt: {qos: 1, retain: false}

  publishTelemetry:
    action: send
    channel:
      $ref: "#/channels/sensorTelemetry"
    summary: 定期センサーデータを送信する
    description: |
      30秒間隔で温度・湿度センサーの計測値を送信する。
      Sensor Aggregator がこのデータを受け取り
      curtain-sensor Shadow と zone-env Shadow を更新する。
    bindings:
      mqtt: {qos: 0, retain: false}

  publishHealth:
    action: send
    channel:
      $ref: "#/channels/curtainHealth"
    summary: ヘルスチェック情報を送信する
    description: |
      300秒間隔でデバイスの死活情報を送信する。
      Health Reporter がこのデータを受け取り
      curtain-ctrl・curtain-sensor Shadow の reported.device を更新する。
    bindings:
      mqtt: {qos: 0, retain: false}

# ============================================================
# components.schemas: Named Shadow 完全スキーマ定義
# ============================================================

components:
  schemas:

    # ----------------------------------------------------------
    # curtain-ctrl Shadow
    # Thing: x320-curtain-01
    # ----------------------------------------------------------
    CurtainCtrlShadow:
      type: object
      title: curtain-ctrl Shadow
      description: |
        カーテン開閉デバイスのモーター制御・スケジュール・自動制御ルール・モーター状態を管理する。

        ## 書込主体
        | セクション | 書込主体 |
        |-----------|---------|
        | desired.mode / motors / schedule / motor_config | Event Router / ACT.app |
        | reported.mode / emergency_stop / motors | Event Router（curtain/response 受信後） |
        | reported.active_zone / schedule | Event Router |
        | reported.device | Health Reporter（curtain/health 受信後） |

        ## 更新頻度
        - desired: 設定変更時のみ
        - reported.motors: コマンド実行後
        - reported.device: 300秒ごと（health 受信時）
        ## サンプル

        <details>
        <summary>Shadow 完全サンプル（クリックで展開）</summary>

        ```json
        {
          "state": {
            "desired": {
              "mode": "auto",
              "motors": {
                "M1": {
                  "override": false,
                  "command": null,
                  "threshold": {
                    "open_temp": 28.0,
                    "close_temp": 25.0,
                    "hysteresis": 1.0
                  }
                },
                "M2": {
                  "override": false,
                  "command": null,
                  "threshold": {
                    "open_temp": 30.0,
                    "close_temp": 27.0,
                    "hysteresis": 1.5
                  }
                }
              },
              "schedule": {
                "enabled": true,
                "timezone": "Asia/Tokyo",
                "time_zones": [
                  {
                    "id": "night_close",
                    "from": "00:00",
                    "to": "08:00",
                    "control": "force_close"
                  },
                  {
                    "id": "daytime_auto",
                    "from": "08:00",
                    "to": "18:00",
                    "control": "temperature"
                  },
                  {
                    "id": "evening_close",
                    "from": "18:00",
                    "to": "24:00",
                    "control": "force_close"
                  }
                ]
              },
              "motor_config": {
                "stop_before_reverse_ms": 500,
                "cooldown_sec": 30
              }
            },
            "reported": {
              "mode": "auto",
              "emergency_stop": "inactive",
              "motors": {
                "M1": {
                  "direction": "stopped",
                  "limit_upper": "inactive",
                  "limit_lower": "inactive",
                  "cooldown_active": false,
                  "cooldown_until": null,
                  "pending_command": null,
                  "last_command": "forward",
                  "last_operated_at": "2025-03-20T08:00:05Z",
                  "operation_count": 1205,
                  "error_code": null
                },
                "M2": {
                  "direction": "stopped",
                  "limit_upper": "inactive",
                  "limit_lower": "inactive",
                  "cooldown_active": false,
                  "cooldown_until": null,
                  "pending_command": null,
                  "last_command": "forward",
                  "last_operated_at": "2025-03-20T08:00:10Z",
                  "operation_count": 986,
                  "error_code": null
                }
              },
              "active_zone": {
                "id": "daytime_auto",
                "control": "temperature",
                "entered_at": "2025-03-20T08:00:01Z"
              },
              "schedule": {
                "last_executed_zone": "night_close",
                "last_executed_at": "2025-03-20T08:00:01Z",
                "next_zone": "evening_close",
                "next_zone_at": "2025-03-20T18:00:00Z"
              },
              "device": {
                "online": true,
                "firmware": "1.4.2",
                "rssi_dbm": -65,
                "uptime_sec": 86400,
                "do_channels": [
                  "EXT_DO0",
                  "EXT_DO1",
                  "EXT_DO2",
                  "EXT_DO3"
                ],
                "di_channels": [
                  "Filtered_DI0",
                  "Filtered_DI1",
                  "Filtered_DI2",
                  "Filtered_DI3",
                  "Filtered_DI4"
                ],
                "ai_available": true,
                "errors": [],
                "last_health_at": "2025-03-20T09:00:00Z"
              }
            }
          }
        }
        ```

        </details>

      properties:
        state:
          type: object
          properties:
            desired:
              type: object
              properties:
                mode:
                  type: string
                  enum: [auto, manual]
                  description: "auto=温度・スケジュールで自動制御 / manual=手動コマンドのみ"
                motors:
                  type: object
                  properties:
                    M1:
                      type: object
                      title: M1 制御指示
                      properties:
                        override:
                          type: boolean
                          description: "true=グループ指示を無視して command を優先"
                          default: false
                        command:
                          type: string
                          enum: [forward, reverse, stop]
                          nullable: true
                          description: "個別指示。override:true の時のみ有効。null=指示なし"
                        threshold:
                          type: object
                          properties:
                            open_temp:
                              type: number
                              description: この温度以上でカーテンを開く（℃）
                            close_temp:
                              type: number
                              description: この温度以下でカーテンを閉じる（℃）
                            hysteresis:
                              type: number
                              minimum: 0
                              description: チャタリング防止幅（℃）
                    M2:
                      type: object
                      title: M2 制御指示
                      properties:
                        override:
                          type: boolean
                          default: false
                        command:
                          type: string
                          enum: [forward, reverse, stop]
                          nullable: true
                        threshold:
                          type: object
                          properties:
                            open_temp:
                              type: number
                            close_temp:
                              type: number
                            hysteresis:
                              type: number
                              minimum: 0
                schedule:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      description: スケジュール制御の有効/無効
                    timezone:
                      type: string
                      description: IANA タイムゾーン識別子
                    time_zones:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                          from:
                            type: string
                            description: 開始時刻（HH:MM）
                          to:
                            type: string
                            description: 終了時刻（HH:MM）
                          control:
                            type: string
                            enum: [force_close, temperature, force_open]
                            description: "force_close=常に閉 / temperature=閾値で自動 / force_open=常に開"
                motor_config:
                  type: object
                  properties:
                    stop_before_reverse_ms:
                      type: integer
                      description: 逆転前の停止待機時間（ミリ秒）。接触器消弧のため
                    cooldown_sec:
                      type: integer
                      description: モーター動作後の冷却待機秒数
            reported:
              type: object
              properties:
                mode:
                  type: string
                  enum: [auto, manual]
                emergency_stop:
                  type: string
                  enum: [active, inactive]
                  description: "物理緊急停止ボタンの状態。active 中は全コマンド拒否"
                motors:
                  type: object
                  properties:
                    M1:
                      type: object
                      title: M1 現在状態
                      properties:
                        direction:
                          type: string
                          enum: [forward, reverse, stopped]
                        limit_upper:
                          type: string
                          enum: [active, inactive]
                          description: "active=上限到達 → forward を拒否"
                        limit_lower:
                          type: string
                          enum: [active, inactive]
                          description: "active=下限到達 → reverse を拒否"
                        cooldown_active:
                          type: boolean
                          description: "true=クールダウン中。新規コマンドは pending_command に保留"
                        cooldown_until:
                          type: number
                          nullable: true
                          description: クールダウン解除時刻（Unix epoch 秒）
                        pending_command:
                          type: string
                          nullable: true
                          description: クールダウン中の保留コマンド。解除後に自動実行
                        last_command:
                          type: string
                          nullable: true
                          description: 最後に実行したコマンド
                        last_operated_at:
                          type: string
                          format: date-time
                          nullable: true
                        operation_count:
                          type: integer
                          minimum: 0
                          description: 累計動作回数。保守計画・寿命管理に使用
                        error_code:
                          type: string
                          nullable: true
                          description: "null=正常 / E01=過電流 / E02=タイムアウト / E03=センサー異常"
                    M2:
                      type: object
                      title: M2 現在状態
                      properties:
                        direction:
                          type: string
