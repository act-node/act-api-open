<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACT Connect IoT API ドキュメント</title>
  <link rel="stylesheet" href="https://unpkg.com/@asyncapi/react-component@2.4.0/styles/default.min.css">
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #loading { padding: 40px; color: #555; }
    #error   { padding: 40px; color: red; white-space: pre-wrap; display: none; }
    /* examples を強制展開 */
    [class*="example" i],
    [class*="Example" i] {
      display: block !important;
      max-height: none !important;
    }
  </style>
</head>
<body>
  <div id="loading">読み込み中...</div>
  <div id="error"></div>
  <div id="asyncapi"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <script src="https://unpkg.com/@asyncapi/react-component@2.4.0/browser/standalone/index.js"></script>

  <script>
    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      var el = document.getElementById('error');
      el.style.display = 'block';
      el.textContent = msg;
    }

    fetch('./asyncapi.yaml')
      .then(function(res) {
        if (!res.ok) throw new Error('asyncapi.yaml の取得失敗: HTTP ' + res.status);
        return res.text();
      })
      .then(function(yamlText) {
        var schema = jsyaml.load(yamlText);
        document.getElementById('loading').style.display = 'none';

        AsyncApiStandalone.render(
          {
            schema: schema,
            config: {
              show: {
                sidebar:         true,
                info:            true,
                servers:         true,
                operations:      true,
                messages:        true,
                schemas:         true,
                errors:          true,
                messageExamples: true,
              },
              sidebar: {
                showOperations: 'byDefault',
              },
              expand: {
                messageExamples: true,
              },
            },
          },
          document.getElementById('asyncapi')
        );

        /* レンダリング後に examples ボタンを自動クリックして展開 */
        setTimeout(function() {
          var btns = document.querySelectorAll('button');
          btns.forEach(function(btn) {
            var txt = btn.textContent || btn.innerText || '';
            if (txt.toLowerCase().includes('example') ||
                txt.includes('サンプル') ||
                txt.includes('展開')) {
              try { btn.click(); } catch(e) {}
            }
          });
        }, 2000);
      })
      .catch(function(err) {
        showError('エラー: ' + err.message);
        console.error(err);
      });
  </script>
</body>
</html>
